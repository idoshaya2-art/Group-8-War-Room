<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 8 — EMBA 41 — TAU · INTOPIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#090d16; --bg2:#0e1422; --panel:#121a2c; --panel2:#18213a;
  --line:#222c44; --line2:#2e3956;
  --txt:#e9edf5; --muted:#8d99b6; --muted2:#606d8b;
  --accent:#3d6fe0; --accent2:#6f97ee;
  --green:#2fb894; --greenbg:#0f3229;
  --red:#ef5568; --redbg:#34121c;
  --amber:#d9a441; --amberbg:#332609;
  --purple:#7f8bcb;
  --radius:12px; --radius-sm:8px;
  --shadow:0 10px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Assistant',system-ui,sans-serif;
  background:radial-gradient(1100px 640px at 82% -12%,#141d38 0%,transparent 58%),var(--bg);
  color:var(--txt); min-height:100vh; font-size:15px; line-height:1.5;
}
h1,h2,h3,h4{font-family:'Rubik',sans-serif;margin:0;font-weight:700}
.num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:isolate;display:inline-block}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--accent2)}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.side{
  width:230px;flex-shrink:0;background:linear-gradient(180deg,#0d1428,#0b1020);
  border-inline-start:1px solid var(--line);position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;padding:18px 12px;gap:6px;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.brand .logo{width:40px;height:40px;border-radius:9px;background:linear-gradient(150deg,#2f5fd0,#16274d);border:1px solid #3a58a0;
  display:grid;place-items:center;font-family:'Rubik';font-weight:800;font-size:15px;color:#fff;letter-spacing:.5px;box-shadow:0 4px 14px rgba(45,80,180,.35)}
.brand .t1{font-family:'Rubik';font-weight:700;font-size:13.5px;line-height:1.15}
.brand .t2{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:start;
  background:transparent;border:0;color:var(--muted);padding:10px 12px;border-radius:10px;
  font-size:14.5px;font-weight:600;transition:.15s;position:relative;
}
.nav button .ic{font-size:17px;width:22px;text-align:center;filter:grayscale(.3)}
.nav button:hover{background:var(--panel);color:var(--txt)}
.nav button.active{background:linear-gradient(90deg,rgba(79,140,255,.18),rgba(79,140,255,.04));color:#fff}
.nav button.active::before{content:"";position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.nav .badge{margin-inline-start:auto;background:var(--red);color:#fff;border-radius:20px;font-size:11px;min-width:19px;height:19px;
  display:grid;place-items:center;padding:0 5px;font-weight:700}
.nav .sec{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;padding:12px 12px 4px;font-weight:700}
.side .qbox{margin-top:auto;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;font-size:12px}
.side .qbox b{color:var(--accent2)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--line);
  background:rgba(11,16,32,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;
}
.topbar h2{font-size:19px}
.topbar .sub{color:var(--muted);font-size:13px}
.topbar .spacer{flex:1}
.qsel{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:5px 8px}
.qsel label{font-size:12px;color:var(--muted)}
.qsel select{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:7px;padding:5px 8px;font-weight:700}
.content{padding:24px 26px 60px;max-width:1400px;width:100%}

/* ===== Components ===== */
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:18px}
.card h3{font-size:16px;margin-bottom:2px}
.card .ch{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
.card .ch h3{flex:1}
.card .cb{padding:16px 18px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
.tag.g{background:var(--greenbg);color:var(--green);border-color:transparent}
.tag.r{background:var(--redbg);color:var(--red);border-color:transparent}
.tag.a{background:var(--amberbg);color:var(--amber);border-color:transparent}
.tag.b{background:rgba(79,140,255,.15);color:var(--accent2);border-color:transparent}

.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:9px;padding:9px 15px;font-weight:700;font-size:14px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#243157;border-color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#3f7bef);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(79,140,255,.35)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.danger{background:var(--redbg);color:var(--red);border-color:transparent}
.btn.sm{padding:6px 11px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}

input.f,select.f,textarea.f{
  background:var(--bg);color:var(--txt);border:1px solid var(--line2);border-radius:8px;padding:8px 10px;width:100%;
}
input.f:focus,select.f:focus,textarea.f:focus{outline:none;border-color:var(--accent)}
label.fl{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field{margin-bottom:12px}

table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
table.tbl th{text-align:start;color:var(--muted);font-weight:700;font-size:12px;padding:9px 10px;border-bottom:1px solid var(--line2);white-space:nowrap}
table.tbl td{padding:8px 10px;border-bottom:1px solid var(--line)}
table.tbl tr:hover td{background:rgba(255,255,255,.02)}
table.tbl input.f{padding:5px 7px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi .l{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.kpi .v{font-size:24px;font-weight:800;font-family:'Rubik'}
.kpi .d{font-size:12px;margin-top:3px;font-weight:600}
.kpi .d.up{color:var(--green)} .kpi .d.dn{color:var(--red)}

/* Alerts */
.alert{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border-radius:11px;border:1px solid var(--line);margin-bottom:10px;background:var(--panel)}
.alert.on{border-inline-start:4px solid}
.alert.red{border-inline-start-color:var(--red);background:linear-gradient(90deg,var(--redbg),var(--panel))}
.alert.amber{border-inline-start-color:var(--amber);background:linear-gradient(90deg,var(--amberbg),var(--panel))}
.alert.ok{border-inline-start:4px solid var(--green)}
.alert .dot{font-size:20px;line-height:1}
.alert .txt{flex:1}
.alert .txt b{display:block;font-size:14.5px}
.alert .txt span{color:var(--muted);font-size:13px}

/* Dropzone */
.drop{border:2px dashed var(--line2);border-radius:16px;padding:44px 20px;text-align:center;transition:.2s;background:var(--panel)}
.drop.hover{border-color:var(--accent);background:rgba(79,140,255,.08)}
.drop .big{font-size:44px;margin-bottom:8px}

/* icons */
.ic-svg{width:1.05em;height:1.05em;vertical-align:-.16em;flex-shrink:0;stroke-width:1.75}
.ch h3 .ic-svg,.card h3 .ic-svg{margin-inline-end:8px;color:var(--accent2);vertical-align:-.14em}
.nav .ic{display:inline-flex;align-items:center;justify-content:center;width:22px}
.nav .ic .ic-svg{width:18px;height:18px;vertical-align:0}
.btn .ic-svg{width:16px;height:16px}
.kpi .l .ic-svg,.tag .ic-svg{width:14px;height:14px}
.sev{width:10px;height:10px;border-radius:50%;display:inline-block;margin-top:5px;flex-shrink:0}
.sev-red{background:var(--red);box-shadow:0 0 0 3px rgba(255,93,108,.16)}
.sev-amber{background:var(--amber);box-shadow:0 0 0 3px rgba(255,181,77,.16)}
.sev-ok{background:var(--green);box-shadow:0 0 0 3px rgba(46,199,160,.16)}

/* charts */
canvas{display:block;max-width:100%}

/* toast */
#toast{position:fixed;bottom:22px;inset-inline-start:50%;transform:translateX(50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#0f1730;border:1px solid var(--line2);border-inline-start:4px solid var(--accent);border-radius:10px;padding:11px 18px;box-shadow:var(--shadow);font-weight:600;animation:tin .3s}
.toast.g{border-inline-start-color:var(--green)} .toast.r{border-inline-start-color:var(--red)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(4,7,16,.72);backdrop-filter:blur(3px);z-index:50;display:grid;place-items:center;padding:20px}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow);max-width:620px;width:100%;max-height:86vh;overflow:auto}
.modal .mh{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal .mh h3{flex:1}
.modal .mb{padding:20px}
.modal .mf{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line)}
.x{background:transparent;border:0;color:var(--muted);font-size:22px;line-height:1;cursor:pointer}

.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ic{font-size:40px;opacity:.5;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:4px 11px;font-size:12.5px;font-weight:600}
.hr{height:1px;background:var(--line);margin:16px 0;border:0}
.src{font-size:11px;color:var(--muted2);font-style:italic}
.pill-tabs{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap}
.pill-tabs button{background:transparent;border:0;color:var(--muted);padding:7px 14px;border-radius:8px;font-weight:700;font-size:13.5px}
.pill-tabs button.active{background:var(--accent);color:#fff}
.checklist{padding:0;margin:0;list-style:none}
.checklist li{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
.check{width:20px;height:20px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0;display:grid;place-items:center;margin-top:1px}
.check.done{background:var(--green);border-color:var(--green);color:#04120c}
@media(max-width:860px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;overflow-x:auto}
  .nav{flex-direction:row;flex-wrap:wrap}
  .nav .sec,.side .qbox{display:none}
  .content{padding:16px}
  .grid[style*="1.15fr"],.grid[style*="1.3fr"],.grid[style*="1fr 1fr"]{grid-template-columns:1fr !important}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">G8</div>
      <div>
        <div class="t1">Group 8 — EMBA 41</div>
        <div class="t2">Tel Aviv University</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="qbox">
      רבעון פעיל: <b id="qboxNow">—</b><br>
      עודכן לאחרונה: <span id="qboxEdit" class="muted">—</span>
    </div>
    <div style="text-align:center;font-size:10px;color:var(--muted2);letter-spacing:.6px;margin-top:8px">INTOPIA War Room · <span id="appVer"></span></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h2 id="pageTitle">דשבורד</h2>
        <div class="sub" id="pageSub">תמונת מצב חברה 8</div>
      </div>
      <div class="spacer"></div>
      <div class="qsel">
        <label>רבעון</label>
        <select id="quarterSelect"></select>
      </div>
      <button class="btn sm ghost" id="btnExportData" title="הורדת גיבוי נתונים (JSON)"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> גיבוי</button>
      <button class="btn sm ghost" id="btnImportData" title="שחזור מגיבוי / טעינת מצב מהצוות"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> שחזור</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none">
      <button class="btn sm ghost" id="btnSync" title="סנכרון צוותי"><span id="syncDot" style="width:8px;height:8px;border-radius:50%;background:var(--muted2);display:inline-block"></span> סנכרון</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toast"></div>
<div id="modalRoot"></div>

<script>
/* =========================================================================
   INTOPIA War Room — client-side decision-support app (MVP)
   Single-file, localStorage-persisted, Hebrew RTL.
   Three layers — facts (extracted data), model (deterministic engine),
   goals (team configuration). Strategy is configuration, not code.
   ========================================================================= */

const APP_VERSION = 'v5.6';
const QUARTERS = ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9'];
const REGIONS  = [
  {id:'us',     name:'ארה״ב (U.S.)',        cur:'USD'},
  {id:'europe', name:'אירופה (EC/EU)',      cur:'EUR'},
  {id:'brazil', name:'ברזיל',               cur:'BRL'},
  {id:'hq',     name:'מטה (ליכטנשטיין)',    cur:'CHF'},
];
const PERSONAS = ['CEO','CFO','COO','CMO','R&D/מודיעין'];
const FX_DEFAULT = {USD:1, EUR:1.08, BRL:0.20, CHF:1.10}; // fallback USD-equivalent rates (manual mode only)
function fxRate(cur){ const fx=(S&&S.config&&S.config.params&&S.config.params.fx)||FX_DEFAULT; return fx[cur]!==undefined?fx[cur]:(FX_DEFAULT[cur]||1); }

/* ---------- Persistence ---------- */
const LS_KEY = 'intopia_warroom_v1';
let S = null;

function emptyQuarter(){
  return {
    entered:false,
    financial:{
      cash:{}, consolidated:0, retainedEarnings:0, netProfit:0, revenue:0, grossMargin:0, roe:0, roi:0, ros:0,
      ap:0, ar:0, supplierCredit:0, loans:0, securities:0,
    },
    operational:{ inventory:[], techX:0, techY:0, maxProducible:0, factories:0, offices:0, rd:0 },
    marketIntel:[],
  };
}
function defaultState(){
  const q={}; QUARTERS.forEach(k=> q[k]=emptyQuarter());
  return {
    activeQuarter:'Q3',
    cumulative:false,
    config:{
      goals:{ floors:{Q1:0,Q2:0,Q3:0,Q4:0,Q5:0,Q6:0,Q7:0,Q8:0,Q9:0},
        techXTarget:0, techYTarget:0, debtCeiling:0, endInventoryTarget:0 },
      contracts:[],
      params:{
        collection:{ us:[100,0,0], europe:[50,20,30], brazil:[30,30,40], hq:[100,0,0] },
        tax:{us:34, europe:30, brazil:25, hq:0},
        interest:{bank:10, supplierCredit:11, h4:12, securities:6},
        productionPay:[100,0],
        fx:{USD:1, EUR:1.08, BRL:0.20, CHF:1.10},
      },
    },
    quarters:q,
    scenarios:[],
    decisions:[],
    ai:{ provider:'anthropic', models:{anthropic:'claude-sonnet-5', openai:'gpt-5.6'}, chat:[] },
    meta:{lastEditor:'', lastEdited:0},
  };
}
function load(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ S=deepMerge(defaultState(),JSON.parse(raw)); return; } }
  catch(e){ console.warn('load failed',e); }
  S=defaultState();
}
function deepMerge(base, over){
  if(Array.isArray(over)) return over;
  if(over && typeof over==='object' && base && typeof base==='object' && !Array.isArray(base)){
    const out={...base};
    for(const k in over){ out[k]=(k in base)?deepMerge(base[k],over[k]):over[k]; }
    return out;
  }
  return over===undefined?base:over;
}
let saveTimer=null;
function save(silent){
  if(!sync.applying){ S.meta.lastEdited=Date.now(); if(sync.cfg&&sync.cfg.name) S.meta.lastEditor=sync.cfg.name; }
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ try{ localStorage.setItem(LS_KEY,JSON.stringify(S)); }catch(e){ toast('שגיאת שמירה: '+e.message,'r'); } },120);
  if(sync.connected && !sync.applying) schedulePush();
  if(!silent) renderQBox();
}

/* ---------- Utilities ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = ()=>Math.random().toString(36).slice(2,9);
function fmt(n,dec=0){ if(n===null||n===undefined||isNaN(n))return '—';
  return Number(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function qIndex(q){ return QUARTERS.indexOf(q); }
function nextQuarters(from){ return QUARTERS.slice(qIndex(from)+1); }
function toast(msg,cls=''){
  const el=document.createElement('div'); el.className='toast '+cls; el.textContent=msg;
  $('#toast').appendChild(el); setTimeout(()=>{el.style.opacity=0;el.style.transition='.4s';setTimeout(()=>el.remove(),400);},2600);
}
function relTime(ts){ if(!ts)return '—'; const s=(Date.now()-ts)/1000;
  if(s<60)return 'זה עתה'; if(s<3600)return Math.floor(s/60)+' דק׳'; if(s<86400)return Math.floor(s/3600)+' שע׳';
  return new Date(ts).toLocaleDateString('he-IL'); }

/* ---------- Icon system (professional line icons, inherit currentColor) ---------- */
const ICONS={
  dashboard:'<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
  inbox:'<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
  lineChart:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  sliders:'<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>',

/* =========================================================================
   DETERMINISTIC ENGINE  (F4 cash-flow, F3 alerts, scoring proxy)
   ========================================================================= */
function unifiedCashOf(q){
  const fin=S.quarters[q].financial;
  if(fin.consolidated) return fin.consolidated; // authoritative figure from the report (CHF)
  let sum=0; REGIONS.forEach(r=> sum += (fin.cash[r.id]||0)*fxRate(r.cur)); return sum;
}
function inventoryValue(q){ return S.quarters[q].operational.inventory.reduce((a,i)=>a+(i.qty||0)*(i.cost||0),0); }

function projectCashflow(baseQuarter, leversByQuarter){
  const p=S.config.params;
  let bal={}; REGIONS.forEach(r=> bal[r.id]=S.quarters[baseQuarter].financial.cash[r.id]||0);
  const out=[]; const startIdx=qIndex(baseQuarter); let pipeline=[];
  const push=(region,fromIdx,amount)=>{ const sched=p.collection[region]||[100,0,0];
    sched.forEach((pct,k)=>{ if(pct>0 && fromIdx+k<QUARTERS.length) pipeline.push({region,q:QUARTERS[fromIdx+k],amount:amount*pct/100}); }); };
  for(let i=startIdx+1;i<QUARTERS.length;i++){
    const q=QUARTERS[i]; const lev=(leversByQuarter&&leversByQuarter[q])||{};
    REGIONS.forEach(r=>{
      const rl=(lev.regions&&lev.regions[r.id])||{};
      const sales=rl.sales||0, prodCost=(rl.production||0)*(rl.unitCost||0), adv=rl.advertising||0,
            invest=rl.invest||0, transferIn=rl.transferIn||0, rd=(lev.rd||0)/REGIONS.length;
      if(sales) push(r.id,i,sales);
      bal[r.id] -= (prodCost*(p.productionPay[0]/100)) + adv + invest + rd - transferIn;
    });
    pipeline.filter(x=>x.q===q).forEach(x=> bal[x.region]+=x.amount);
    const loans=S.quarters[baseQuarter].financial.loans||0;
    bal.hq -= loans*(p.interest.bank/100)/4;
    const cashByRegion={...bal};
    let unified=0; REGIONS.forEach(r=> unified += cashByRegion[r.id]*fxRate(r.cur));
    const floor=S.config.goals.floors[q]||0;
    out.push({q,cashByRegion,unified,floor,breach:unified<floor,distance:unified-floor});
  }
  return out;
}
function scoreProxy(leversByQuarter){
  const base=S.activeQuarter;
  const proj=projectCashflow(base,leversByQuarter);
  const endCash=proj.length?proj[proj.length-1].unified:unifiedCashOf(base);
  const breaches=proj.filter(x=>x.breach).length;
  const g=S.config.goals, op=S.quarters[base].operational;
  const techScore=((op.techX>=g.techXTarget&&g.techXTarget>0?1:(g.techXTarget>0?op.techX/g.techXTarget:0))+
                   (op.techY>=g.techYTarget&&g.techYTarget>0?1:(g.techYTarget>0?op.techY/g.techYTarget:0)))/2;
  const cashScore=Math.max(0,Math.min(1,endCash/Math.max(1,(g.floors.Q9||1)*3)));
  const penalty=breaches*0.12;
  const raw=(0.5*cashScore + 0.35*(isFinite(techScore)?techScore:0) + 0.15*(op.rd>0?1:0)) - penalty;
  return {value:Math.max(0,Math.min(1,raw))*100, endCash, breaches};
}

/* ---------- Alerts (F3.2) — the 6 red lights ---------- */
function computeAlerts(q){
  const Q=S.quarters[q], g=S.config.goals, out=[];
  if(!Q.entered){ out.push({level:'amber',key:'noData',title:'אין נתוני רבעון',desc:`רבעון ${q} טרם נקלט — העלה את דוח התוצאות.`}); return out; }
  const proj=projectCashflow(q,null); const firstBreach=proj.find(x=>x.breach);
  if(firstBreach) out.push({level:'red',key:'floor',title:'שבירת רצפת מזומן צפויה',
    desc:`לפי ההקרנה, ב-${firstBreach.q} המזומן המאוחד (${fmt(firstBreach.unified)}) יורד מתחת לרצפה (${fmt(firstBreach.floor)}). מרחק: ${fmt(firstBreach.distance)}.`});
  REGIONS.forEach(r=>{ const v=Q.financial.cash[r.id]; if(v!==undefined&&v<0)
    out.push({level:'red',key:'cur_'+r.id,title:`יתרת מטבע שלילית — ${r.name}`,desc:`יתרה ${fmt(v)} ${r.cur}. גירעון מטבע דורש טיפול לפני ההזנה.`}); });
  if((Q.financial.supplierCredit||0)>0) out.push({level:'amber',key:'sc',title:'אשראי ספקים פעיל',
    desc:`יתרת אשראי ספקים ${fmt(Q.financial.supplierCredit)} — ריבית ~${S.config.params.interest.supplierCredit}%. שקול פירעון מוקדם.`});
  const noPrice=Q.operational.inventory.filter(i=>(i.qty||0)>0 && !(i.price>0));
  if(noPrice.length) out.push({level:'red',key:'noprice',title:'מלאי ללא מחיר מוזן',
    desc:`${noPrice.length} פריטי מלאי ללא מחיר — "אין מחיר = אין מכירה". פריטים: ${noPrice.map(i=>(i.product||'?')+(i.grade?'/'+i.grade:'')).join(', ')}.`});
  if((Q.operational.rd||0)===0) out.push({level:'amber',key:'rd',title:'מו״פ = 0',
    desc:'אין השקעת מו״פ ברבעון זה — שים לב לקנס עקביות ולפיגור טכנולוגי מול מתחרים.'});
  S.config.contracts.forEach(c=>{
    if(c.deliveryQuarter && qIndex(c.deliveryQuarter)>=qIndex(q)){
      const invQty=Q.operational.inventory.filter(i=>i.product===c.product).reduce((a,i)=>a+(i.qty||0),0);
      if(invQty<(c.qty||0)) out.push({level:'amber',key:'ct_'+c.id,title:'התחייבות חוזית בסיכון',
        desc:`חוזה ${c.counterparty||'—'}: ${c.qty} × ${c.product||'—'} עד ${c.deliveryQuarter}. במלאי כעת ${invQty} בלבד.`});
    }
  });
  if(g.debtCeiling>0 && (Q.financial.loans||0)>g.debtCeiling) out.push({level:'amber',key:'debt',title:'חריגה מתקרת חוב',
    desc:`חוב ${fmt(Q.financial.loans)} מעל התקרה שהוגדרה (${fmt(g.debtCeiling)}).`});
  return out;
}
function activeAlerts(){ return computeAlerts(S.activeQuarter); }

function autoBriefing(q){
  const Q=S.quarters[q], out=[]; const cash=unifiedCashOf(q);
  const prevQ=qIndex(q)>0?QUARTERS[qIndex(q)-1]:null;
  out.push(`מזומן מאוחד עומד על <b class="num">${fmt(cash)}</b> (שווי-USD מוערך).`);
  if(prevQ&&S.quarters[prevQ].entered){ const d=cash-unifiedCashOf(prevQ);
    out.push(`שינוי מול ${prevQ}: <b class="num">${d>=0?'+':''}${fmt(d)}</b> ${d>=0?IC('trendUp'):IC('trendDown')}.`); }
  const reds=computeAlerts(q).filter(a=>a.level==='red');
  if(reds.length) out.push(`<span style="color:var(--red)">דחוף:</span> ${reds.length} נורות אדומות — ${reds[0].title}.`);
  else out.push(`אין נורות אדומות פעילות ברבעון זה. ${IC('check')}`);
  const brk=projectCashflow(q,null).find(x=>x.breach);
  if(brk) out.push(`ההקרנה מצביעה על שבירת רצפה ב-<b>${brk.q}</b> — נדרש תרחיש מתקן בסימולטור.`);
  else out.push(`ההקרנה הנוכחית שומרת על הרצפות עד Q9.`);
  if((Q.operational.rd||0)===0) out.push(`מו״פ אופס ברבעון זה — בדוק מול קנס העקביות ומגמת המתחרים.`);
  return out;
}

      `<button class="btn primary" onclick="go('ingest')">מעבר לקליטת דוח</button>`); return;
  }
  const last=latestEntered();
  const sum=k=> ent.reduce((a,q)=>a+(S.quarters[q].financial[k]||0),0);
  const totalProfit=sum('netProfit'), totalRevenue=sum('revenue');
  const lastFin=S.quarters[last].financial, lastOp=S.quarters[last].operational;
  const totalRD=ent.reduce((a,q)=>a+(S.quarters[q].operational.rd||0),0);
  const avgMargin=totalRevenue>0?(totalProfit/totalRevenue*100):null;
  c.innerHTML=`
    <div class="card pad" style="margin-bottom:18px;border-inline-start:4px solid var(--accent)">

function drawTrend(cv){
  if(!cv)return;
  const data=QUARTERS.map(q=> S.quarters[q].entered?unifiedCashOf(q):null);
  const floors=QUARTERS.map(q=>S.config.goals.floors[q]||0);
  lineChart(cv,{labels:QUARTERS,series:[
    {name:'מזומן',data,color:'#4f8cff',fill:true},
    {name:'רצפה',data:floors,color:'#ff5d6c',dash:true},
  ]});
}
function lineChart(cv,{labels,series}){
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||(cv.parentElement.clientWidth-36), H=cv.height;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const padL=48,padR=12,padT=14,padB=26;
  const all=series.flatMap(s=>s.data).filter(v=>v!==null&&!isNaN(v));
  if(!all.length){ ctx.fillStyle='#6b78a0';ctx.font='13px Assistant';ctx.fillText('אין נתונים',W/2-30,H/2);return; }
  let min=Math.min(...all,0), max=Math.max(...all,0); if(min===max)max=min+1;
  const pad=(max-min)*0.12; max+=pad; min-=pad;
  const x=i=> padL+(W-padL-padR)*(i/(labels.length-1||1));
  const y=v=> padT+(H-padT-padB)*(1-(v-min)/(max-min));
  ctx.strokeStyle='#26315a';ctx.lineWidth=1;ctx.fillStyle='#6b78a0';ctx.font='10px Assistant';ctx.textAlign='right';
  for(let g=0;g<=4;g++){ const v=min+(max-min)*g/4, yy=y(v);
    ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(W-padR,yy);ctx.stroke(); ctx.fillText(shortNum(v),padL-6,yy+3); }
  ctx.textAlign='center'; labels.forEach((l,i)=>ctx.fillText(l,x(i),H-8));
  series.forEach(s=>{
    ctx.strokeStyle=s.color;ctx.lineWidth=2.4; ctx.setLineDash(s.dash?[5,4]:[]);
    ctx.beginPath();let started=false;
    s.data.forEach((v,i)=>{ if(v===null||isNaN(v)){started=false;return;} const xx=x(i),yy=y(v);
      if(!started){ctx.moveTo(xx,yy);started=true;}else ctx.lineTo(xx,yy); }); ctx.stroke();
    if(s.fill){ ctx.setLineDash([]);
      const grad=ctx.createLinearGradient(0,padT,0,H-padB); grad.addColorStop(0,s.color+'44');grad.addColorStop(1,s.color+'00');
      // build fill only across contiguous points
      ctx.beginPath();let st=false;let firstI=0,lastI=0;
      s.data.forEach((v,i)=>{ if(v===null||isNaN(v))return; const xx=x(i),yy=y(v); if(!st){ctx.moveTo(xx,y(min));ctx.lineTo(xx,yy);st=true;firstI=i;}else ctx.lineTo(xx,yy); lastI=i; });
      if(st){ ctx.lineTo(x(lastI),y(min)); ctx.closePath(); ctx.fillStyle=grad; ctx.fill(); }
    }
    ctx.setLineDash([]);
    s.data.forEach((v,i)=>{ if(v===null||isNaN(v))return; ctx.beginPath();ctx.arc(x(i),y(v),3,0,7);ctx.fillStyle=s.color;ctx.fill(); });
  });
}
function shortNum(v){ const a=Math.abs(v); if(a>=1e6)return (v/1e6).toFixed(1)+'M'; if(a>=1e3)return (v/1e3).toFixed(0)+'K'; return fmt(v); }

function matchSheet(name){ const n=name.toLowerCase();
  if(/balance/.test(n))return'balance'; if(/income|profit|p&l/.test(n))return'income';
  if(/manag|mgmt|info/.test(n))return'mgmt'; if(/curren|fx/.test(n))return'currency';
  if(/^mr\b|market research|mr\s*\d/.test(n))return'mr'; return null; }
function parseNumber(v){
  if(typeof v==='number')return isNaN(v)?null:v; if(typeof v!=='string')return null;
  const neg=/^\(.*\)$/.test(v.trim());
  const cleaned=v.replace(/[(),\s€$₪R]/g,''); if(cleaned===''||isNaN(cleaned))return null;
  let n=parseFloat(cleaned); if(neg)n=-Math.abs(n); return n;
}
/* Normalize a row label: uppercase, strip a leading digit artifact ("0TOTAL..."), collapse spaces. */
function normLabel(s){ return String(s==null?'':s).toUpperCase().replace(/^[^A-Z(]+/,'').replace(/\s+/g,' ').trim(); }
function rowsOf(ws){ return XLSX.utils.sheet_to_json(ws,{header:1,defval:''}); }
function findRow(rows,re){ return rows.find(r=> re.test(normLabel(r&&r[0]))); }
function findRows(rows,re){ return rows.filter(r=> re.test(normLabel(r&&r[0]))); }

/* Balance Sheet / Income Statement share the column layout:
   col0=label, US=2, EC/EU=4, BRAZIL=6, LIECHTENSTEIN(HQ)=7, CONSOLIDATED=8. */
const IS_COL={us:2,europe:4,brazil:6,hq:7,cons:8};
function cell(rows,re,col){ const r=findRow(rows,re); return r?parseNumber(r[col]):null; }
function sumRows(rows,re,col){ return findRows(rows,re).reduce((a,r)=>{ const n=parseNumber(r[col]); return a+(n||0); },0); }

function extractBalance(rows,scan,f){
  const cashRow=findRow(rows,/^CASH$/);
  if(cashRow){ scan.cash={}; REGIONS.forEach(r=>{ const v=parseNumber(cashRow[IS_COL[r.id]]); if(v!==null)scan.cash[r.id]=v; });
    const cons=parseNumber(cashRow[IS_COL.cons]); if(cons!==null)scan.consolidated=cons; f.push('מזומן לפי אזור + מאוחד'); }
  const ar=sumRows(rows,/^A\/R PERIOD/,IS_COL.cons); if(findRow(rows,/^A\/R PERIOD/)){ scan.ar=ar; f.push('A/R'); }
  const ap=sumRows(rows,/^A\/P PERIOD/,IS_COL.cons); if(findRow(rows,/^A\/P PERIOD/)){ scan.ap=ap; f.push('A/P'); }
  const sc=cell(rows,/^SUPPLIER CREDIT/,IS_COL.cons); if(sc!==null){ scan.supplierCredit=sc; f.push('אשראי ספקים'); }
  const area=cell(rows,/^AREA BANK LOANS/,IS_COL.cons)||0, bank=cell(rows,/^BANK LOANS PAYABLE/,IS_COL.cons)||0, bonds=cell(rows,/^LONG.?TERM BONDS/,IS_COL.cons)||0;
  if(findRow(rows,/BANK LOANS/)){ scan.loans=area+bank+bonds; f.push('הלוואות'); }
  const re=cell(rows,/^RETAINED EARNINGS/,IS_COL.cons); if(re!==null){ scan.retainedEarnings=re; f.push('רווחים צבורים'); }
  const sec=cell(rows,/^GOVERNMENT SECURITIES/,IS_COL.cons); if(sec!==null){ scan.securities=sec; }
}
function extractIncome(rows,scan,f){
  const ne=cell(rows,/^NET EARNINGS$/,IS_COL.cons); if(ne!==null){ scan.netProfit=ne; f.push('רווח נקי'); }
  const gm=cell(rows,/^TOTAL GROSS MARGIN/,IS_COL.cons); if(gm!==null) scan.grossMargin=gm;
  // Revenue = consumer sales (standard + deluxe), consolidated
  const consumer=sumRows(rows,/^CONSUMER$/,IS_COL.cons); if(findRow(rows,/^CONSUMER$/)){ scan.revenue=consumer; f.push('מחזור (מכירות צרכן)'); }
  const rdChip=cell(rows,/^R & D NEW CHIP/,IS_COL.cons)||0, rdPc=cell(rows,/^R & D NEW PC/,IS_COL.cons)||0;
  if(findRow(rows,/R & D NEW/)){ scan.rd=rdChip+rdPc; f.push('מו״פ (CHIP+PC)'); }
}
/* Management Info layout: US chip=1 pc=3, EC/EU chip=4 pc=6, BRAZIL chip=7 pc=9 (single-value rows use the chip column). */
const MG_MAIN=[1,4,7], MG_PC=[3,6,9];
function extractMgmt(rows,scan,f){
  const sumCols=(re,cols)=>{ const r=findRow(rows,re); if(!r)return null; return cols.reduce((a,c)=>a+(parseNumber(r[c])||0),0); };
  const maxCols=(re,cols)=>{ const r=findRow(rows,re); if(!r)return null; return Math.max(...cols.map(c=>parseNumber(r[c])||0)); };
  const plants=sumCols(/^PLANTS BUILT AND BUILDING/,MG_MAIN); if(plants!==null){ scan.factories=plants; f.push('מפעלים'); }
  const offices=sumCols(/REG.? SALES OFFICES/,MG_MAIN); if(offices!==null){ scan.offices=offices; f.push('משרדים'); }
  const ownChip=maxCols(/^MAX.? OWNED GRADE/,MG_MAIN), ownPc=maxCols(/^MAX.? OWNED GRADE/,MG_PC);
  if(ownChip!==null){ scan.techX=ownChip; scan.techY=ownPc; f.push('רמות CHIP/PC'); }
  const prod=maxCols(/^MAX.? PRODUCIBLE GRADE/,MG_MAIN); if(prod!==null){ scan.maxProducible=prod; f.push('Max Producible'); }
  // Ending inventory -> items (only where units>0)
  const inv=[];
  const addInv=(re,gradeLabel)=>{ const r=findRow(rows,re); if(!r)return;
    REGIONS.filter(x=>x.id!=='hq').forEach((reg,idx)=>{ const units=parseNumber(r[MG_MAIN[idx]])||0, pcUnits=parseNumber(r[MG_PC[idx]])||0;
      if(units>0) inv.push({product:`CHIP ${reg.name.split(' ')[0]}`,grade:gradeLabel,qty:units,cost:0,price:0});
      if(pcUnits>0) inv.push({product:`PC ${reg.name.split(' ')[0]}`,grade:gradeLabel,qty:pcUnits,cost:0,price:0}); }); };
  addInv(/^STANDARD UNITS/,'Standard'); addInv(/^DELUXE UNITS/,'Deluxe');
  if(inv.length){ scan.inventory=inv; f.push('מלאי סגירה'); }
}
function extractCurrency(rows,scan){
  const er=findRow(rows,/^EXCHANGE RATE/); // US EC/EU BRAZIL LIECHT (units per CHF)
  if(er){ scan.gameRates={us:parseNumber(er[1]),europe:parseNumber(er[2]),brazil:parseNumber(er[3]),hq:parseNumber(er[4])}; }
}

function parseWorkbook(wb){
  const scan={}; let mrCount=0; const found=[];
  wb.SheetNames.forEach(sn=>{
    const type=matchSheet(sn); const ws=wb.Sheets[sn]; if(!ws)return;
    const rows=rowsOf(ws);
    if(type==='mr'){ mrCount++; ingestMR(sn,rows); return; }
    if(type==='balance') extractBalance(rows,scan,found);
    else if(type==='income') extractIncome(rows,scan,found);
    else if(type==='mgmt') extractMgmt(rows,scan,found);
    else if(type==='currency') extractCurrency(rows,scan);
  });
  const uniq=[...new Set(found)];
  return {scan,mrCount,summary: uniq.length? uniq.join(' · ') : 'לא זוהו שדות מוכרים — בדוק שהקובץ הוא דוח INTOPIA', applied:uniq};
}
function applyParsed({scan}){
  const Q=S.quarters[S.activeQuarter], f=Q.financial, op=Q.operational;
  if(scan.cash){ REGIONS.forEach(r=>{ if(scan.cash[r.id]!==undefined) f.cash[r.id]=scan.cash[r.id]; }); }
  ['consolidated','netProfit','revenue','grossMargin','retainedEarnings','loans','ap','ar','supplierCredit','securities'].forEach(k=>{ if(scan[k]!==undefined&&scan[k]!==null) f[k]=scan[k]; });
  ['techX','techY','maxProducible','factories','offices','rd'].forEach(k=>{ if(scan[k]!==undefined&&scan[k]!==null) op[k]=scan[k]; });
  if(scan.inventory&&scan.inventory.length) op.inventory=scan.inventory;
  if(scan.gameRates) S.config.params.gameRates=scan.gameRates;
  save();
}
function ingestMR(sheetName,rows){
  const Q=S.quarters[S.activeQuarter];
  const mrId=(sheetName.match(/\d+/)||[''])[0];
  if(Q.marketIntel.some(m=>m.source===sheetName))return;
  Q.marketIntel.push({company:'—',region:'—',product:'—',grade:'',metric:'MR '+(mrId||sheetName),value:0,
    source:sheetName,kind:/17|28|74/.test(mrId)?'sold':'held',rows:rows.length});
  save(true);
}

  rows.push({form:'W1',action:'מו״פ (R&D)',value:(lev&&lev.rd)||0,note:''});

  return rows;
}

window.runMaxOptimizer=()=>{
  const base=S.activeQuarter, op=S.quarters[base].operational;
  const cap=parseFloat(($('#maxCap')||{}).value)||op.maxProducible||0;
  let cost=parseFloat(($('#maxCost')||{}).value)||0;
  if(!cost){ cost=op.inventory.length?(op.inventory.reduce((a,i)=>a+(i.cost||0),0)/op.inventory.length):0; }
  const box=$('#maxResult');
  if(!cap||!cost){ box.innerHTML=`<div class="tag a">${IC('warn')} נדרשים קיבולת ועלות יח׳ להרצת מיקסום.</div>`; return; }
  const qs=nextQuarters(base).slice(0,6);
  if(!qs.length){ box.innerHTML=`<div class="tag a">${IC('warn')} אין רבעונים עתידיים (${base} הוא הסוף).</div>`; return; }
  const prodFracs=[1.0,0.9,0.8,0.65], margins=[1.3,1.6,2.0,2.5,3.0], rdOpts=[0, Math.round(cost*cap*0.04)];
  let best=null;
  prodFracs.forEach(pf=> margins.forEach(mg=> rdOpts.forEach(rd=>{
    const production=Math.round(cap*pf), price=cost*mg;
    const levers={};
    qs.forEach(q=>{ levers[q]={rd,regions:{}};
      REGIONS.forEach(r=>{ const prod=Math.round(production/REGIONS.length);
        levers[q].regions[r.id]={production:prod,unitCost:cost,sales:prod*price,advertising:Math.round(prod*price*0.06),invest:0,transferIn:0}; }); });
    const sp=scoreProxy(levers), proj=projectCashflow(base,levers), feasible=!proj.some(p=>p.breach);
    const cand={levers,feasible,endCash:sp.endCash,score:sp.value,pf,mg,rd,minDist:Math.min(...proj.map(p=>p.distance))};
    if(!best){ best=cand; return; }
    const better=(cand.feasible&&!best.feasible)||(cand.feasible===best.feasible&&(cand.score>best.score||(cand.score===best.score&&cand.endCash>best.endCash)));
    if(better) best=cand;
  })));
  const name='MAX — מיקסום Q9';
  let sc=S.scenarios.find(s=>s.name===name);
  if(!sc){ sc={id:uid(),name,base,levers:{},createdAt:Date.now()}; S.scenarios.push(sc); }
  sc.levers=best.levers; sc.base=base; save();
  box.innerHTML=`
    <div class="kpis" style="margin-bottom:14px">
      ${kpi('מזומן Q9 מוקרן',fmt(best.endCash),'')}
      ${kpi('פרוקסי ציון',best.score.toFixed(0),'')}
      ${kpi('שמירת רצפות',best.feasible?'תקין':'שבירה','')}
    </div>
    <div class="small" style="line-height:1.9">
      <b>תוכנית מומלצת (${qs[0]}–${qs[qs.length-1]}):</b><br>
      • עצימות ייצור: <b>${(best.pf*100).toFixed(0)}%</b> מהקיבולת (${fmt(Math.round(cap*best.pf))} יח׳/רבעון)<br>
      • מחיר יעד: <b>×${best.mg}</b> מהעלות (${fmt(Math.round(cost*best.mg))} ליח׳)<br>
      • מו״פ לרבעון: <b>${fmt(best.rd)}</b><br>
      • מרחק מינימלי מהרצפה: <span style="color:${best.minDist<0?'var(--red)':'var(--green)'}">${fmt(Math.round(best.minDist))}</span>
    </div>
    ${!best.feasible?`<div class="tag a" style="margin-top:10px">${IC('warn')} גם התוכנית הטובה ביותר שוברת רצפה — הגדל קיבולת/מחיר או הקטן רצפות.</div>`:`<div class="tag g" style="margin-top:10px">${IC('check')} תוכנית ישימה נשמרה כתרחיש</div>`}
    <button class="btn primary" style="margin-top:12px" onclick="go('sim')">${IC('sliders')} פתח בסימולטור</button>`;
  toast('מיקסום Q9 הושלם — תרחיש נשמר','g');
};

function renderContracts(){

/* =========================================================================
   AI LAYER (F7) — data-anchored chat + council mode
   Bring-your-own Anthropic API key (stored locally, NOT in the backup file).
   All numbers are computed by the deterministic engine and passed in as facts;
   the model interprets and cites — it never invents figures.
   ========================================================================= */
const AI_PROVIDERS={
  anthropic:{ label:'Anthropic (Claude)', short:'Claude', keyLS:'intopia_ai_key_anthropic', defModel:'claude-sonnet-5', keyHint:'sk-ant-...' },
  openai:{ label:'OpenAI (GPT)', short:'GPT', keyLS:'intopia_ai_key_openai', defModel:'gpt-5.6', keyHint:'sk-...' },
};
function aiProvider(){ const p=S.ai&&S.ai.provider; return AI_PROVIDERS[p]?p:'anthropic'; }
function getApiKey(prov){ prov=prov||aiProvider(); try{
  let k=localStorage.getItem(AI_PROVIDERS[prov].keyLS)||'';
  if(!k && prov==='anthropic'){ const legacy=localStorage.getItem('intopia_ai_key'); if(legacy){ localStorage.setItem(AI_PROVIDERS.anthropic.keyLS,legacy); localStorage.removeItem('intopia_ai_key'); k=legacy; } }
  return k;
}catch(e){ return ''; } }
function setApiKey(prov,k){ try{ k?localStorage.setItem(AI_PROVIDERS[prov].keyLS,k):localStorage.removeItem(AI_PROVIDERS[prov].keyLS); }catch(e){} }
function aiModel(prov){ prov=prov||aiProvider(); const m=S.ai&&S.ai.models&&S.ai.models[prov]; return m||AI_PROVIDERS[prov].defModel; }

/* Build a compact, labelled factual snapshot the model must ground on. */
function buildAIContext(){
  const q=S.activeQuarter, Q=S.quarters[q], f=Q.financial, op=Q.operational, g=S.config.goals;
  const L=[];
  L.push(`# הקשר נתונים — חברה 8, רבעון פעיל ${q}`);
  L.push(`## מצב פיננסי (רבעון ${q})`);
  REGIONS.forEach(r=> L.push(`- מזומן ${r.name}: ${fmt(f.cash[r.id]||0)} ${r.cur}  [מקור: רבעון ${q}/מזומן/${r.id}]`));
  L.push(`- מזומן מאוחד (שווי-USD, שערים מהקונפיגורציה): ${fmt(unifiedCashOf(q))}  [מחושב במנוע]`);
  L.push(`- רווח נקי: ${fmt(f.netProfit)} · מחזור: ${fmt(f.revenue)} · רווחים צבורים: ${fmt(f.retainedEarnings)}`);
  L.push(`- הלוואות/חוב: ${fmt(f.loans)} · אשראי ספקים: ${fmt(f.supplierCredit)} · A/P: ${fmt(f.ap)} · A/R: ${fmt(f.ar)}`);
  if(f.roe) L.push(`- ROE: ${f.roe}% · ROS: ${f.ros}%`);
  L.push(`## תפעול`);
  L.push(`- רמות טכנולוגיה: X=${op.techX}, Y=${op.techY} · מפעלים=${op.factories} · משרדים=${op.offices} · Max Producible=${op.maxProducible} · מו״פ=${fmt(op.rd)}`);
  if(op.inventory.length) L.push(`- מלאי: ${op.inventory.map(i=>`${i.product||'?'}${i.grade?'/'+i.grade:''} כמות ${fmt(i.qty)} עלות ${fmt(i.cost)} מחיר ${i.price>0?fmt(i.price):'(אין מחיר)'}`).join(' ; ')}`);
  L.push(`## יעדים (קונפיגורציית הצוות)`);
  L.push(`- רצפת מזומן ${q}: ${fmt(g.floors[q]||0)} · יעדי טכנולוגיה X=${g.techXTarget} Y=${g.techYTarget} · תקרת חוב=${fmt(g.debtCeiling)}`);
  const alerts=computeAlerts(q);
  L.push(`## נורות פעילות (${alerts.length})`);
  alerts.forEach(a=> L.push(`- [${a.level==='red'?'אדום':'כתום'}] ${a.title}: ${a.desc.replace(/<[^>]+>/g,'')}`));
  const proj=projectCashflow(q,null);
  L.push(`## הקרנת תזרים (מנוע דטרמיניסטי, מצב "כפי שהוא")`);
  proj.forEach(p=> L.push(`- ${p.q}: מזומן מאוחד ${fmt(p.unified)} · רצפה ${fmt(p.floor)} · ${p.breach?'שבירה':'תקין'} (מרחק ${fmt(p.distance)})`));
  if(S.scenarios.length){ L.push(`## תרחישים שמורים`);
    S.scenarios.forEach(sc=>{ const sp=scoreProxy(sc.levers); L.push(`- "${sc.name}": מזומן סופי ${fmt(sp.endCash)} · שבירות ${sp.breaches} · פרוקסי ציון ${sp.value.toFixed(0)}`); }); }
  return L.join('\n');
}
const AI_SYSTEM = `אתה יועץ אנליטי לצוות ניהול בסימולציית העסקים INTOPIA (חברה 8). ענֵה בעברית עסקית ישירה, RTL.
כללי ברזל:
1. עוגן-נתונים בלבד: בסס כל טענה אך ורק על "הקשר הנתונים" שסופק, על חוקי המשחק המפורשים, ועל הנחות שתצהיר עליהן. אל תמציא מספרים.
2. ציטוט: לכל טענה מספרית ציין מקור (רבעון/שדה או "מחושב במנוע"). אם נתון חסר — אמור "לא ידוע / לא נקלט" במפורש.
3. כנות אפיסטמית: הבחן בין מאומת / משוחזר / אומדן. אומדנים הצג כטווח, לא כנקודה. סמן "לא מכויל" כשאין בסיס.
4. חישוביות: אל תבצע אריתמטיקה מורכבת "בראש" — התבסס על המספרים המחושבים שסופקו. אם נדרש חישוב שלא סופק, אמור זאת והצע להריץ בסימולטור.
5. תמציתיות: תשובות קצרות וממוקדות-החלטה. בלי מילוי.`;

async function callLLM(messages, system, opts={}){
  const prov=aiProvider(), key=getApiKey(prov);
  if(!key) throw new Error('NO_KEY');
  const readErr=async(res)=>{ let msg=res.status+' '+res.statusText; try{ const j=await res.json(); if(j.error&&j.error.message)msg=j.error.message; }catch(e){} return msg; };
  if(prov==='openai'){
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{ 'content-type':'application/json', 'Authorization':'Bearer '+key },
      body:JSON.stringify({ model:aiModel(), max_tokens:opts.max_tokens||1200,
        messages:[{role:'system',content:system},...messages] }),
    });
    if(!res.ok) throw new Error(await readErr(res));
    const data=await res.json();
    return ((data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'').trim();
  }
  // Anthropic (default)
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({ model:aiModel(), max_tokens:opts.max_tokens||1200, system, messages }),
  });
  if(!res.ok) throw new Error(await readErr(res));
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}

      </div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr))">
        ${analyses.map(a=>`<div class="card pad"><b style="color:var(--purple)">${esc(a.name)}</b><div class="small" style="margin-top:6px;line-height:1.6;white-space:pre-wrap">${esc(a.txt)}</div></div>`).join('')}
      </div>`;
  }catch(e){ out.innerHTML=`<div class="tag r">${esc(aiErr(e))}</div>`; }
  btn.disabled=false; btn.textContent='כנס מועצה';
};

/* ---------- Shared UI helpers ---------- */
function emptyBlock(ic,title,desc,actions=''){ return `<div class="card"><div class="empty"><div class="ic">${ic}</div><h3 style="margin-bottom:6px">${title}</h3><div class="muted" style="max-width:420px;margin:0 auto 16px">${desc}</div>${actions}</div></div>`; }
function emptyBlockInline(ic,title,desc){ return `<div class="empty"><div class="ic">${ic}</div><b>${title}</b><div class="muted" style="max-width:420px;margin:6px auto 0">${desc}</div></div>`; }
function openModal(title,body,footer){
  $('#modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="mh"><h3>${title}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="mb">${body}</div>${footer!==''?`<div class="mf"><button class="btn ghost" onclick="closeModal()">ביטול</button>${footer}</div>`:''}</div></div>`;
}
window.closeModal=()=>{ $('#modalRoot').innerHTML=''; };

/* ---------- Data backup / restore ---------- */
$('#btnExportData').onclick=()=>{
  const stamp=new Date().toISOString().slice(0,10);
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`intopia_backup_${stamp}.json`; a.click();
  toast('גיבוי נתונים הורד ✓','g');
};
$('#btnImportData').onclick=()=> $('#importFile').click();
$('#importFile').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    let incoming;
    try{ incoming=JSON.parse(ev.target.result); }
    catch(err){ toast('קובץ לא תקין — לא JSON','r'); return; }
    if(!incoming || !incoming.quarters || !incoming.config){ toast('הקובץ אינו גיבוי אינטופיה תקין','r'); return; }
    const qCount=Object.values(incoming.quarters).filter(q=>q&&q.entered).length;
    openModal('שחזור מגיבוי', `
      <div class="small" style="line-height:1.7">פעולה זו <b style="color:var(--red)">תחליף</b> את כל הנתונים הנוכחיים בתוכן הקובץ:
      <div class="chip" style="margin-top:10px">${esc(file.name)}</div>
      <ul style="padding-inline-start:20px;margin:12px 0 0">
        <li>רבעונים שנקלטו: <b>${qCount}</b></li>
        <li>תרחישים: <b>${(incoming.scenarios||[]).length}</b></li>
        <li>החלטות ביומן: <b>${(incoming.decisions||[]).length}</b></li>
      </ul>
      <div class="muted" style="margin-top:10px">מומלץ להוריד גיבוי של המצב הנוכחי לפני שחזור.</div></div>`,
      `<button class="btn primary" onclick="doImport()">החלף והמשך</button>`);
    window._pendingImport=incoming;
  };
  reader.readAsText(file);
  e.target.value=''; // allow re-selecting same file
};
window.doImport=()=>{
  const incoming=window._pendingImport; if(!incoming)return;
  S=deepMerge(defaultState(), incoming);
  save(); closeModal();
  renderNav(); renderQuarterSelect(); renderQBox(); go('dashboard');
  toast('הנתונים שוחזרו מהגיבוי ✓','g'); window._pendingImport=null;
};

/* =========================================================================
   TEAM SYNC (F9) — live shared state via Firebase Realtime Database (REST).
   Bring-your-own backend: config stored locally, NOT in the JSON backup.
   Model: last-write-wins with a "who edited last" indicator (F9.2). Suited to
   the classroom turn-based workflow; not a CRDT. Fully optional — the app
   works entirely offline without it.
   ========================================================================= */
const SYNC_LS='intopia_sync_cfg';
const sync={ cfg:null, es:null, connected:false, applying:false, clientId:uid(), lastPushedAt:0, pushTimer:null };
function getSyncCfg(){ try{ const r=localStorage.getItem(SYNC_LS); return r?JSON.parse(r):null; }catch(e){ return null; } }
function setSyncCfg(c){ try{ c?localStorage.setItem(SYNC_LS,JSON.stringify(c)):localStorage.removeItem(SYNC_LS); }catch(e){} sync.cfg=c; }
function normalizeDbUrl(u){
  u=(u||'').trim(); if(!u) return '';
  u=u.replace(/^http:\/\//i,'https://');                 // Firebase is https-only
  if(!/^https:\/\//i.test(u)) u='https://'+u.replace(/^\/+/,''); // add scheme if missing
  try{ const x=new URL(u); return 'https://'+x.host; }catch(e){ return u.replace(/\/+$/,''); } // keep host only
}
function syncUrl(cfg){ return `${normalizeDbUrl(cfg.url)}/rooms/${encodeURIComponent(cfg.room||'')}.json${cfg.auth?('?auth='+encodeURIComponent(cfg.auth)):''}`; }
function setSyncDot(color,title){ const d=$('#syncDot'); if(d){ d.style.background=color; d.parentElement.title=title||'סנכרון צוותי'; } }

function connectSync(){
  const cfg=getSyncCfg(); sync.cfg=cfg;
  if(!cfg||!cfg.url||!cfg.room){ setSyncDot('var(--muted2)','לא מחובר'); return; }
  disconnectSync();
  try{
    const es=new EventSource(syncUrl(cfg));
    es.addEventListener('put', onSyncEvent);
    es.addEventListener('patch', onSyncEvent);
    es.onopen=()=>{ sync.connected=true; setSyncDot('var(--green)','מסונכרן — '+cfg.room); };
    es.onerror=()=>{ setSyncDot('var(--amber)','מתחבר מחדש…'); };
    sync.es=es; sync.connected=true;
  }catch(e){ setSyncDot('var(--red)','שגיאת חיבור'); }
}
function disconnectSync(){ if(sync.es){ try{ sync.es.close(); }catch(e){} sync.es=null; } sync.connected=false; }
function onSyncEvent(e){
  let msg; try{ msg=JSON.parse(e.data); }catch(err){ return; }
  if(!msg) return;
  if(msg.path==='/'){ if(msg.data) applyRemote(msg.data); }
  else { fetchRemoteAndApply(); } // nested patch — refetch whole room
}
function fetchRemoteAndApply(){
  const cfg=sync.cfg; if(!cfg)return;
  fetch(syncUrl(cfg)).then(r=>r.json()).then(d=>{ if(d)applyRemote(d); }).catch(()=>{});
}
function applyRemote(remote){
  if(!remote||!remote.quarters||!remote.config) return;
  // ignore our own echo
  if(remote.meta && remote.meta.syncOrigin===sync.clientId && remote.meta.lastEdited===sync.lastPushedAt) return;
  sync.applying=true;
  S=deepMerge(defaultState(), remote);
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
  sync.applying=false;
  renderNav(); renderQuarterSelect(); renderQBox();
  if(currentPage) go(currentPage);
  setSyncDot('var(--green)','עודכן ע״י '+(remote.meta&&remote.meta.lastEditor||'צוות'));
}
function schedulePush(){ clearTimeout(sync.pushTimer); sync.pushTimer=setTimeout(pushSync,400); }
function pushSync(){
  const cfg=sync.cfg; if(!sync.connected||!cfg) return;
  S.meta.syncOrigin=sync.clientId; sync.lastPushedAt=S.meta.lastEdited;
  fetch(syncUrl(cfg),{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(S)})
    .then(r=>{ if(!r.ok) setSyncDot('var(--red)','שגיאת כתיבה ('+r.status+')'); else setSyncDot('var(--green)','מסונכרן'); })
    .catch(()=>setSyncDot('var(--amber)','אין חיבור'));
}
$('#btnSync').onclick=()=>{
  const cfg=getSyncCfg()||{url:'',room:'',auth:'',name:''};
  openModal('סנכרון צוותי (F9)',`
    <div class="small muted" style="margin-bottom:12px">מצב משותף חי לכל הצוות דרך Firebase Realtime Database (חינם). ההגדרות נשמרות מקומית בלבד ואינן נכללות בגיבוי.
    כל שינוי אצל חבר צוות אחד מתעדכן אצל כולם. מודל: "העריכה האחרונה מנצחת" + סימון מי ערך אחרון.</div>
    <div class="field"><label class="fl">Firebase Database URL</label>
      <input class="f" id="syncUrl" value="${esc(cfg.url)}" placeholder="https://your-project-default-rtdb.firebaseio.com"></div>
    <div class="row" style="gap:10px">
      <div class="field" style="flex:1"><label class="fl">קוד חדר צוות</label><input class="f" id="syncRoom" value="${esc(cfg.room)}" placeholder="company8"></div>
      <div class="field" style="flex:1"><label class="fl">השם שלך</label><input class="f" id="syncName" value="${esc(cfg.name)}" placeholder="עידו (COO)"></div>
    </div>
    <div class="field"><label class="fl">Auth secret (אופציונלי)</label><input class="f" id="syncAuth" type="password" value="${esc(cfg.auth)}" placeholder="למסד מאובטח בלבד"></div>
    <details class="small muted"><summary style="cursor:pointer">איך מקימים? (3 דקות)</summary>
      <ol style="padding-inline-start:18px;line-height:1.8;margin:8px 0 0">
        <li>console.firebase.google.com ← Add project</li>
        <li>Build ← Realtime Database ← Create ← Start in test mode</li>
        <li>העתק את ה-URL לשדה למעלה, בחר קוד חדר משותף, ולחץ התחבר</li>
        <li>כל הצוות מזין אותו URL + אותו קוד חדר</li>
      </ol>
      <div style="color:var(--amber)">${IC('warn')} test mode פתוח לקריאה/כתיבה — למשחק כיתתי סביר; לאבטחה מלאה הגדר rules + auth.</div>
    </details>`,
    `${getSyncCfg()?`<button class="btn danger" onclick="disconnectSyncUI()">נתק</button><button class="btn" onclick="copyShareLink()">${IC('share')} העתק לינק שיתוף</button>`:''}<button class="btn primary" onclick="saveSyncCfg()">התחבר</button>`);
};
function buildShareLink(url,room){
  const base=location.origin+location.pathname;
  return base+'#room='+encodeURIComponent(room)+'&db='+encodeURIComponent(normalizeDbUrl(url));
}
window.copyShareLink=()=>{
  const cfg=getSyncCfg()||{};
  const url=($('#syncUrl')?.value||cfg.url||'').trim(), room=($('#syncRoom')?.value||cfg.room||'').trim();
  if(!url||!room){ toast('התחבר קודם (URL + קוד חדר)','r'); return; }
  const link=buildShareLink(url,room);
  const done=()=>toast('לינק השיתוף הועתק — שלח לצוות ✓','g');
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(done).catch(()=>showShareLink(link)); }
  else showShareLink(link);
};
function showShareLink(link){
  openModal('לינק שיתוף לחלל העבודה', `
    <div class="small muted" style="margin-bottom:8px">שלח את הלינק לצוות — לחיצה עליו תחבר אותם אוטומטית לאותו מצב שמור:</div>
    <input class="f" value="${esc(link)}" onclick="this.select()" readonly>
    <div class="small muted" style="margin-top:8px">${IC('warn')} כל מי שיש לו את הלינק יכול לצפות ולערוך את נתוני הצוות.</div>`, '');
}
function applyShareLink(){
  try{
    const h=location.hash||''; if(!/(?:room|db)=/.test(h)) return false;
    const params=new URLSearchParams(h.replace(/^#/,''));
    const db=params.get('db'), room=params.get('room');
    if(db&&room){ const existing=getSyncCfg()||{};
      setSyncCfg({url:normalizeDbUrl(db), room:room, name:existing.name||'', auth:existing.auth||''});
      try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){ location.hash=''; } // clean the URL
      return true;
    }
  }catch(e){}
  return false;
}
window.saveSyncCfg=()=>{
  const url=normalizeDbUrl($('#syncUrl').value);
  const cfg={url, room:$('#syncRoom').value.trim(), name:$('#syncName').value.trim(), auth:$('#syncAuth').value.trim()};
  if(!cfg.url||!cfg.room){ toast('נדרשים URL וקוד חדר','r'); return; }
  if(!/firebaseio\.com$|firebasedatabase\.app$/i.test(url)){
    toast('כתובת לא נראית כמו Realtime Database (צריכה להסתיים ב-firebaseio.com או firebasedatabase.app)','r'); return;
  }
  setSyncCfg(cfg); closeModal();
  // pull existing room state first, then connect + push if room empty
  fetch(syncUrl(cfg)).then(r=>{
    if(!r.ok) throw new Error('סטטוס '+r.status+' — בדוק את חוקי ה-Database (Rules: read/write=true)');
    return r.json();
  }).then(d=>{
    if(d&&d.quarters){ applyRemote(d); toast('התחבר — מצב הצוות נטען ✓','g'); }
    else { connectSync(); pushSync(); toast('התחבר — חדר חדש נוצר ✓','g'); return; }
    connectSync();
  }).catch(e=>{
    const net=/failed to fetch|networkerror|load failed/i.test(e.message);
    toast('שגיאת חיבור: '+(net?'לא ניתן להגיע לכתובת. ודא https://, שזו Realtime Database, ושאין חוסם פרסומות':e.message),'r');
    setSyncDot('var(--red)','שגיאה');
  });
};
window.disconnectSyncUI=()=>{ disconnectSync(); setSyncCfg(null); setSyncDot('var(--muted2)','לא מחובר'); closeModal(); toast('הסנכרון נותק'); };

/* ---------- Boot ---------- */
window.go=go;
function boot(){
  load();
  const joined=applyShareLink();
  renderNav(); renderQuarterSelect(); renderQBox(); go('dashboard');
  const ver=$('#appVer'); if(ver) ver.textContent=APP_VERSION;
  document.title=`Group 8 — EMBA 41 — TAU · INTOPIA ${APP_VERSION}`;
  window.addEventListener('resize',()=>{ if(currentPage==='dashboard')drawTrend($('#trendChart')); });
  if(getSyncCfg()) connectSync();
  if(joined) setTimeout(()=>toast('התחברת לחלל העבודה המשותף של הצוות ✓','g'),400);
}
boot();
</script>
