<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חמ״ל אינטופיה — INTOPIA War Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0b1020; --bg2:#111830; --panel:#161f3a; --panel2:#1c2749;
  --line:#26315a; --line2:#334072;
  --txt:#e8ecf7; --muted:#93a0c4; --muted2:#6b78a0;
  --accent:#4f8cff; --accent2:#7aa7ff;
  --green:#2ec7a0; --greenbg:#123a30;
  --red:#ff5d6c; --redbg:#3a1420;
  --amber:#ffb54d; --amberbg:#3a2a10;
  --purple:#a78bfa;
  --radius:14px; --radius-sm:9px;
  --shadow:0 8px 28px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Assistant',system-ui,sans-serif;
  background:radial-gradient(1200px 700px at 80% -10%,#16224a 0%,transparent 60%),var(--bg);
  color:var(--txt); min-height:100vh; font-size:15px; line-height:1.5;
}
h1,h2,h3,h4{font-family:'Rubik',sans-serif;margin:0;font-weight:700}
.num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:isolate;display:inline-block}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--accent2)}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.side{
  width:230px;flex-shrink:0;background:linear-gradient(180deg,#0d1428,#0b1020);
  border-inline-start:1px solid var(--line);position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;padding:18px 12px;gap:6px;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));
  display:grid;place-items:center;font-family:'Rubik';font-weight:800;font-size:18px;color:#fff;box-shadow:0 4px 14px rgba(79,140,255,.4)}
.brand .t1{font-family:'Rubik';font-weight:700;font-size:15px;line-height:1.1}
.brand .t2{font-size:11px;color:var(--muted);letter-spacing:.5px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:start;
  background:transparent;border:0;color:var(--muted);padding:10px 12px;border-radius:10px;
  font-size:14.5px;font-weight:600;transition:.15s;position:relative;
}
.nav button .ic{font-size:17px;width:22px;text-align:center;filter:grayscale(.3)}
.nav button:hover{background:var(--panel);color:var(--txt)}
.nav button.active{background:linear-gradient(90deg,rgba(79,140,255,.18),rgba(79,140,255,.04));color:#fff}
.nav button.active::before{content:"";position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.nav .badge{margin-inline-start:auto;background:var(--red);color:#fff;border-radius:20px;font-size:11px;min-width:19px;height:19px;
  display:grid;place-items:center;padding:0 5px;font-weight:700}
.nav .sec{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;padding:12px 12px 4px;font-weight:700}
.side .qbox{margin-top:auto;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;font-size:12px}
.side .qbox b{color:var(--accent2)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--line);
  background:rgba(11,16,32,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;
}
.topbar h2{font-size:19px}
.topbar .sub{color:var(--muted);font-size:13px}
.topbar .spacer{flex:1}
.qsel{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:5px 8px}
.qsel label{font-size:12px;color:var(--muted)}
.qsel select{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:7px;padding:5px 8px;font-weight:700}
.content{padding:24px 26px 60px;max-width:1400px;width:100%}

/* ===== Components ===== */
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:18px}
.card h3{font-size:16px;margin-bottom:2px}
.card .ch{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
.card .ch h3{flex:1}
.card .cb{padding:16px 18px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
.tag.g{background:var(--greenbg);color:var(--green);border-color:transparent}
.tag.r{background:var(--redbg);color:var(--red);border-color:transparent}
.tag.a{background:var(--amberbg);color:var(--amber);border-color:transparent}
.tag.b{background:rgba(79,140,255,.15);color:var(--accent2);border-color:transparent}

.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:9px;padding:9px 15px;font-weight:700;font-size:14px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#243157;border-color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#3f7bef);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(79,140,255,.35)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.danger{background:var(--redbg);color:var(--red);border-color:transparent}
.btn.sm{padding:6px 11px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}

input.f,select.f,textarea.f{
  background:var(--bg);color:var(--txt);border:1px solid var(--line2);border-radius:8px;padding:8px 10px;width:100%;
}
input.f:focus,select.f:focus,textarea.f:focus{outline:none;border-color:var(--accent)}
label.fl{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field{margin-bottom:12px}

table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
table.tbl th{text-align:start;color:var(--muted);font-weight:700;font-size:12px;padding:9px 10px;border-bottom:1px solid var(--line2);white-space:nowrap}
table.tbl td{padding:8px 10px;border-bottom:1px solid var(--line)}
table.tbl tr:hover td{background:rgba(255,255,255,.02)}
table.tbl input.f{padding:5px 7px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi .l{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.kpi .v{font-size:24px;font-weight:800;font-family:'Rubik'}
.kpi .d{font-size:12px;margin-top:3px;font-weight:600}
.kpi .d.up{color:var(--green)} .kpi .d.dn{color:var(--red)}

/* Alerts */
.alert{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border-radius:11px;border:1px solid var(--line);margin-bottom:10px;background:var(--panel)}
.alert.on{border-inline-start:4px solid}
.alert.red{border-inline-start-color:var(--red);background:linear-gradient(90deg,var(--redbg),var(--panel))}
.alert.amber{border-inline-start-color:var(--amber);background:linear-gradient(90deg,var(--amberbg),var(--panel))}
.alert.ok{border-inline-start:4px solid var(--green)}
.alert .dot{font-size:20px;line-height:1}
.alert .txt{flex:1}
.alert .txt b{display:block;font-size:14.5px}
.alert .txt span{color:var(--muted);font-size:13px}

/* Dropzone */
.drop{border:2px dashed var(--line2);border-radius:16px;padding:44px 20px;text-align:center;transition:.2s;background:var(--panel)}
.drop.hover{border-color:var(--accent);background:rgba(79,140,255,.08)}
.drop .big{font-size:44px;margin-bottom:8px}

/* charts */
canvas{display:block;max-width:100%}

/* toast */
#toast{position:fixed;bottom:22px;inset-inline-start:50%;transform:translateX(50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#0f1730;border:1px solid var(--line2);border-inline-start:4px solid var(--accent);border-radius:10px;padding:11px 18px;box-shadow:var(--shadow);font-weight:600;animation:tin .3s}
.toast.g{border-inline-start-color:var(--green)} .toast.r{border-inline-start-color:var(--red)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(4,7,16,.72);backdrop-filter:blur(3px);z-index:50;display:grid;place-items:center;padding:20px}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow);max-width:620px;width:100%;max-height:86vh;overflow:auto}
.modal .mh{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal .mh h3{flex:1}
.modal .mb{padding:20px}
.modal .mf{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line)}
.x{background:transparent;border:0;color:var(--muted);font-size:22px;line-height:1;cursor:pointer}

.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ic{font-size:40px;opacity:.5;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:4px 11px;font-size:12.5px;font-weight:600}
.hr{height:1px;background:var(--line);margin:16px 0;border:0}
.src{font-size:11px;color:var(--muted2);font-style:italic}
.pill-tabs{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap}
.pill-tabs button{background:transparent;border:0;color:var(--muted);padding:7px 14px;border-radius:8px;font-weight:700;font-size:13.5px}
.pill-tabs button.active{background:var(--accent);color:#fff}
.checklist{padding:0;margin:0;list-style:none}
.checklist li{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
.check{width:20px;height:20px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0;display:grid;place-items:center;margin-top:1px}
.check.done{background:var(--green);border-color:var(--green);color:#04120c}
@media(max-width:860px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;overflow-x:auto}
  .nav{flex-direction:row;flex-wrap:wrap}
  .nav .sec,.side .qbox{display:none}
  .content{padding:16px}
  .grid[style*="1.15fr"],.grid[style*="1.3fr"],.grid[style*="1fr 1fr"]{grid-template-columns:1fr !important}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">ח</div>
      <div>
        <div class="t1">חמ״ל אינטופיה</div>
        <div class="t2">INTOPIA WAR ROOM</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="qbox">
      רבעון פעיל: <b id="qboxNow">—</b><br>
      עודכן לאחרונה: <span id="qboxEdit" class="muted">—</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h2 id="pageTitle">דשבורד</h2>
        <div class="sub" id="pageSub">תמונת מצב חברה 8</div>
      </div>
      <div class="spacer"></div>
      <div class="qsel">
        <label>רבעון</label>
        <select id="quarterSelect"></select>
      </div>
      <button class="btn sm ghost" id="btnExportData" title="הורדת גיבוי נתונים (JSON)">⬇︎ גיבוי</button>
      <button class="btn sm ghost" id="btnImportData" title="שחזור מגיבוי / טעינת מצב מהצוות">⬆︎ שחזור</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toast"></div>
<div id="modalRoot"></div>

<script>
/* =========================================================================
   INTOPIA War Room — client-side decision-support app (MVP)
   Single-file, localStorage-persisted, Hebrew RTL.
   Three layers — facts (extracted data), model (deterministic engine),
   goals (team configuration). Strategy is configuration, not code.
   ========================================================================= */

const QUARTERS = ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9'];
const REGIONS  = [
  {id:'home',   name:'מטה (Home)',  cur:'USD'},
  {id:'europe', name:'אירופה',      cur:'EUR'},
  {id:'brazil', name:'ברזיל',       cur:'BRL'},
];
const PERSONAS = ['CEO','CFO','COO','CMO','R&D/מודיעין'];
const FX = {USD:1, EUR:1.08, BRL:0.20}; // display-only USD-equivalent rates (editable in params later)

/* ---------- Persistence ---------- */
const LS_KEY = 'intopia_warroom_v1';
let S = null;

function emptyQuarter(){
  return {
    entered:false,
    financial:{
      cash:{}, retainedEarnings:0, netProfit:0, revenue:0, roe:0, roi:0, ros:0,
      ap:0, ar:0, supplierCredit:0, loans:0,
    },
    operational:{ inventory:[], techX:0, techY:0, maxProducible:0, factories:0, offices:0, rd:0 },
    marketIntel:[],
  };
}
function defaultState(){
  const q={}; QUARTERS.forEach(k=> q[k]=emptyQuarter());
  return {
    activeQuarter:'Q3',
    config:{
      goals:{ floors:{Q1:0,Q2:0,Q3:0,Q4:0,Q5:0,Q6:0,Q7:0,Q8:0,Q9:0},
        techXTarget:0, techYTarget:0, debtCeiling:0, endInventoryTarget:0 },
      contracts:[],
      params:{
        collection:{ home:[100,0,0], europe:[50,20,30], brazil:[30,30,40] },
        tax:{home:34, europe:30, brazil:25},
        interest:{bank:10, supplierCredit:11, h4:12, securities:6},
        productionPay:[100,0],
      },
    },
    quarters:q,
    scenarios:[],
    decisions:[],
    meta:{lastEditor:'', lastEdited:0},
  };
}
function load(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ S=deepMerge(defaultState(),JSON.parse(raw)); return; } }
  catch(e){ console.warn('load failed',e); }
  S=defaultState();
}
function deepMerge(base, over){
  if(Array.isArray(over)) return over;
  if(over && typeof over==='object' && base && typeof base==='object' && !Array.isArray(base)){
    const out={...base};
    for(const k in over){ out[k]=(k in base)?deepMerge(base[k],over[k]):over[k]; }
    return out;
  }
  return over===undefined?base:over;
}
let saveTimer=null;
function save(silent){
  S.meta.lastEdited=Date.now();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ try{ localStorage.setItem(LS_KEY,JSON.stringify(S)); }catch(e){ toast('שגיאת שמירה: '+e.message,'r'); } },120);
  if(!silent) renderQBox();
}

/* ---------- Utilities ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = ()=>Math.random().toString(36).slice(2,9);
function fmt(n,dec=0){ if(n===null||n===undefined||isNaN(n))return '—';
  return Number(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function qIndex(q){ return QUARTERS.indexOf(q); }
function nextQuarters(from){ return QUARTERS.slice(qIndex(from)+1); }
function toast(msg,cls=''){
  const el=document.createElement('div'); el.className='toast '+cls; el.textContent=msg;
  $('#toast').appendChild(el); setTimeout(()=>{el.style.opacity=0;el.style.transition='.4s';setTimeout(()=>el.remove(),400);},2600);
}
function relTime(ts){ if(!ts)return '—'; const s=(Date.now()-ts)/1000;
  if(s<60)return 'זה עתה'; if(s<3600)return Math.floor(s/60)+' דק׳'; if(s<86400)return Math.floor(s/3600)+' שע׳';
  return new Date(ts).toLocaleDateString('he-IL'); }

/* ---------- Navigation ---------- */
const PAGES = [
  {id:'dashboard', ic:'📊', name:'דשבורד',   sub:'תמונת מצב, נורות ומגמות', sec:'ניתוח'},
  {id:'ingest',    ic:'📥', name:'קליטת דוח', sub:'העלאה, חילוץ ואימות נתונים', sec:'ניתוח'},
  {id:'cashflow',  ic:'💧', name:'תזרים',     sub:'הקרנת מזומן עד Q9 מול רצפות', sec:'ניתוח'},
  {id:'intel',     ic:'🔭', name:'מודיעין',   sub:'מתחרים, מגמות והמלצות MR', sec:'ניתוח'},
  {id:'sim',       ic:'🎛️', name:'סימולטור',  sub:'תרחישים, מנופים והשוואה', sec:'החלטה'},
  {id:'export',    ic:'📤', name:'ייצוא הזנה', sub:'גיליון הזנה + צ׳ק-ליסט הגשה', sec:'החלטה'},
  {id:'journal',   ic:'📓', name:'יומן החלטות', sub:'החלטות, רציונל ומאשרים', sec:'החלטה'},
  {id:'goals',     ic:'🎯', name:'יעדים',     sub:'רצפות, חוזים ופרמטרי מודל', sec:'קונפיגורציה'},
];
let currentPage='dashboard';
function renderNav(){
  const nav=$('#nav'); nav.innerHTML=''; let lastSec=null;
  PAGES.forEach(p=>{
    if(p.sec!==lastSec){ const h=document.createElement('div');h.className='sec';h.textContent=p.sec;nav.appendChild(h);lastSec=p.sec; }
    const b=document.createElement('button'); b.className=(p.id===currentPage?'active':''); b.dataset.page=p.id;
    let badge=''; if(p.id==='dashboard'){ const n=activeAlerts().filter(a=>a.level==='red').length; if(n)badge=`<span class="badge">${n}</span>`; }
    b.innerHTML=`<span class="ic">${p.ic}</span><span>${p.name}</span>${badge}`;
    b.onclick=()=>go(p.id); nav.appendChild(b);
  });
}
function go(id){
  currentPage=id; renderNav();
  const p=PAGES.find(x=>x.id===id);
  $('#pageTitle').textContent=p.name; $('#pageSub').textContent=p.sub;
  const c=$('#content'); c.innerHTML=''; PAGE_RENDER[id](c); window.scrollTo(0,0);
}
function renderQuarterSelect(){
  const sel=$('#quarterSelect'); sel.innerHTML='';
  QUARTERS.forEach(q=>{ const o=document.createElement('option'); o.value=q;
    o.textContent=q+(S.quarters[q].entered?' ✓':''); if(q===S.activeQuarter)o.selected=true; sel.appendChild(o); });
  sel.onchange=()=>{ S.activeQuarter=sel.value; save(); go(currentPage); };
}
function renderQBox(){ $('#qboxNow').textContent=S.activeQuarter; $('#qboxEdit').textContent=relTime(S.meta.lastEdited); }

/* =========================================================================
   DETERMINISTIC ENGINE  (F4 cash-flow, F3 alerts, scoring proxy)
   ========================================================================= */
function unifiedCashOf(q){
  const fin=S.quarters[q].financial; let sum=0;
  REGIONS.forEach(r=> sum += (fin.cash[r.id]||0)*(FX[r.cur]||1)); return sum;
}
function inventoryValue(q){ return S.quarters[q].operational.inventory.reduce((a,i)=>a+(i.qty||0)*(i.cost||0),0); }

function projectCashflow(baseQuarter, leversByQuarter){
  const p=S.config.params;
  let bal={}; REGIONS.forEach(r=> bal[r.id]=S.quarters[baseQuarter].financial.cash[r.id]||0);
  const out=[]; const startIdx=qIndex(baseQuarter); let pipeline=[];
  const push=(region,fromIdx,amount)=>{ const sched=p.collection[region]||[100,0,0];
    sched.forEach((pct,k)=>{ if(pct>0 && fromIdx+k<QUARTERS.length) pipeline.push({region,q:QUARTERS[fromIdx+k],amount:amount*pct/100}); }); };
  for(let i=startIdx+1;i<QUARTERS.length;i++){
    const q=QUARTERS[i]; const lev=(leversByQuarter&&leversByQuarter[q])||{};
    REGIONS.forEach(r=>{
      const rl=(lev.regions&&lev.regions[r.id])||{};
      const sales=rl.sales||0, prodCost=(rl.production||0)*(rl.unitCost||0), adv=rl.advertising||0,
            invest=rl.invest||0, transferIn=rl.transferIn||0, rd=(lev.rd||0)/REGIONS.length;
      if(sales) push(r.id,i,sales);
      bal[r.id] -= (prodCost*(p.productionPay[0]/100)) + adv + invest + rd - transferIn;
    });
    pipeline.filter(x=>x.q===q).forEach(x=> bal[x.region]+=x.amount);
    const loans=S.quarters[baseQuarter].financial.loans||0;
    bal.home -= loans*(p.interest.bank/100)/4;
    const cashByRegion={...bal};
    let unified=0; REGIONS.forEach(r=> unified += cashByRegion[r.id]*(FX[r.cur]||1));
    const floor=S.config.goals.floors[q]||0;
    out.push({q,cashByRegion,unified,floor,breach:unified<floor,distance:unified-floor});
  }
  return out;
}
function scoreProxy(leversByQuarter){
  const base=S.activeQuarter;
  const proj=projectCashflow(base,leversByQuarter);
  const endCash=proj.length?proj[proj.length-1].unified:unifiedCashOf(base);
  const breaches=proj.filter(x=>x.breach).length;
  const g=S.config.goals, op=S.quarters[base].operational;
  const techScore=((op.techX>=g.techXTarget&&g.techXTarget>0?1:(g.techXTarget>0?op.techX/g.techXTarget:0))+
                   (op.techY>=g.techYTarget&&g.techYTarget>0?1:(g.techYTarget>0?op.techY/g.techYTarget:0)))/2;
  const cashScore=Math.max(0,Math.min(1,endCash/Math.max(1,(g.floors.Q9||1)*3)));
  const penalty=breaches*0.12;
  const raw=(0.5*cashScore + 0.35*(isFinite(techScore)?techScore:0) + 0.15*(op.rd>0?1:0)) - penalty;
  return {value:Math.max(0,Math.min(1,raw))*100, endCash, breaches};
}

  S.config.contracts.forEach(c=>{

    desc:`חוב ${fmt(Q.financial.loans)} מעל התקרה שהוגדרה (${fmt(g.debtCeiling)}).`});
  return out;
}

function kpi(label,val,delta){ return `<div class="kpi"><div class="l">${label}</div><div class="v num">${val}</div>${delta}</div>`; }
function deltaTag(now,prev){ if(prev===null||prev===undefined)return ''; const d=now-prev; if(!isFinite(d))return '';
  return `<div class="d ${d>=0?'up':'dn'}">${d>=0?'▲':'▼'} <span class="num">${fmt(Math.abs(d))}</span></div>`; }

function drawTrend(cv){
  if(!cv)return;
  const data=QUARTERS.map(q=> S.quarters[q].entered?unifiedCashOf(q):null);
  const floors=QUARTERS.map(q=>S.config.goals.floors[q]||0);
  lineChart(cv,{labels:QUARTERS,series:[
    {name:'מזומן',data,color:'#4f8cff',fill:true},
    {name:'רצפה',data:floors,color:'#ff5d6c',dash:true},
  ]});
}
function lineChart(cv,{labels,series}){
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||(cv.parentElement.clientWidth-36), H=cv.height;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const padL=48,padR=12,padT=14,padB=26;
  const all=series.flatMap(s=>s.data).filter(v=>v!==null&&!isNaN(v));
  if(!all.length){ ctx.fillStyle='#6b78a0';ctx.font='13px Assistant';ctx.fillText('אין נתונים',W/2-30,H/2);return; }
  let min=Math.min(...all,0), max=Math.max(...all,0); if(min===max)max=min+1;
  const pad=(max-min)*0.12; max+=pad; min-=pad;
  const x=i=> padL+(W-padL-padR)*(i/(labels.length-1||1));
  const y=v=> padT+(H-padT-padB)*(1-(v-min)/(max-min));
  ctx.strokeStyle='#26315a';ctx.lineWidth=1;ctx.fillStyle='#6b78a0';ctx.font='10px Assistant';ctx.textAlign='right';
  for(let g=0;g<=4;g++){ const v=min+(max-min)*g/4, yy=y(v);
    ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(W-padR,yy);ctx.stroke(); ctx.fillText(shortNum(v),padL-6,yy+3); }
  ctx.textAlign='center'; labels.forEach((l,i)=>ctx.fillText(l,x(i),H-8));
  series.forEach(s=>{
    ctx.strokeStyle=s.color;ctx.lineWidth=2.4; ctx.setLineDash(s.dash?[5,4]:[]);
    ctx.beginPath();let started=false;
    s.data.forEach((v,i)=>{ if(v===null||isNaN(v)){started=false;return;} const xx=x(i),yy=y(v);
      if(!started){ctx.moveTo(xx,yy);started=true;}else ctx.lineTo(xx,yy); }); ctx.stroke();
    if(s.fill){ ctx.setLineDash([]);
      const grad=ctx.createLinearGradient(0,padT,0,H-padB); grad.addColorStop(0,s.color+'44');grad.addColorStop(1,s.color+'00');
      // build fill only across contiguous points
      ctx.beginPath();let st=false;let firstI=0,lastI=0;
      s.data.forEach((v,i)=>{ if(v===null||isNaN(v))return; const xx=x(i),yy=y(v); if(!st){ctx.moveTo(xx,y(min));ctx.lineTo(xx,yy);st=true;firstI=i;}else ctx.lineTo(xx,yy); lastI=i; });
      if(st){ ctx.lineTo(x(lastI),y(min)); ctx.closePath(); ctx.fillStyle=grad; ctx.fill(); }
    }
    ctx.setLineDash([]);
    s.data.forEach((v,i)=>{ if(v===null||isNaN(v))return; ctx.beginPath();ctx.arc(x(i),y(v),3,0,7);ctx.fillStyle=s.color;ctx.fill(); });
  });
}
function shortNum(v){ const a=Math.abs(v); if(a>=1e6)return (v/1e6).toFixed(1)+'M'; if(a>=1e3)return (v/1e3).toFixed(0)+'K'; return fmt(v); }

function matchSheet(name){ const n=name.toLowerCase();
  if(/balance/.test(n))return'balance'; if(/income|profit|p&l/.test(n))return'income';
  if(/manag|mgmt|info/.test(n))return'mgmt'; if(/curren|fx|cash/.test(n))return'currency';
  if(/^mr|market research|mr\d/.test(n))return'mr'; return null; }
function parseNumber(v){
  if(typeof v==='number')return v; if(typeof v!=='string')return null;
  const neg=/^\(.*\)$/.test(v.trim());
  const cleaned=v.replace(/[(),\s€$₪R]/g,''); if(cleaned===''||isNaN(cleaned))return null;
  let n=parseFloat(cleaned); if(neg)n=-Math.abs(n); return n;
}
function parseWorkbook(wb){
  let found=[], mrCount=0; const scan={};
  wb.SheetNames.forEach(sn=>{
    const type=matchSheet(sn); const ws=wb.Sheets[sn];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(type==='mr'){ mrCount++; ingestMR(sn,rows); }
    rows.forEach(r=>{
      for(let i=0;i<r.length;i++){
        const cell=String(r[i]).toLowerCase().trim();
        const numAt=(j)=>{ for(let k=j+1;k<r.length;k++){ const v=parseNumber(r[k]); if(v!==null)return v; } return null; };
        const setOnce=(k,v)=>{ if(v!==null&&scan[k]===undefined){scan[k]=v;found.push(k);} };
        if(/net profit|net income|רווח נקי/.test(cell)) setOnce('netProfit',numAt(i));
        if(/revenue|total sales|מחזור|הכנסות/.test(cell)) setOnce('revenue',numAt(i));
        if(/retained/.test(cell)) setOnce('retainedEarnings',numAt(i));
        if(/loan|debt|הלוואה|חוב/.test(cell)) setOnce('loans',numAt(i));
        if(/accounts payable|a\/p|ספקים/.test(cell)) setOnce('ap',numAt(i));
        if(/accounts receivable|a\/r|לקוחות/.test(cell)) setOnce('ar',numAt(i));
        if(/supplier credit|אשראי ספק/.test(cell)) setOnce('supplierCredit',numAt(i));
        if(/home.*cash|cash.*home|מטה/.test(cell)) setOnce('cash_home',numAt(i));
        if(/europe|אירופ/.test(cell)) setOnce('cash_europe',numAt(i));
        if(/brazil|ברזיל/.test(cell)) setOnce('cash_brazil',numAt(i));
      }
    });
  });
  return {scan,mrCount,summary:`${found.length} שדות מזוהים`,applied:found};
}
function applyParsed({scan}){
  const f=S.quarters[S.activeQuarter].financial;
  ['netProfit','revenue','retainedEarnings','loans','ap','ar','supplierCredit'].forEach(k=>{ if(scan[k]!==undefined)f[k]=scan[k]; });
  ['home','europe','brazil'].forEach(r=>{ if(scan['cash_'+r]!==undefined)f.cash[r]=scan['cash_'+r]; });

}

  REGIONS.forEach((r,i)=>{ const rl=(lev&&lev.regions[r.id])||{}; rows.push({form:'H'+(i+1),action:`ייצור — ${r.name}`,value:rl.production||0,note:rl.unitCost?`עלות יח׳ ${fmt(rl.unitCost)}`:''}); });
  REGIONS.forEach((r,i)=>{ const rl=(lev&&lev.regions[r.id])||{}; rows.push({form:'A'+(i+1),action:`פרסום ומחיר — ${r.name}`,value:rl.advertising||0,note:rl.sales?`יעד מכירות ${fmt(rl.sales)}`:''}); });
  rows.push({form:'W1',action:'מו״פ (R&D)',value:(lev&&lev.rd)||0,note:''});
  rows.push({form:'W2',action:'העברות בין-אזוריות',value:REGIONS.reduce((a,r)=>a+((lev&&lev.regions[r.id]&&lev.regions[r.id].transferIn)||0),0),note:''});
  rows.push({form:'W3',action:'השקעות / מימון',value:REGIONS.reduce((a,r)=>a+((lev&&lev.regions[r.id]&&lev.regions[r.id].invest)||0),0),note:''});
  return rows;
}
function renderInputSheet(box,targetQ,sc){
  const rows=buildInputRows(targetQ,sc);
  box.innerHTML=`<table class="tbl"><thead><tr><th>טופס</th><th>פעולה</th><th>ערך</th><th>הערה</th><th>בוצע?</th></tr></thead>
    <tbody>${rows.map(r=>`<tr><td><span class="chip">${r.form}</span></td><td>${esc(r.action)}</td><td class="num">${fmt(r.value)}</td><td class="small muted">${esc(r.note)}</td><td style="text-align:center">☐</td></tr>`).join('')}</tbody></table>
    ${!sc?'<div class="small muted" style="margin-top:10px">אין תרחיש נבחר — צור תרחיש בסימולטור כדי לאכלס את הגיליון.</div>':''}`;
}
function renderChecklist(box,targetQ,sc){
  const Q=S.quarters[S.activeQuarter];
  const items=[
    {t:'מחיר מוזן לכל פריט מלאי',ok:Q.operational.inventory.every(i=>!(i.qty>0)||i.price>0)},
    {t:'טופס לכל פעולה מתוכננת',ok:!!sc},
    {t:'אין הזנת בסיס + Fallback במקביל',ok:true},
    {t:'אין גירעון מטבע פתוח באף אזור',ok:REGIONS.every(r=>(Q.financial.cash[r.id]||0)>=0)},
    {t:'מו״פ מוזן (עקביות)',ok:(Q.operational.rd||0)>0||(sc&&sc.levers[targetQ]&&sc.levers[targetQ].rd>0)},
    {t:'הרצפה נשמרת בהקרנה',ok:!projectCashflow(S.activeQuarter,sc?sc.levers:null).some(p=>p.breach)},
  ];
  box.innerHTML=`<ul class="checklist">${items.map(it=>`<li><span class="check ${it.ok?'done':''}">${it.ok?'✓':''}</span><span>${esc(it.t)}</span></li>`).join('')}</ul>
    <div class="small muted" style="margin-top:12px">${items.every(i=>i.ok)?'<span style="color:var(--green)">✅ מוכן להגשה</span>':'⚠️ יש פריטים פתוחים לפני Submit'}</div>`;
}
window.downloadInputSheet=(targetQ)=>{
  if(!xlsxReady()){ toast('ספריית האקסל לא נטענה — נסה שוב עם חיבור אינטרנט','r'); return; }
  const sc=selectedExportScenario(); const rows=buildInputRows(targetQ,sc);
  const aoa=[['טופס','פעולה','ערך','הערה','בוצע?'],...rows.map(r=>[r.form,r.action,r.value,r.note,''])];
  const ws=XLSX.utils.aoa_to_sheet(aoa); const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'הזנה '+targetQ); XLSX.writeFile(wb,`INTOPIA_input_${targetQ}.xlsx`);
  toast('גיליון הזנה יוצא ✓','g');
};

/* ----- JOURNAL (F8.3) ----- */
PAGE_RENDER.journal = (c)=>{
  const list=[...S.decisions].sort((a,b)=>b.ts-a.ts);
  c.innerHTML=`
    <div class="between" style="margin-bottom:16px"><div class="small muted">כל החלטה + רציונל + תרחיש + מאשר. ניתן לשליפה בכל רבעון.</div>
    <button class="btn primary" onclick="openDecisionModal(null)">+ רישום החלטה</button></div>
    ${list.length? list.map(d=>`
      <div class="card pad" style="margin-bottom:12px">
        <div class="between"><div><span class="chip">${d.quarter}</span> <b style="margin-inline-start:6px">${esc(d.scenarioName)}</b></div>
        <span class="small muted">${new Date(d.ts).toLocaleString('he-IL')}</span></div>
        <div style="margin:8px 0;line-height:1.6">${esc(d.rationale)}</div>
        <div class="small muted">אישר: <b>${esc(d.approver)}</b> <button class="x" style="font-size:16px;margin-inline-start:8px" onclick="delDecision('${d.id}')">🗑</button></div>
      </div>`).join('')
      : `<div class="card"><div class="cb">${emptyBlockInline('📓','אין החלטות ביומן','בחר תרחיש בסימולטור או רשום החלטה ידנית — היא תישמר עם הרציונל והמאשר.')}</div></div>`}`;
};
window.delDecision=(id)=>{ S.decisions=S.decisions.filter(d=>d.id!==id); save(); go('journal'); };
window.openDecisionModal=(sc)=>{
  openModal('רישום החלטה',`
    <div class="field"><label class="fl">רבעון</label><select class="f" id="decQ">${QUARTERS.map(q=>`<option ${q===S.activeQuarter?'selected':''}>${q}</option>`).join('')}</select></div>
    <div class="field"><label class="fl">תרחיש שנבחר</label><input class="f" id="decScenario" value="${sc?esc(sc.name):''}" placeholder="שם התרחיש"></div>
    <div class="field"><label class="fl">רציונל ההחלטה</label><textarea class="f" id="decRationale" rows="4" placeholder="מדוע נבחר תרחיש זה? מה הסיכון והחלופה?"></textarea></div>
    <div class="field"><label class="fl">מי אישר</label><select class="f" id="decApprover">${PERSONAS.map(p=>`<option>${p}</option>`).join('')}</select></div>`,
    `<button class="btn primary" onclick="saveDecision()">שמור ביומן</button>`);
};
window.saveDecision=()=>{
  const d={id:uid(),quarter:$('#decQ').value,scenarioName:$('#decScenario').value||'—',rationale:$('#decRationale').value,approver:$('#decApprover').value,ts:Date.now()};
  if(!d.rationale.trim()){ toast('נדרש רציונל','r'); return; }
  S.decisions.push(d); save(); closeModal(); toast('החלטה נשמרה ביומן ✓','g'); go('journal');
};

/* ----- GOALS / CONFIG (F2) ----- */
PAGE_RENDER.goals = (c)=>{
  c.innerHTML=`
    <div class="pill-tabs" id="goalTabs" style="margin-bottom:18px">
      <button class="active" data-t="floors">רצפות ויעדים</button>
      <button data-t="contracts">חוזים והתחייבויות</button>
      <button data-t="params">פרמטרי מודל</button>
    </div>
    <div id="goalBody"></div>`;
  const tabs=$$('#goalTabs button');
  tabs.forEach(b=>b.onclick=()=>{ tabs.forEach(x=>x.classList.remove('active')); b.classList.add('active'); goalTab(b.dataset.t); });
  goalTab('floors');
};
function goalTab(t){
  const body=$('#goalBody'), g=S.config.goals, p=S.config.params;
  if(t==='floors'){
    body.innerHTML=`
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card">
        <div class="ch"><h3>💵 רצפות מזומן לכל רבעון</h3></div>
        <div class="cb"><div class="grid" style="grid-template-columns:repeat(3,1fr)">
          ${QUARTERS.map(q=>`<div class="field"><label class="fl">${q}</label><input class="f" type="number" value="${g.floors[q]||0}" oninput="setGoal('floors.${q}',this.value)"></div>`).join('')}
        </div></div>
      </div>
      <div class="card">
        <div class="ch"><h3>🎯 יעדי סוף-משחק</h3></div>
        <div class="cb">
          <div class="row" style="gap:10px">
            <div class="field" style="flex:1"><label class="fl">יעד רמת X</label><input class="f" type="number" value="${g.techXTarget}" oninput="setGoal('techXTarget',this.value)"></div>
            <div class="field" style="flex:1"><label class="fl">יעד רמת Y</label><input class="f" type="number" value="${g.techYTarget}" oninput="setGoal('techYTarget',this.value)"></div>
          </div>
          <div class="field"><label class="fl">תקרת חוב</label><input class="f" type="number" value="${g.debtCeiling}" oninput="setGoal('debtCeiling',this.value)"></div>
          <div class="field"><label class="fl">יעד מלאי סוף-משחק</label><input class="f" type="number" value="${g.endInventoryTarget}" oninput="setGoal('endInventoryTarget',this.value)"></div>
          <div class="small muted">כל נורה והתרעה נמדדות מול היעדים כאן (F2.3). האסטרטגיה היא קונפיגורציה.</div>
        </div>
      </div>
    </div>`;
  }
  if(t==='contracts'){
    body.innerHTML=`
      <div class="between" style="margin-bottom:14px"><div class="small muted">מזינים פעם אחת — זורם לכל המודולים והנורות.</div><button class="btn primary" onclick="addContract()">+ חוזה</button></div>
      <div class="card"><div class="cb" style="overflow-x:auto" id="contractsTbl"></div></div>`;
    renderContracts();
  }
  if(t==='params'){
    body.innerHTML=`
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card">
        <div class="ch"><h3>📅 לוחות גבייה (% לפי אזור)</h3></div>
        <div class="cb">
          <table class="tbl"><thead><tr><th>אזור</th><th>רבעון 0</th><th>רבעון +1</th><th>רבעון +2</th></tr></thead>
          <tbody>${REGIONS.map(r=>`<tr><td><b>${r.name}</b></td>${[0,1,2].map(k=>`<td><input class="f" type="number" style="width:70px" value="${p.collection[r.id][k]}" oninput="setCollection('${r.id}',${k},this.value)"></td>`).join('')}</tr>`).join('')}</tbody></table>
          <div class="src" style="margin-top:8px">ברזיל 30/30/40 מאומת · אירופה 50/20/30 משוחזר — לאמת מול חוברת עזר (שאלה פתוחה #1).</div>
        </div>
      </div>
      <div class="card">
        <div class="ch"><h3>📈 ריביות ומסים (%)</h3></div>
        <div class="cb">
          <div class="row" style="gap:10px">
            <div class="field" style="flex:1"><label class="fl">ריבית בנק</label><input class="f" type="number" value="${p.interest.bank}" oninput="setParam('interest.bank',this.value)"></div>
            <div class="field" style="flex:1"><label class="fl">אשראי ספקים</label><input class="f" type="number" value="${p.interest.supplierCredit}" oninput="setParam('interest.supplierCredit',this.value)"></div>
          </div>
          <div class="row" style="gap:10px">
            <div class="field" style="flex:1"><label class="fl">ריבית H4</label><input class="f" type="number" value="${p.interest.h4}" oninput="setParam('interest.h4',this.value)"></div>
            <div class="field" style="flex:1"><label class="fl">תשואת ני״ע</label><input class="f" type="number" value="${p.interest.securities}" oninput="setParam('interest.securities',this.value)"></div>
          </div>
          <hr class="hr">
          <div class="row" style="gap:10px">${REGIONS.map(r=>`<div class="field" style="flex:1"><label class="fl">מס ${r.name}</label><input class="f" type="number" value="${p.tax[r.id]}" oninput="setParam('tax.${r.id}',this.value)"></div>`).join('')}</div>
          <div class="src">אשראי ספקים נצפה ~8.5–13% — לאמת מדוחות (שאלה פתוחה #2).</div>
        </div>
      </div>
    </div>`;
  }
}
window.setGoal=(path,val)=>{ const parts=path.split('.'); let o=S.config.goals; for(let i=0;i<parts.length-1;i++)o=o[parts[i]]; o[parts[parts.length-1]]=parseFloat(val)||0; save(true); };
window.setParam=(path,val)=>{ const parts=path.split('.'); let o=S.config.params; for(let i=0;i<parts.length-1;i++)o=o[parts[i]]; o[parts[parts.length-1]]=parseFloat(val)||0; save(true); };
window.setCollection=(r,k,val)=>{ S.config.params.collection[r][k]=parseFloat(val)||0; save(true); };
window.addContract=()=>{ S.config.contracts.push({id:uid(),counterparty:'',product:'',qty:0,price:0,deliveryQuarter:'Q5',terms:'',advance:0}); save(); renderContracts(); };
window.delContract=(id)=>{ S.config.contracts=S.config.contracts.filter(c=>c.id!==id); save(); renderContracts(); };
window.setContract=(id,k,v)=>{ const c=S.config.contracts.find(x=>x.id===id); c[k]=(['qty','price','advance'].includes(k))?(parseFloat(v)||0):v; save(true); };
function renderContracts(){
  const box=$('#contractsTbl'); const cs=S.config.contracts;
  if(!cs.length){ box.innerHTML=`<div class="empty"><div class="ic">📄</div>אין חוזים רשומים</div>`; return; }
  box.innerHTML=`<table class="tbl"><thead><tr><th>צד נגדי</th><th>מוצר</th><th>כמות</th><th>מחיר</th><th>אספקה</th><th>תנאי תשלום</th><th>מקדמה</th><th></th></tr></thead>
  <tbody>${cs.map(c=>`<tr>
    <td><input class="f" value="${esc(c.counterparty)}" oninput="setContract('${c.id}','counterparty',this.value)"></td>
    <td><input class="f" value="${esc(c.product)}" oninput="setContract('${c.id}','product',this.value)"></td>
    <td><input class="f" type="number" style="width:80px" value="${c.qty}" oninput="setContract('${c.id}','qty',this.value)"></td>
    <td><input class="f" type="number" style="width:90px" value="${c.price}" oninput="setContract('${c.id}','price',this.value)"></td>
    <td><select class="f" style="width:75px" onchange="setContract('${c.id}','deliveryQuarter',this.value)">${QUARTERS.map(q=>`<option ${q===c.deliveryQuarter?'selected':''}>${q}</option>`).join('')}</select></td>
    <td><input class="f" style="width:120px" value="${esc(c.terms)}" oninput="setContract('${c.id}','terms',this.value)"></td>
    <td><input class="f" type="number" style="width:80px" value="${c.advance}" oninput="setContract('${c.id}','advance',this.value)"></td>
    <td><button class="x" onclick="delContract('${c.id}')">✕</button></td>
  </tr>`).join('')}</tbody></table>`;
}

/* ---------- Shared UI helpers ---------- */
function emptyBlock(ic,title,desc,actions=''){ return `<div class="card"><div class="empty"><div class="ic">${ic}</div><h3 style="margin-bottom:6px">${title}</h3><div class="muted" style="max-width:420px;margin:0 auto 16px">${desc}</div>${actions}</div></div>`; }
function emptyBlockInline(ic,title,desc){ return `<div class="empty"><div class="ic">${ic}</div><b>${title}</b><div class="muted" style="max-width:420px;margin:6px auto 0">${desc}</div></div>`; }
function openModal(title,body,footer){
  $('#modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="mh"><h3>${title}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="mb">${body}</div>${footer!==''?`<div class="mf"><button class="btn ghost" onclick="closeModal()">ביטול</button>${footer}</div>`:''}</div></div>`;
}
window.closeModal=()=>{ $('#modalRoot').innerHTML=''; };

/* ---------- Data backup / restore ---------- */
$('#btnExportData').onclick=()=>{
  const stamp=new Date().toISOString().slice(0,10);
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`intopia_backup_${stamp}.json`; a.click();
  toast('גיבוי נתונים הורד ✓','g');
};
$('#btnImportData').onclick=()=> $('#importFile').click();
$('#importFile').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    let incoming;
    try{ incoming=JSON.parse(ev.target.result); }
    catch(err){ toast('קובץ לא תקין — לא JSON','r'); return; }
    if(!incoming || !incoming.quarters || !incoming.config){ toast('הקובץ אינו גיבוי אינטופיה תקין','r'); return; }
    const qCount=Object.values(incoming.quarters).filter(q=>q&&q.entered).length;
    openModal('שחזור מגיבוי', `
      <div class="small" style="line-height:1.7">פעולה זו <b style="color:var(--red)">תחליף</b> את כל הנתונים הנוכחיים בתוכן הקובץ:
      <div class="chip" style="margin-top:10px">${esc(file.name)}</div>
      <ul style="padding-inline-start:20px;margin:12px 0 0">
        <li>רבעונים שנקלטו: <b>${qCount}</b></li>
        <li>תרחישים: <b>${(incoming.scenarios||[]).length}</b></li>
        <li>החלטות ביומן: <b>${(incoming.decisions||[]).length}</b></li>
      </ul>
      <div class="muted" style="margin-top:10px">מומלץ להוריד גיבוי של המצב הנוכחי לפני שחזור.</div></div>`,
      `<button class="btn primary" onclick="doImport()">החלף והמשך</button>`);
    window._pendingImport=incoming;
  };
  reader.readAsText(file);
  e.target.value=''; // allow re-selecting same file
};
window.doImport=()=>{
  const incoming=window._pendingImport; if(!incoming)return;
  S=deepMerge(defaultState(), incoming);
  save(); closeModal();
  renderNav(); renderQuarterSelect(); renderQBox(); go('dashboard');
  toast('הנתונים שוחזרו מהגיבוי ✓','g'); window._pendingImport=null;
};

/* ---------- Boot ---------- */
window.go=go;
function boot(){
  load(); renderNav(); renderQuarterSelect(); renderQBox(); go('dashboard');
  window.addEventListener('resize',()=>{ if(currentPage==='dashboard')drawTrend($('#trendChart')); });
}
boot();
</script>
