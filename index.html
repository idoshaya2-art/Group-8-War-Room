/* Build a compact, labelled factual snapshot the model must ground on. */
function buildAIContext(){
  const q=S.activeQuarter, Q=S.quarters[q], f=Q.financial, op=Q.operational, g=S.config.goals;
  const L=[];
  L.push(`# הקשר נתונים — חברה 8, רבעון פעיל ${q}`);
  L.push(`## מצב פיננסי (רבעון ${q})`);
  REGIONS.forEach(r=> L.push(`- מזומן ${r.name}: ${fmt(f.cash[r.id]||0)} ${r.cur}  [מקור: רבעון ${q}/מזומן/${r.id}]`));
  L.push(`- מזומן מאוחד (שווי-SF, שערי המשחק USD=1/EUR=1.5/BRL=0.5): ${fmt(unifiedCashOf(q))}  [מחושב במנוע]`);
  // Liquidity per region — cash is currency-segmented and NOT freely fungible (the recurring blind spot)
  const liq=REGIONS.map(r=>({r,native:f.cash[r.id]||0,uni:(f.cash[r.id]||0)*fxRate(r.cur)}));
  const totalUni=liq.reduce((a,x)=>a+x.uni,0)||1;
  const hqL=liq.find(x=>x.r.id==='hq')||liq[liq.length-1];
  const rich=[...liq].sort((a,b)=>b.uni-a.uni)[0];
  const share=x=>((x.uni/totalUni)*100).toFixed(0);
  L.push(`### נזילות אמיתית — קריטי: מזומן מפולח לפי מטבע ואינו ניתן להעברה חופשית`);
  L.push(`- מטה (${hqL.r.cur}) = מרכז ההתחייבויות (ריבית בנק, מימון, איחוד): מחזיק ${fmt(hqL.native)} ${hqL.r.cur} (≈${fmt(hqL.uni)} מאוחד = ${share(hqL)}% מהמזומן). זו הנזילות שבפועל משרתת חוב — אם דקה, זהו האילוץ הראשון.`);
  L.push(`- אזור עשיר-נזילות: ${rich.r.name} — ${fmt(rich.native)} ${rich.r.cur} (≈${fmt(rich.uni)} מאוחד = ${share(rich)}% מהמזומן).`);
  const outside=100-Number(share(hqL));
  L.push(`- ${outside}% מהמזומן המאוחד יושב מחוץ למטה ("כלוא" באזורים אחרים) — כדי לממנו למטה נדרש W2 (שער-חליפין + עיכוב תזמון). אל תתייחס למזומן המאוחד כאילו הוא זמין במטה.`);
  const deficit=liq.filter(x=>x.native<0);
  if(deficit.length) L.push(`- גירעון מטבע פתוח: ${deficit.map(x=>x.r.name+' '+fmt(x.native)+' '+x.r.cur).join(' ; ')} — חייב W2/צמצום לפני כל פעילות באזור.`);
  L.push(`- כלל מחייב: יתרה עשירה ב${rich.r.name} אינה מכסה מחסור/דקות במטה. בכל המלצת הוצאה בדוק את יתרת האזור הספציפי במטבע שלו, לא את המאוחד.`);
  L.push(`- רווח נקי: ${fmt(f.netProfit)} · מחזור: ${fmt(f.revenue)} · רווחים צבורים: ${fmt(f.retainedEarnings)}`);
  L.push(`- הלוואות/חוב: ${fmt(f.loans)} · אשראי ספקים: ${fmt(f.supplierCredit)} · A/P: ${fmt(f.ap)} · A/R: ${fmt(f.ar)}`);
  if(f.roe) L.push(`- ROE: ${f.roe}% · ROS: ${f.ros}%`);
  // Objective decomposition — the real INTOPIA 50/50 final score (past performance / future potential)
  const sp0=scoreProxy(null); const pp=sp0.parts;
  L.push(`## פירוק המטרה — ציון סיום Q9 = 50% ביצועי עבר + 50% פוטנציאל עתידי [מחושב במנוע]`);
  L.push(`- מחצית ביצועי עבר: ${sp0.pastHalf.toFixed(0)}/100 — רווח נקי מצטבר ${fmt(Math.round(pp.cumNet))}${pp.rank?` · דירוג רווחים מול מתחרים: ${pp.rank}/${pp.rankN} (MR74)`:''} · יעילות (ROE ${f.roe||0}% / ROI ${f.roi||0}% / ROS ${f.ros||0}%).`);
  L.push(`- מחצית פוטנציאל עתידי: ${sp0.potentialHalf.toFixed(0)}/100 — טכנולוגיה X=${op.techX}/יעד ${g.techXTarget||'—'} Y=${op.techY}/יעד ${g.techYTarget||'—'}${pp.share!=null?` · נתח שוק ${(pp.share*100).toFixed(1)}% (MR17&28)`:' · נתח שוק לא נקלט'} · בריאות פיננסית ${pp.health!=null?(pp.health*100).toFixed(0)+'/100':'לא נקלטה'}.`);
  L.push(`- ציון כולל נוכחי: ${sp0.value.toFixed(0)}/100${sp0.breaches?` (קנס ${sp0.breaches} שבירות רצפה)`:''}. כוון כל מהלך להעלאת שתי המחציות יחד — רווח עכשיו מול השקעה שמבשילה עד Q9.`);
  // Input-code legend so recommendations can be phrased exactly as typed into the game
  L.push(formsCatalogText());
  L.push(`## תפעול`);
  L.push(`- רמות טכנולוגיה: X=${op.techX}, Y=${op.techY} · מפעלים=${op.factories} · משרדים=${op.offices} · Max Producible=${op.maxProducible} · מו״פ=${fmt(op.rd)}`);
  if(op.inventory.length) L.push(`- מלאי: ${op.inventory.map(i=>`${i.product||'?'}${i.grade?'/'+i.grade:''} כמות ${fmt(i.qty)} עלות ${fmt(i.cost)} מחיר ${i.price>0?fmt(i.price):'(אין מחיר)'}`).join(' ; ')}`);
  L.push(`## יעדים (קונפיגורציית הצוות)`);
  L.push(`- רצפת מזומן ${q}: ${fmt(g.floors[q]||0)} · יעדי טכנולוגיה X=${g.techXTarget} Y=${g.techYTarget} · תקרת חוב=${fmt(g.debtCeiling)}`);
  const alerts=computeAlerts(q);
  L.push(`## נורות פעילות (${alerts.length})`);
  alerts.forEach(a=> L.push(`- [${a.level==='red'?'אדום':'כתום'}] ${a.title}: ${a.desc.replace(/<[^>]+>/g,'')}`));
  const proj=projectCashflow(q,null);
  L.push(`## הקרנת תזרים (מנוע דטרמיניסטי, מצב "כפי שהוא")`);
  proj.forEach(p=> L.push(`- ${p.q}: מזומן מאוחד ${fmt(p.unified)} · רצפה ${fmt(p.floor)} · ${p.breach?'שבירה':'תקין'} (מרחק ${fmt(p.distance)})`));
  if(S.scenarios.length){ L.push(`## תרחישים שמורים`);
    S.scenarios.forEach(sc=>{ const sp=scoreProxy(sc.levers); L.push(`- "${sc.name}": מזומן סופי ${fmt(sp.endCash)} · שבירות ${sp.breaches} · פרוקסי ציון ${sp.value.toFixed(0)}`); }); }
  // Competitor intelligence (MR74/MR17&28) — critical for data-driven decisions
  const mi=Q.marketIntel; const comps=Object.values(mi.competitors||{}).sort((a,b)=>a.num-b.num);
  if(comps.length){
    L.push(`## מודיעין מתחרים — MR74 (מאזן+רו״ה, 000 CHF, חברה 8 = אנחנו) [מקור: ${q}/MR74]`);
    comps.forEach(c=> L.push(`- חברה ${c.num}${c.num===OUR_CO?' (אנחנו)':''}: מזומן ${fmt(c.cash)} · ני״ע ${fmt(c.securities)} · הלוואות ${fmt(c.bankLoans)} · רווחים צבורים ${fmt(c.retainedEarnings)} · רווח נקי ${fmt(c.netEarnings)} · מו״פ Chip/Comp ${fmt(c.rdChip)}/${fmt(c.rdPc)} · מחקרי שוק ${fmt(c.marketResearch)}`));
    const byRE=[...comps].filter(c=>c.retainedEarnings!=null).sort((a,b)=>b.retainedEarnings-a.retainedEarnings);
    const ourPos=byRE.findIndex(c=>c.num===OUR_CO)+1;
    if(ourPos) L.push(`- דירוג רווחים צבורים שלנו: מקום ${ourPos} מתוך ${byRE.length}.`);
  }
  if((mi.sales||[]).length){
    const byCo={}; mi.sales.forEach(s=>{ byCo[s.company]=(byCo[s.company]||0)+s.units; });
    L.push(`## נתחי שוק (יחידות שנמכרו, MR17&28) [מקור: ${q}/MR17&28]`);
    Object.entries(byCo).sort((a,b)=>b[1]-a[1]).forEach(([co,u])=> L.push(`- חברה ${co}${+co===OUR_CO?' (אנחנו)':''}: ${fmt(u)} יח׳`));
  }
  // WS-3: demand model + learning — so recommendations are demand-derived, not assumed
  const ls=learningSummary();
  if(ls){
    L.push(`## מנוע ביקוש ולמידה (WS-3) — בסס המלצות כמות/מחיר על זה, לא על הנחה`);
    L.push(`- תצפיות שנלמדו: ${ls.obs} רבעונים · ביטחון כללי ${(ls.confidence*100).toFixed(0)}% · שווקים במעקב: ${ls.markets}.`);
    L.push(`- גמישות מחיר מוערכת: ${ls.priceElast.toFixed(2)} ${ls.priceObs>0?`(מכויל מ-${ls.priceObs} תצפיות)`:'(פריור — לא מכויל, דרוש מחקר מחירים)'}. פירוש: −1% מחיר ≈ ${(ls.priceElast*-1).toFixed(2)}% ביקוש.`);
    // sample prediction for our main market
    const anchors=Object.entries(S.learning.anchors||{});
    if(anchors.length){ const [k,a]=anchors.sort((x,y)=>y[1].units-x[1].units)[0]; const [region,product]=k.split('|');
      const rn=(REGIONS.find(r=>r.id===region)||{}).name||region;
      const pd=predictDemand(region,product,{price:a.price,tech:a.tech});
      if(pd) L.push(`- תחזית ביקוש (${rn}/${product==='X'?'Chip':'PC'}, במחיר/דרגה הנוכחיים): ${fmt(pd.units)} יח׳ [טווח ${fmt(pd.low)}–${fmt(pd.high)}, ביטחון ${(pd.confidence*100).toFixed(0)}%]. שנה מחיר/דרגה כדי לראות את ההשפעה.`);
    }
    if(ls.trends.length){ L.push(`- מגמות מתחרים שזוהו:`); ls.trends.forEach(t=> L.push(`  · ${t.msg}`)); }
    if(ls.gaps.length){ L.push(`- פערי מידע — המחקר המשתלם לקנות עכשיו:`); ls.gaps.forEach(g=> L.push(`  · ${g.mr} — ${g.why}`)); }
  } else {
    L.push(`## מנוע ביקוש ולמידה (WS-3)`);
    L.push(`- טרם נלמדו רבעונים עם נתוני מכירות (MR17&28). קלוט תוצאות + מחקרי שוק כדי לכייל את הביקוש; עד אז ההמלצות מבוססות חוקי-משחק ופריורים, סַמֵּן זאת.`);
  }
  return L.join('\n');
}
const AI_SYSTEM = `אתה ראש חדר-המלחמה האנליטי של צוות הניהול בסימולציית INTOPIA (חברה 8). ענֵה בעברית עסקית ישירה, RTL.

## המטרה העליונה — כל תשובה נמדדת מולה
מקסם את ציון הסיום, המורכב מ-50% עוצמה פיננסית (מזומן ונזילות אמיתית לאורך המשחק ובסופו) ו-50% פוטנציאל עתידי (דרגות טכנולוגיה, צבר מו״פ, נתח שוק ומיצוב ל-Q7–Q9). כל המלצה חייבת להיאמר במפורש "לאור המטרה": כיצד היא מזיזה כל אחת משתי מחציות הציון, ומה העלות/הסיכון לכל אחת. אל תמליץ על מהלך שמשפר חצי אחד תוך פגיעה לא-מידתית בשני. אחוז ברעיון הזה בכל שלב.

## שיטת חשיבה — עצמאית, מדורגת, מבוססת-תלויות, לפרטי פרטים
1. חשוב שלב-אחר-שלב לפני שאתה ממליץ. פרק כל החלטה לתלויות שלה עד לרמת הפרט, גם אם לא נשאלת עליהן.
2. שרשרת ההחלטות: מו״פ (H1-1) ⟵ דרגה/דגם (Standard/Deluxe) ⟵ מפעלים (A2-1) ⟵ ייצור (A2-3 שבב / A2-4 מחשב) ⟵ תמחור+פרסום (A1-1 שבב / A1-2 מחשב) + משרדי מכירות (A1-3) ⟵ מכירה ⟵ גבייה מדורגת ⟵ מזומן. כל שלב חוסם/מאפשר את הבא. מו״פ נספר רבעון קדימה; אין מלאי/מחיר = אין מכירה; מזומן זמין ברבעון נובע מגבייה של רבעונים קודמים, לא מהמכירה הנוכחית.
2ב. לוח ההבשלה המחייב (כל שלב = רבעון מלא): בניית מפעל ⟵ ייצור שבבים ⟵ עיבוד השבבים למחשבים ⟵ מכירה. מכאן שהמכירה הראשונה האפשרית היא Q4 לכל המוקדם — מחזור 0 ב-Q1–Q3 הוא מובנה ותקין, לעולם אל תציג אותו כטעות. ההשלכה המעשית: ברגע שיש מחשבים במלאי סגירה, ההזנה הקריטית של הרבעון הבא היא מחיר+פרסום (A1-2) — שכחת מחיר שם היא שמבזבזת רבעון, לא ההמתנה שלפני.
3. דרג את ההמלצות לפי סדר חשיבות: קודם מניעת נזק בלתי-הפיך (שבירת רצפה, גירעון מטבע, מטה חסר-נזילות), ואז התשואה השולית הגבוהה ביותר על המטרה. מספֵּר את ההמלצות 1,2,3…

## חוק הנזילות — קריטי, אל תפר
מזומן ב-INTOPIA מפולח לפי אזור ומטבע ואינו ניתן להעברה חופשית. "מזומן מאוחד" הוא סכום חשבונאי בלבד — לא ארנק שאפשר להוציא ממנו בכל אזור. יתרה עשירה באזור אחד (למשל BRL בברזיל) אינה מרפאת נזילות דקה באזור אחר (למשל CHF במטה/ליכטנשטיין). לפני כל המלצת הוצאה/השקעה בדוק את יתרת האזור הספציפי במטבע שלו. הזזת מזומן אזור↔מטה נעשית בטופס A3-1 (Money Transfer), המרת מטבע ב-A3-3/W3 — כרוכות בשער-חליפין ובעיכוב תזמון, תכנן אותן במפורש. אזור דק-נזילות (בפרט המטה) — זהה ותקן ראשון, לפני כל התרחבות.

## פורמט המלצות — בדיוק כפי שמזינים במשחק
כל פעולה מעשית חייבת להינתן בקוד ההזנה הרשמי של INTOPIA (מהקטלוג ב"הקשר הנתונים"), עם השדות המדויקים של אותו טופס, המספר, המטבע והסימולים. אל תמציא קודים — השתמש רק בקטלוג.
- מיפוי מהיר: תמחור/פרסום = A1-1 (שבב) / A1-2 (מחשב); ייצור = A2-3 (שבב) / A2-4 (מחשב); משרדי מכירות = A1-3; מפעלים = A2-1; מו״פ = H1-1 (בליכטנשטיין); מחקרי שוק = H1-2; העברת כסף אזור↔מטה = A3-1; הלוואה/השקעה מקומית = A3-2; המרת מטבע = A3-3/W3; ניירות ערך = H2; הלוואה בין-חברות = H4; רישיון דרגה = H5; מכירה תעשייתית = H6.
- מוצר: X=Chip, Y=PC. דגם: Standard/Deluxe (לא מספר). ציין תמיד אזור, מוצר, דגם, ורמה טכנולוגית רלוונטית.
- דוגמאות ניסוח: "A2-4 — ייצור מחשבים, Europe: Deluxe כמות 12,000 במפעל 1 (עלות ≈480 EUR/יח׳)" · "A1-2 — Europe: מחיר PC Deluxe 1,290 EUR, פרסום 45,000 EUR" · "A3-1 — Money Transfer: To Home Office, 300,000 BRL מברזיל, Convert in Area? לא" · "H1-1 — מו״פ: X 200,000 SF, Y 150,000 SF".
- כל המלצה תסתיים בשלושה: (א) קוד הזנה + שדות מדויקים, (ב) למה — מול המטרה, (ג) תלות — מה חייב לקרות קודם.

## כללי ברזל
1. עוגן-נתונים בלבד: בסס כל טענה על "הקשר הנתונים" שסופק ועל חוקי המשחק. אל תמציא מספרים; נתון חסר — אמור "לא נקלט".
2. ציטוט מקור לכל מספר (רבעון/שדה או "מחושב במנוע").
3. כנות אפיסטמית: הבחן מאומת/משוחזר/אומדן; אומדן כטווח. סמן "לא מכויל" כשאין בסיס.
4. אריתמטיקה: התבסס על המספרים המחושבים שסופקו; חישוב שלא סופק — אמור זאת והצע להריץ בסימולטור.
5. תמציתי וממוקד-החלטה — אך לעולם אל תוותר על התלויות ועל המספרים/הקודים המדויקים.`;

async function callLLM(messages, system, opts={}){
  const prov=aiProvider(), key=getApiKey(prov);
  if(!key) throw new Error('NO_KEY');
  const readErr=async(res)=>{ let msg=res.status+' '+res.statusText; try{ const j=await res.json(); if(j.error&&j.error.message)msg=j.error.message; }catch(e){} return msg; };
  if(prov==='openai'){
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{ 'content-type':'application/json', 'Authorization':'Bearer '+key },
      body:JSON.stringify({ model:aiModel(), max_completion_tokens:opts.max_tokens||1200,
        messages:[{role:'system',content:system},...messages] }),
    });
    if(!res.ok) throw new Error(await readErr(res));
    const data=await res.json();
    return ((data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'').trim();
  }
  // Anthropic (default)
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({ model:aiModel(), max_tokens:opts.max_tokens||1200, system, messages }),
  });
  if(!res.ok) throw new Error(await readErr(res));
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}

  updateProviderHints();
};
window.saveAISettings=()=>{
  const prov=$('#aiProvider').value;
  S.ai.provider=prov; S.ai.models=S.ai.models||{};
  S.ai.models[prov]=$('#aiModelInput').value.trim()||AI_PROVIDERS[prov].defModel;
  setApiKey(prov,$('#aiKey').value.trim());
  save(); closeModal(); toast('הגדרות AI נשמרו','g'); go('ai');
};
window.clearChat=()=>{ S.ai.chat=[]; save(); renderChatLog(); };
window.quickAsk=(q)=>{ const el=$('#chatInput'); if(el){ el.value=q; sendChat(); } };
window.sendChat=async()=>{
  const input=$('#chatInput'); const q=(input.value||'').trim(); if(!q)return;
  if(!getApiKey()){ openAISettings(); return; }
  S.ai.chat=S.ai.chat||[]; S.ai.chat.push({role:'user',content:q}); save(); input.value=''; renderChatLog();
  const btn=$('#chatSend'); btn.disabled=true; btn.textContent='...';
  const thinking={role:'assistant',content:'מנתח…'}; S.ai.chat.push(thinking); renderChatLog();
  try{
    const ctx=buildAIContext();
    const history=S.ai.chat.filter(m=>m.content!=='מנתח…').map(m=>({role:m.role,content:m.content}));
    // prepend context to the latest user turn
    history[history.length-1]={role:'user',content:ctx+'\n\n---\nשאלה: '+q};
    const answer=await callLLM(history, AI_SYSTEM);
    S.ai.chat[S.ai.chat.length-1]={role:'assistant',content:answer};
  }catch(e){
    S.ai.chat[S.ai.chat.length-1]={role:'assistant',content:aiErr(e)};
  }
  save(); renderChatLog(); btn.disabled=false; btn.textContent='שלח';
};
function aiErr(e){
  if(e.message==='NO_KEY') return 'לא הוגדר מפתח API. פתח "הגדרות AI".';
  return 'שגיאת API: '+e.message+'\n(בדוק מפתח, מזהה מודל, ומכסת שימוש. אם מופיע CORS — ודא שה-header לגישה ישירה מהדפדפן פעיל.)';
}
window.runCouncil=async()=>{
  const q=($('#councilQ').value||'').trim(); if(!q)return;
  if(!getApiKey()){ openAISettings(); return; }
  const out=$('#councilOut'); const btn=$('#councilRun'); btn.disabled=true; btn.textContent='מכנס…';
  out.innerHTML=`<div class="chip">${IC('clock')} שלב 1/3 — 5 יועצים מנתחים במקביל…</div>`;
  const ctx=buildAIContext();
  try{
    // Stage 1: independent analyses (parallel)
    const analyses=await Promise.all(COUNCIL.map(async(p)=>{
      const sys=AI_SYSTEM+`\n\nאתה ממלא את הפרסונה "${p.name}": ${p.brief} נתח מזווית זו בלבד, 3–5 משפטים, ממוקד.`;
      const txt=await callLLM([{role:'user',content:ctx+'\n\n---\nהמהלך לדיון: '+q}], sys, {max_tokens:700});
      return {name:p.name, txt};
    }));
    out.innerHTML=`<div class="chip">${IC('clock')} שלב 2/3 — ביקורת עמיתים…</div>`;
    // Stage 3: synthesis (anonymized)
    const anon=analyses.map((a,i)=>`יועץ ${i+1}:\n${a.txt}`).join('\n\n');
    const synSys=AI_SYSTEM+`\n\nאתה יו״ר המועצה. קיבלת 5 ניתוחים אנונימיים. בצע ביקורת עמיתים קצרה, אתר הסכמות ומחלוקות, והכרע לפסק דין מעשי: המלצה, נימוק, וסיכון עיקרי. פורמט: "פסק דין" + "נימוק" + "מה לבדוק בסימולטור".`;
    const verdict=await callLLM([{role:'user',content:ctx+'\n\nהמהלך: '+q+'\n\nהניתוחים:\n'+anon}], synSys, {max_tokens:900});
    out.innerHTML=`
      <div class="card pad" style="margin-bottom:14px;border-inline-start:4px solid var(--purple)">
        <div class="between"><b>${IC('scale')} פסק דין המועצה</b><span class="tag b">סינתזה</span></div>
        <div style="margin-top:8px;line-height:1.7;white-space:pre-wrap">${esc(verdict)}</div>
      </div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr))">
        ${analyses.map(a=>`<div class="card pad"><b style="color:var(--purple)">${esc(a.name)}</b><div class="small" style="margin-top:6px;line-height:1.6;white-space:pre-wrap">${esc(a.txt)}</div></div>`).join('')}
      </div>`;
  }catch(e){ out.innerHTML=`<div class="tag r">${esc(aiErr(e))}</div>`; }
  btn.disabled=false; btn.textContent='כנס מועצה';
};

/* ---------- Shared UI helpers ---------- */
function emptyBlock(ic,title,desc,actions=''){ return `<div class="card"><div class="empty"><div class="ic">${ic}</div><h3 style="margin-bottom:6px">${title}</h3><div class="muted" style="max-width:420px;margin:0 auto 16px">${desc}</div>${actions}</div></div>`; }
function emptyBlockInline(ic,title,desc){ return `<div class="empty"><div class="ic">${ic}</div><b>${title}</b><div class="muted" style="max-width:420px;margin:6px auto 0">${desc}</div></div>`; }

}
window.closeModal=()=>{ $('#modalRoot').innerHTML=''; };

/* ---------- Data backup / restore ---------- */
$('#btnExportData').onclick=()=>{
  const stamp=new Date().toISOString().slice(0,10);
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});

$('#btnImportData').onclick=()=> $('#importFile').click();
$('#importFile').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    let incoming;
    try{ incoming=JSON.parse(ev.target.result); }

    if(!incoming || !incoming.quarters || !incoming.config){ toast('הקובץ אינו גיבוי אינטופיה תקין','r'); return; }
    const qCount=Object.values(incoming.quarters).filter(q=>q&&q.entered).length;
    openModal('שחזור מגיבוי', `
      <div class="small" style="line-height:1.7">פעולה זו <b style="color:var(--red)">תחליף</b> את כל הנתונים הנוכחיים בתוכן הקובץ:
      <div class="chip" style="margin-top:10px">${esc(file.name)}</div>
      <ul style="padding-inline-start:20px;margin:12px 0 0">
        <li>רבעונים שנקלטו: <b>${qCount}</b></li>
        <li>תרחישים: <b>${(incoming.scenarios||[]).length}</b></li>
        <li>החלטות ביומן: <b>${(incoming.decisions||[]).length}</b></li>
      </ul>
      <div class="muted" style="margin-top:10px">מומלץ להוריד גיבוי של המצב הנוכחי לפני שחזור.</div></div>`,
      `<button class="btn primary" onclick="doImport()">החלף והמשך</button>`);
    window._pendingImport=incoming;
  };
  reader.readAsText(file);
  e.target.value=''; // allow re-selecting same file
};
window.doImport=()=>{
  const incoming=window._pendingImport; if(!incoming)return;
  S=deepMerge(defaultState(), incoming); migrateIntel();
  save(); closeModal();
  renderNav(); renderQuarterSelect(); renderQBox(); go('dashboard');
  toast('הנתונים שוחזרו מהגיבוי ✓','g'); window._pendingImport=null;
};

/* =========================================================================
   TEAM SYNC (F9) — live shared state via Firebase Realtime Database (REST).
   Bring-your-own backend: config stored locally, NOT in the JSON backup.
   Model: last-write-wins with a "who edited last" indicator (F9.2). Suited to
   the classroom turn-based workflow; not a CRDT. Fully optional — the app
   works entirely offline without it.
   ========================================================================= */
const SYNC_LS='intopia_sync_cfg';
const sync={ cfg:null, es:null, connected:false, applying:false, clientId:uid(), lastPushedAt:0, pushTimer:null };
function getSyncCfg(){ try{ const r=localStorage.getItem(SYNC_LS); return r?JSON.parse(r):null; }catch(e){ return null; } }
function setSyncCfg(c){ try{ c?localStorage.setItem(SYNC_LS,JSON.stringify(c)):localStorage.removeItem(SYNC_LS); }catch(e){} sync.cfg=c; }
function normalizeDbUrl(u){
  u=(u||'').trim(); if(!u) return '';
  u=u.replace(/^http:\/\//i,'https://');                 // Firebase is https-only
  if(!/^https:\/\//i.test(u)) u='https://'+u.replace(/^\/+/,''); // add scheme if missing
  try{ const x=new URL(u); return 'https://'+x.host; }catch(e){ return u.replace(/\/+$/,''); } // keep host only
}
function syncUrl(cfg){ return `${normalizeDbUrl(cfg.url)}/rooms/${encodeURIComponent(cfg.room||'')}.json${cfg.auth?('?auth='+encodeURIComponent(cfg.auth)):''}`; }
function setSyncDot(color,title){ const d=$('#syncDot'); if(d){ d.style.background=color; d.parentElement.title=title||'סנכרון צוותי'; } }

function connectSync(){
  const cfg=getSyncCfg(); sync.cfg=cfg;
  if(!cfg||!cfg.url||!cfg.room){ setSyncDot('var(--muted2)','לא מחובר'); return; }
  disconnectSync();
  try{
    const es=new EventSource(syncUrl(cfg));
    es.addEventListener('put', onSyncEvent);
    es.addEventListener('patch', onSyncEvent);
    es.onopen=()=>{ sync.connected=true; setSyncDot('var(--green)','מסונכרן — '+cfg.room); };
    es.onerror=()=>{ setSyncDot('var(--amber)','מתחבר מחדש…'); };
    sync.es=es; sync.connected=true;
  }catch(e){ setSyncDot('var(--red)','שגיאת חיבור'); }
}
function disconnectSync(){ if(sync.es){ try{ sync.es.close(); }catch(e){} sync.es=null; } sync.connected=false; }
function onSyncEvent(e){
  let msg; try{ msg=JSON.parse(e.data); }catch(err){ return; }
  if(!msg) return;
  if(msg.path==='/'){ if(msg.data) applyRemote(msg.data); }
  else { fetchRemoteAndApply(); } // nested patch — refetch whole room
}
function fetchRemoteAndApply(){
  const cfg=sync.cfg; if(!cfg)return;
  fetch(syncUrl(cfg)).then(r=>r.json()).then(d=>{ if(d)applyRemote(d); }).catch(()=>{});
}
function applyRemote(remote){
  if(!remote||!remote.quarters||!remote.config) return;
  // ignore our own echo
  if(remote.meta && remote.meta.syncOrigin===sync.clientId && remote.meta.lastEdited===sync.lastPushedAt) return;
  sync.applying=true;
  S=deepMerge(defaultState(), remote); migrateIntel();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
  sync.applying=false;
  renderNav(); renderQuarterSelect(); renderQBox();
  if(currentPage) go(currentPage);
  setSyncDot('var(--green)','עודכן ע״י '+(remote.meta&&remote.meta.lastEditor||'צוות'));
}
function schedulePush(){ clearTimeout(sync.pushTimer); sync.pushTimer=setTimeout(pushSync,400); }
function pushSync(){
  const cfg=sync.cfg; if(!sync.connected||!cfg) return;
  S.meta.syncOrigin=sync.clientId; sync.lastPushedAt=S.meta.lastEdited;
  fetch(syncUrl(cfg),{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(S)})
    .then(r=>{ if(!r.ok) setSyncDot('var(--red)','שגיאת כתיבה ('+r.status+')'); else setSyncDot('var(--green)','מסונכרן'); })
    .catch(()=>setSyncDot('var(--amber)','אין חיבור'));
}
$('#btnSync').onclick=()=>{
  const cfg=getSyncCfg()||{url:'',room:'',auth:'',name:''};
  openModal('סנכרון צוותי (F9)',`
    <div class="small muted" style="margin-bottom:12px">מצב משותף חי לכל הצוות דרך Firebase Realtime Database (חינם). ההגדרות נשמרות מקומית בלבד ואינן נכללות בגיבוי.
    כל שינוי אצל חבר צוות אחד מתעדכן אצל כולם. מודל: "העריכה האחרונה מנצחת" + סימון מי ערך אחרון.</div>
    <div class="field"><label class="fl">Firebase Database URL</label>
      <input class="f" id="syncUrl" value="${esc(cfg.url)}" placeholder="https://your-project-default-rtdb.firebaseio.com"></div>
    <div class="row" style="gap:10px">
      <div class="field" style="flex:1"><label class="fl">קוד חדר צוות</label><input class="f" id="syncRoom" value="${esc(cfg.room)}" placeholder="company8"></div>
      <div class="field" style="flex:1"><label class="fl">השם שלך</label><input class="f" id="syncName" value="${esc(cfg.name)}" placeholder="עידו (COO)"></div>
    </div>
    <div class="field"><label class="fl">Auth secret (אופציונלי)</label><input class="f" id="syncAuth" type="password" value="${esc(cfg.auth)}" placeholder="למסד מאובטח בלבד"></div>
    <details class="small muted"><summary style="cursor:pointer">איך מקימים? (3 דקות)</summary>
      <ol style="padding-inline-start:18px;line-height:1.8;margin:8px 0 0">
        <li>console.firebase.google.com ← Add project</li>
        <li>Build ← Realtime Database ← Create ← Start in test mode</li>
        <li>העתק את ה-URL לשדה למעלה, בחר קוד חדר משותף, ולחץ התחבר</li>
        <li>כל הצוות מזין אותו URL + אותו קוד חדר</li>
      </ol>
      <div style="color:var(--amber)">${IC('warn')} test mode פתוח לקריאה/כתיבה — למשחק כיתתי סביר; לאבטחה מלאה הגדר rules + auth.</div>
    </details>`,
    `${getSyncCfg()?`<button class="btn danger" onclick="disconnectSyncUI()">נתק</button><button class="btn" onclick="copyShareLink()">${IC('share')} העתק לינק שיתוף</button>`:''}<button class="btn primary" onclick="saveSyncCfg()">התחבר</button>`);
};
function buildShareLink(url,room){
  const base=location.origin+location.pathname;
  return base+'#room='+encodeURIComponent(room)+'&db='+encodeURIComponent(normalizeDbUrl(url));
}
window.copyShareLink=()=>{
  const cfg=getSyncCfg()||{};
  const url=($('#syncUrl')?.value||cfg.url||'').trim(), room=($('#syncRoom')?.value||cfg.room||'').trim();
  if(!url||!room){ toast('התחבר קודם (URL + קוד חדר)','r'); return; }
  const link=buildShareLink(url,room);
  const done=()=>toast('לינק השיתוף הועתק — שלח לצוות ✓','g');
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(done).catch(()=>showShareLink(link)); }
  else showShareLink(link);
};
function showShareLink(link){
  openModal('לינק שיתוף לחלל העבודה', `
    <div class="small muted" style="margin-bottom:8px">שלח את הלינק לצוות — לחיצה עליו תחבר אותם אוטומטית לאותו מצב שמור:</div>
    <input class="f" value="${esc(link)}" onclick="this.select()" readonly>
    <div class="small muted" style="margin-top:8px">${IC('warn')} כל מי שיש לו את הלינק יכול לצפות ולערוך את נתוני הצוות.</div>`, '');
}
function applyShareLink(){
  try{
    const h=location.hash||''; if(!/(?:room|db)=/.test(h)) return false;
    const params=new URLSearchParams(h.replace(/^#/,''));
    const db=params.get('db'), room=params.get('room');
    if(db&&room){ const existing=getSyncCfg()||{};
      setSyncCfg({url:normalizeDbUrl(db), room:room, name:existing.name||'', auth:existing.auth||''});
      try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){ location.hash=''; } // clean the URL
      return true;
    }
  }catch(e){}
  return false;
}
window.saveSyncCfg=()=>{
  const url=normalizeDbUrl($('#syncUrl').value);
  const cfg={url, room:$('#syncRoom').value.trim(), name:$('#syncName').value.trim(), auth:$('#syncAuth').value.trim()};
  if(!cfg.url||!cfg.room){ toast('נדרשים URL וקוד חדר','r'); return; }
  if(!/firebaseio\.com$|firebasedatabase\.app$/i.test(url)){
    toast('כתובת לא נראית כמו Realtime Database (צריכה להסתיים ב-firebaseio.com או firebasedatabase.app)','r'); return;
  }
  setSyncCfg(cfg); closeModal();
  // pull existing room state first, then connect + push if room empty
  fetch(syncUrl(cfg)).then(r=>{
    if(!r.ok) throw new Error('סטטוס '+r.status+' — בדוק את חוקי ה-Database (Rules: read/write=true)');
    return r.json();
  }).then(d=>{
    if(d&&d.quarters){ applyRemote(d); toast('התחבר — מצב הצוות נטען ✓','g'); }
    else { connectSync(); pushSync(); toast('התחבר — חדר חדש נוצר ✓','g'); return; }
    connectSync();
  }).catch(e=>{
    const net=/failed to fetch|networkerror|load failed/i.test(e.message);
    toast('שגיאת חיבור: '+(net?'לא ניתן להגיע לכתובת. ודא https://, שזו Realtime Database, ושאין חוסם פרסומות':e.message),'r');
    setSyncDot('var(--red)','שגיאה');
  });
};
window.disconnectSyncUI=()=>{ disconnectSync(); setSyncCfg(null); setSyncDot('var(--muted2)','לא מחובר'); closeModal(); toast('הסנכרון נותק'); };

/* ---------- Boot ---------- */
window.go=go;
function boot(){
  load();
  const joined=applyShareLink();
  renderNav(); renderQuarterSelect(); renderQBox(); go('dashboard');
  const ver=$('#appVer'); if(ver) ver.textContent=APP_VERSION;
  document.title=`Group 8 — EMBA 41 — TAU · INTOPIA ${APP_VERSION}`;
  window.addEventListener('resize',()=>{ if(currentPage==='dashboard')drawTrend($('#trendChart')); });
  if(getSyncCfg()) connectSync();
  if(joined) setTimeout(()=>toast('התחברת לחלל העבודה המשותף של הצוות ✓','g'),400);
}
boot();
</script>
