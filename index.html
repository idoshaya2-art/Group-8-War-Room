<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 8 — EMBA 41 — TAU · INTOPIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#090d16; --bg2:#0e1422; --panel:#121a2c; --panel2:#18213a;
  --line:#222c44; --line2:#2e3956;
  --txt:#e9edf5; --muted:#8d99b6; --muted2:#606d8b;
  --accent:#3d6fe0; --accent2:#6f97ee;
  --green:#2fb894; --greenbg:#0f3229;
  --red:#ef5568; --redbg:#34121c;
  --amber:#d9a441; --amberbg:#332609;
  --purple:#7f8bcb;
  --radius:12px; --radius-sm:8px;
  --shadow:0 10px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Assistant',system-ui,sans-serif;
  background:radial-gradient(1100px 640px at 82% -12%,#141d38 0%,transparent 58%),var(--bg);
  color:var(--txt); min-height:100vh; font-size:15px; line-height:1.5;
}
h1,h2,h3,h4{font-family:'Rubik',sans-serif;margin:0;font-weight:700}
.num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:isolate;display:inline-block}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--accent2)}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.side{
  width:230px;flex-shrink:0;background:linear-gradient(180deg,#0d1428,#0b1020);
  border-inline-start:1px solid var(--line);position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;padding:18px 12px;gap:6px;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.brand .logo{width:40px;height:40px;border-radius:9px;background:linear-gradient(150deg,#2f5fd0,#16274d);border:1px solid #3a58a0;
  display:grid;place-items:center;font-family:'Rubik';font-weight:800;font-size:15px;color:#fff;letter-spacing:.5px;box-shadow:0 4px 14px rgba(45,80,180,.35)}
.brand .t1{font-family:'Rubik';font-weight:700;font-size:13.5px;line-height:1.15}
.brand .t2{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:start;
  background:transparent;border:0;color:var(--muted);padding:10px 12px;border-radius:10px;
  font-size:14.5px;font-weight:600;transition:.15s;position:relative;
}
.nav button .ic{font-size:17px;width:22px;text-align:center;filter:grayscale(.3)}
.nav button:hover{background:var(--panel);color:var(--txt)}
.nav button.active{background:linear-gradient(90deg,rgba(79,140,255,.18),rgba(79,140,255,.04));color:#fff}
.nav button.active::before{content:"";position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.nav .badge{margin-inline-start:auto;background:var(--red);color:#fff;border-radius:20px;font-size:11px;min-width:19px;height:19px;
  display:grid;place-items:center;padding:0 5px;font-weight:700}
.nav .sec{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;padding:12px 12px 4px;font-weight:700}
.side .qbox{margin-top:auto;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;font-size:12px}
.side .qbox b{color:var(--accent2)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--line);
  background:rgba(11,16,32,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;
}
.topbar h2{font-size:19px}
.topbar .sub{color:var(--muted);font-size:13px}
.topbar .spacer{flex:1}
.qsel{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:5px 8px}
.qsel label{font-size:12px;color:var(--muted)}
.qsel select{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:7px;padding:5px 8px;font-weight:700}
.content{padding:24px 26px 60px;max-width:1400px;width:100%}
/* WS-6: persistent North-Star bar (always know the score) */
.northstar{padding:12px 26px 0;max-width:1400px;width:100%}
.ns-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line2);border-radius:14px;padding:11px 16px}
.ns-score{display:flex;align-items:center;gap:12px}
.ns-num{font-size:27px;font-weight:800;line-height:1}
.ns-num span{font-size:12px;color:var(--muted2);font-weight:700}
.ns-halves{display:flex;flex-direction:column;gap:4px;min-width:130px}
.ns-h{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--muted)}
.ns-h>span{width:30px}
.ns-h .bar{flex:1;height:6px;background:var(--bg);border-radius:4px;overflow:hidden}
.ns-h .bar>i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.ns-h.pot .bar>i{background:linear-gradient(90deg,var(--purple),#c084fc)}
.ns-lbl{font-size:11px;color:var(--muted);font-weight:700}
.ns-div{width:1px;align-self:stretch;background:var(--line2)}
.ns-kpi{display:flex;flex-direction:column;gap:2px}
.ns-kpi .k{font-size:10px;color:var(--muted);font-weight:700}
.ns-kpi b{font-size:15px}
.ns-alert{margin-inline-start:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;max-width:42%;cursor:pointer}
.ns-alert.red{color:var(--red)} .ns-alert.amber{color:var(--amber)} .ns-alert.ok{color:var(--green)}
/* WS-5: master-plan roadmap strip */
.rm-strip{display:flex;align-items:center;gap:6px;overflow-x:auto;flex-wrap:wrap}
.rm-cell{min-width:54px;text-align:center;padding:8px 6px;border-radius:9px;background:var(--panel2);border:1px solid var(--line)}
.rm-cell b{display:block;font-size:13px}.rm-cell span{font-size:10px;color:var(--muted)}
.rm-cell.done{border-color:color-mix(in srgb,var(--green) 40%,var(--line))}.rm-cell.done span{color:var(--green)}
.rm-cell.cur{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 18%,transparent)}
.rm-ar{color:var(--muted2);font-weight:800}
/* decision categories — full-scan view (every form gets a visible verdict) */
.pcat{border:1px solid var(--line2);border-radius:14px;padding:14px;margin-bottom:16px;background:var(--panel)}
.pcat .cathead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.catpill{font-size:12px;font-weight:800;letter-spacing:.03em;color:#fff;padding:5px 13px;border-radius:20px;white-space:nowrap}
.pcat.fin .catpill{background:#e0574c}.pcat.strat .catpill{background:#0d9488}
.pcat.ops .catpill{background:#3b6fa5}.pcat.mkt .catpill{background:#20355c}
.fchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.fchip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted2);white-space:nowrap;cursor:default}
.fchip.rec{background:rgba(52,211,153,.14);color:var(--green);border-color:transparent}
.fchip.watch{background:rgba(245,158,11,.14);color:var(--amber);border-color:transparent}

/* ===== Components ===== */
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:18px}
.card h3{font-size:16px;margin-bottom:2px}
.card .ch{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
.card .ch h3{flex:1}
.card .cb{padding:16px 18px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
.tag.g{background:var(--greenbg);color:var(--green);border-color:transparent}
.tag.r{background:var(--redbg);color:var(--red);border-color:transparent}
.tag.a{background:var(--amberbg);color:var(--amber);border-color:transparent}
.tag.b{background:rgba(79,140,255,.15);color:var(--accent2);border-color:transparent}

.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:9px;padding:9px 15px;font-weight:700;font-size:14px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#243157;border-color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#3f7bef);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(79,140,255,.35)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.danger{background:var(--redbg);color:var(--red);border-color:transparent}
.btn.sm{padding:6px 11px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}

input.f,select.f,textarea.f{
  background:var(--bg);color:var(--txt);border:1px solid var(--line2);border-radius:8px;padding:8px 10px;width:100%;
}
input.f:focus,select.f:focus,textarea.f:focus{outline:none;border-color:var(--accent)}
label.fl{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field{margin-bottom:12px}

table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
table.tbl th{text-align:center;color:var(--muted);font-weight:700;font-size:12px;padding:9px 10px;border-bottom:1px solid var(--line2);white-space:nowrap}
table.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:center}
/* first column carries row labels — keep it at the start edge for readability */
table.tbl th:first-child,table.tbl td:first-child{text-align:start}
table.tbl tr:hover td{background:rgba(255,255,255,.02)}
table.tbl input.f{padding:5px 7px}
td.num,th.num{display:table-cell}  /* .num must not turn table cells into inline-blocks (breaks column layout) */
.qstrip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.qcell{flex:1;min-width:92px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;cursor:pointer;transition:.15s;position:relative}
.qcell:hover{border-color:var(--accent)}
.qcell.on{border-color:var(--line2)}
.qcell.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.qcell .qn{font-family:'Rubik';font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.qcell .qv{font-size:12px;color:var(--muted);margin-top:3px}
.qcell.empty{opacity:.55;border-style:dashed}
.qcell .qdot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.qcell.empty .qdot{background:var(--muted2)}
.finrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
.finrow:last-child{border-bottom:0}
.finrow b{font-variant-numeric:tabular-nums}
.finrow.tot{border-top:2px solid var(--line2);font-weight:800;margin-top:4px}
.act{display:flex;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid var(--line);border-inline-start:4px solid;margin-bottom:12px;background:var(--panel)}
.act.red{border-inline-start-color:var(--red);background:linear-gradient(90deg,var(--redbg),var(--panel))}
.act.amber{border-inline-start-color:var(--amber);background:linear-gradient(90deg,var(--amberbg),var(--panel))}
.act.info{border-inline-start-color:var(--accent)}
.act.good{border-inline-start-color:var(--green)}
.act .an{width:26px;height:26px;border-radius:7px;background:var(--panel2);display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0;font-family:'Rubik'}
.act .at{flex:1}
.act .at b{font-size:14.5px}
.act .at p{margin:5px 0 0;color:var(--muted);font-size:13.5px;line-height:1.55}
.act .form{display:inline-flex;align-items:center;gap:5px;margin-top:7px;background:var(--panel2);border:1px solid var(--line2);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;color:var(--accent2)}
.act .dep{margin-top:8px;font-size:12.5px;color:var(--amber);background:rgba(217,164,65,.08);border-radius:7px;padding:6px 9px;line-height:1.5}
.depchain{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.depnode{background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:700}
.depnode.here{border-color:var(--accent);color:var(--accent2);box-shadow:0 0 0 1px var(--accent) inset}
.deparrow{color:var(--muted2);font-weight:800;font-size:15px}
table.tbl.wide td,table.tbl.wide th{white-space:nowrap;font-size:12px;padding:5px 8px}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
.scrollx::-webkit-scrollbar{height:8px}
.scrollx::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi .l{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.kpi .v{font-size:24px;font-weight:800;font-family:'Rubik'}
.kpi .d{font-size:12px;margin-top:3px;font-weight:600}
.kpi .d.up{color:var(--green)} .kpi .d.dn{color:var(--red)}

/* Alerts */
.alert{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border-radius:11px;border:1px solid var(--line);margin-bottom:10px;background:var(--panel)}
.alert.on{border-inline-start:4px solid}
.alert.red{border-inline-start-color:var(--red);background:linear-gradient(90deg,var(--redbg),var(--panel))}
.alert.amber{border-inline-start-color:var(--amber);background:linear-gradient(90deg,var(--amberbg),var(--panel))}
.alert.ok{border-inline-start:4px solid var(--green)}
.alert .dot{font-size:20px;line-height:1}
.alert .txt{flex:1}
.alert .txt b{display:block;font-size:14.5px}
.alert .txt span{color:var(--muted);font-size:13px}

/* Dropzone */
.drop{border:2px dashed var(--line2);border-radius:16px;padding:44px 20px;text-align:center;transition:.2s;background:var(--panel)}
.drop.hover{border-color:var(--accent);background:rgba(79,140,255,.08)}
.drop .big{font-size:44px;margin-bottom:8px}

/* icons */
.ic-svg{width:1.05em;height:1.05em;vertical-align:-.16em;flex-shrink:0;stroke-width:1.75}
.ch h3 .ic-svg,.card h3 .ic-svg{margin-inline-end:8px;color:var(--accent2);vertical-align:-.14em}
.nav .ic{display:inline-flex;align-items:center;justify-content:center;width:22px}
.nav .ic .ic-svg{width:18px;height:18px;vertical-align:0}
.btn .ic-svg{width:16px;height:16px}
.kpi .l .ic-svg,.tag .ic-svg{width:14px;height:14px}
.sev{width:10px;height:10px;border-radius:50%;display:inline-block;margin-top:5px;flex-shrink:0}
.sev-red{background:var(--red);box-shadow:0 0 0 3px rgba(255,93,108,.16)}
.sev-amber{background:var(--amber);box-shadow:0 0 0 3px rgba(255,181,77,.16)}
.sev-ok{background:var(--green);box-shadow:0 0 0 3px rgba(46,199,160,.16)}

/* charts */
canvas{display:block;max-width:100%}

/* toast */
#toast{position:fixed;bottom:22px;inset-inline-start:50%;transform:translateX(50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#0f1730;border:1px solid var(--line2);border-inline-start:4px solid var(--accent);border-radius:10px;padding:11px 18px;box-shadow:var(--shadow);font-weight:600;animation:tin .3s}
.toast.g{border-inline-start-color:var(--green)} .toast.r{border-inline-start-color:var(--red)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(4,7,16,.72);backdrop-filter:blur(3px);z-index:50;display:grid;place-items:center;padding:20px}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow);max-width:620px;width:100%;max-height:86vh;overflow:auto}
.modal .mh{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal .mh h3{flex:1}
.modal .mb{padding:20px}
.modal .mf{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line)}
.x{background:transparent;border:0;color:var(--muted);font-size:22px;line-height:1;cursor:pointer}

.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ic{font-size:40px;opacity:.5;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:4px 11px;font-size:12.5px;font-weight:600}
.hr{height:1px;background:var(--line);margin:16px 0;border:0}
.src{font-size:11px;color:var(--muted2);font-style:italic}
.pill-tabs{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap}
.pill-tabs button{background:transparent;border:0;color:var(--muted);padding:7px 14px;border-radius:8px;font-weight:700;font-size:13.5px}
.pill-tabs button.active{background:var(--accent);color:#fff}
.checklist{padding:0;margin:0;list-style:none}
.checklist li{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
.check{width:20px;height:20px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0;display:grid;place-items:center;margin-top:1px}
.check.done{background:var(--green);border-color:var(--green);color:#04120c}
@media(max-width:860px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;overflow-x:auto}
  .nav{flex-direction:row;flex-wrap:wrap}
  .nav .sec,.side .qbox{display:none}
  .content{padding:16px}
  .grid[style*="1.15fr"],.grid[style*="1.3fr"],.grid[style*="1fr 1fr"]{grid-template-columns:1fr !important}
  /* topbar + north-star must wrap, never push the page wider than the viewport */
  .topbar{flex-wrap:wrap;padding:10px 14px;row-gap:8px}
  .topbar .spacer{display:none}
  .topbar h2{font-size:16px}
  .northstar{padding:10px 14px 0}
  .ns-wrap{gap:10px;padding:10px 12px}
  .ns-num{font-size:22px}
  .ns-alert{max-width:100%;margin-inline-start:0}
  .kpis{grid-template-columns:1fr 1fr !important}
  .pill-tabs{flex-wrap:wrap}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">G8</div>
      <div>
        <div class="t1">Group 8 — EMBA 41</div>
        <div class="t2">Tel Aviv University</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="qbox">
      רבעון פעיל: <b id="qboxNow">—</b><br>
      עודכן לאחרונה: <span id="qboxEdit" class="muted">—</span>
    </div>
    <div style="text-align:center;font-size:10px;color:var(--muted2);letter-spacing:.6px;margin-top:8px">INTOPIA War Room · <span id="appVer"></span></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h2 id="pageTitle">דשבורד</h2>
        <div class="sub" id="pageSub">תמונת מצב חברה 8</div>
      </div>
      <div class="spacer"></div>
      <div class="qsel">
        <label>רבעון</label>
        <select id="quarterSelect"></select>
      </div>
      <button class="btn sm ghost" id="btnExportData" title="הורדת גיבוי נתונים (JSON)"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> גיבוי</button>

function migrateIntel(){ // coerce legacy array marketIntel into the structured object shape
  QUARTERS.forEach(q=>{ const Q=S.quarters[q]; if(!Q)return;
    const mi=Q.marketIntel;
    if(!mi || Array.isArray(mi) || typeof mi!=='object'){ Q.marketIntel={competitors:{},sales:[],sources:[],generic:[]}; }
    else { mi.competitors=mi.competitors||{}; mi.sales=mi.sales||[]; mi.sources=mi.sources||[]; mi.generic=mi.generic||[]; }
  });
  // WS-2: correct legacy USD-based FX to the game's SF rates (only if untouched old default)
  const fx=S.config&&S.config.params&&S.config.params.fx;
  if(fx && (fx.EUR===1.08 || fx.BRL===0.20 || fx.CHF===1.10)) S.config.params.fx={...FX_DEFAULT};
  // normalise legacy inventory product labels ("Chip אירופה") to canonical X/Y + region
  QUARTERS.forEach(q=>{ const inv=(S.quarters[q]&&S.quarters[q].operational&&S.quarters[q].operational.inventory)||[];

function deepMerge(base, over){

    const out={...base};
    for(const k in over){ out[k]=(k in base)?deepMerge(base[k],over[k]):over[k]; }
    return out;
  }
  return over===undefined?base:over;
}

// WS-6: the persistent North-Star bar — score (real 50/50), cash-vs-floor, and the top action, on every page.
function renderNorthStar(){
  const box=$('#northstar'); if(!box) return;

  if(!Q||!Q.entered){ box.innerHTML=`<div class="ns-wrap"><div class="ns-lbl">${IC('inbox')} קלוט דוח רבעון כדי לראות את הציון החי (50% עבר / 50% פוטנציאל)</div></div>`; return; }
  const sp=scoreProxy(null);
  const cash=unifiedCashOf(base), floor=(S.config.goals.floors[base]||0), dist=cash-floor;
  const alerts=computeAlerts(base);
  const top=alerts.find(a=>a.level==='red')||alerts.find(a=>a.level==='amber')||alerts[0];
  const tlvl=top?(top.level==='red'?'red':(top.level==='amber'?'amber':'ok')):'ok';

    <div class="ns-score">
      <div class="ns-num">${sp.value.toFixed(0)}<span>/100</span></div>
      <div class="ns-halves">${half(sp.pastHalf,false)}${half(sp.potentialHalf,true)}</div>

    <div class="ns-div"></div>
    <div class="ns-kpi"><span class="k">מזומן מול רצפה</span><b class="num" style="color:${dist>=0?'var(--green)':'var(--red)'}">${dist>=0?'+':''}${fmt(Math.round(dist))} SF</b></div>

  </div>`;
}

  sel.onchange=()=>{
    if(sel.value==='CUM'){ S.cumulative=true; } else { S.cumulative=false; S.activeQuarter=sel.value; }
    save(); go(currentPage);
  };
}
function renderQBox(){ $('#qboxNow').textContent=S.cumulative?'מצטבר':S.activeQuarter;
  $('#qboxEdit').textContent=relTime(S.meta.lastEdited)+(S.meta.lastEditor?(' · '+S.meta.lastEditor):''); }
function enteredQuarters(){ return QUARTERS.filter(q=>S.quarters[q].entered); }
function latestEntered(){ const e=enteredQuarters(); return e.length?e[e.length-1]:null; }

/* =========================================================================
   DETERMINISTIC ENGINE  (F4 cash-flow, F3 alerts, scoring proxy)
   ========================================================================= */
function unifiedCashOf(q){
  const fin=S.quarters[q].financial;
  if(fin.consolidated) return fin.consolidated; // authoritative figure from the report (CHF)
  let sum=0; REGIONS.forEach(r=> sum += (fin.cash[r.id]||0)*fxRate(r.cur)); return sum;
}
function inventoryValue(q){ return S.quarters[q].operational.inventory.reduce((a,i)=>a+(i.qty||0)*(i.cost||0),0); }

function projectCashflow(baseQuarter, leversByQuarter){
  const p=S.config.params;
  let bal={}; REGIONS.forEach(r=> bal[r.id]=S.quarters[baseQuarter].financial.cash[r.id]||0);
  const out=[]; const startIdx=qIndex(baseQuarter); let pipeline=[];
  const push=(region,fromIdx,amount)=>{ const sched=p.collection[region]||[100,0,0];
    sched.forEach((pct,k)=>{ if(pct>0 && fromIdx+k<QUARTERS.length) pipeline.push({region,q:QUARTERS[fromIdx+k],amount:amount*pct/100}); }); };
  for(let i=startIdx+1;i<QUARTERS.length;i++){
    const q=QUARTERS[i]; const lev=(leversByQuarter&&leversByQuarter[q])||{}; let taxSF=0;
    REGIONS.forEach(r=>{
      const rl=(lev.regions&&lev.regions[r.id])||{};
      const sales=rl.sales||0, prodCost=(rl.production||0)*(rl.unitCost||0), adv=rl.advertising||0,
            invest=rl.invest||0, transferIn=rl.transferIn||0, rd=(lev.rd||0)/REGIONS.length;
      const facCost=(rl.newFac||0)*(p.factoryCost||0), offCost=(rl.offices||0)*(p.officeCost||0); // WS-4: A2-1 build + A1-3 operating
      // regional differential tax on operating profit (facCost is capex, excluded). Paid in cash when earned.
      const pretax=sales - prodCost - adv - rd - offCost;
      const tax=pretax>0 ? pretax*((p.tax[r.id]||0)/100) : 0; taxSF += tax*fxRate(r.cur);
      if(sales) push(r.id,i,sales);
      bal[r.id] -= (prodCost*(p.productionPay[0]/100)) + adv + invest + rd + facCost + offCost + tax - transferIn;
    });
    pipeline.filter(x=>x.q===q).forEach(x=> bal[x.region]+=x.amount);
    const loans=S.quarters[baseQuarter].financial.loans||0;
    bal.hq -= loans*(p.interest.bank/100)/4;
    const cashByRegion={...bal};
    let unified=0; REGIONS.forEach(r=> unified += cashByRegion[r.id]*fxRate(r.cur));
    const floor=S.config.goals.floors[q]||0;
    out.push({q,cashByRegion,unified,floor,breach:unified<floor,distance:unified-floor,tax:Math.round(taxSF)});
  }
  return out;
}
/* ---------- WS-1: the real INTOPIA final score — 50% past performance / 50% future potential ----------
   Past  = cumulative net profit ranked vs competitors (MR74) + efficiency (ROE/ROI/ROS vs targets).
   Future= tech vs target + market share (MR17&28) + financial health, weighted, with maturation to Q9.
   Every number is sourced from entered quarters / competitor intel; scenarios add an after-tax P&L projection. */
const START_CAPITAL=8000000; // opening capital, SF
function _c01(v){ return Math.max(0,Math.min(1,isFinite(v)?v:0)); }
function cumRealizedNet(base){ const bi=qIndex(base); let s=0;
  QUARTERS.forEach((q,i)=>{ if(i<=bi && S.quarters[q].entered) s+=(S.quarters[q].financial.netProfit||0); }); return s; }
function competitorRankOf(base,ourValue){ // rank OUR (possibly projected) profit vs competitors' retained earnings
  const others=Object.values((S.quarters[base].marketIntel||{}).competitors||{})
    .filter(c=>c.num!==OUR_CO && c.retainedEarnings!=null).map(c=>c.retainedEarnings);
  if(others.length<1) return null;
  const n=others.length+1, beat=others.filter(v=>v<ourValue).length;
  return {score:beat/(n-1), rank:n-beat, n}; // 1=best; responsive to ourValue
}
function marketShareScore(base){
  const sales=(S.quarters[base].marketIntel||{}).sales||[]; if(!sales.length) return null;
  const total=sales.reduce((a,s)=>a+s.units,0); if(total<=0) return null;
  const our=sales.filter(s=>s.company===OUR_CO).reduce((a,s)=>a+s.units,0);
  const n=Math.max(new Set(sales.map(s=>s.company)).size,2);
  return {score:_c01((our/total)/(2*(1/n))), share:our/total}; // 2× fair share = full marks
}
function projectedNetAdd(base,levers){ // after-tax P&L added by a scenario's future-quarter levers (WS-2 tax applied)
  if(!levers) return 0; const p=S.config.params, loans=S.quarters[base].financial.loans||0; let add=0;
  nextQuarters(base).forEach(q=>{ const lev=levers[q]; if(!lev) return; const rd=lev.rd||0; let net=0;
    REGIONS.forEach(r=>{ if(r.id==='hq') return; const rl=(lev.regions&&lev.regions[r.id])||{};
      const offCost=(rl.offices||0)*(p.officeCost||0); // A1-3 offices are opex, hit profit
      const pretax=(rl.sales||0)-((rl.production||0)*(rl.unitCost||0))-(rl.advertising||0)-(rd/3)-offCost;
      net += pretax - (pretax>0?pretax*((p.tax[r.id]||0)/100):0); });
    net -= loans*((p.interest&&p.interest.bank||0)/100)/4; add+=net; });
  return add;
}
function scoreProxy(leversByQuarter){
  const base=S.activeQuarter, g=S.config.goals, op=S.quarters[base].operational, f=S.quarters[base].financial;
  const proj=projectCashflow(base,leversByQuarter);
  const endCash=proj.length?proj[proj.length-1].unified:unifiedCashOf(base);
  const breaches=proj.filter(x=>x.breach).length;
  // ===== PAST HALF (50%) =====
  const cumNet=cumRealizedNet(base)+projectedNetAdd(base,leversByQuarter);
  const rankObj=competitorRankOf(base,cumNet); // rank our projected cumulative vs rivals
  const level=_c01(0.5 + cumNet/START_CAPITAL); // absolute magnitude: 0 profit→0.5, ±full capital→1/0
  const profScore = rankObj ? (0.7*rankObj.score + 0.3*level) : level;
  const t=(g.scoreTargets)||{roe:25,roi:15,ros:10};
  const effScore=_c01(((f.roe||0)/(t.roe||25)+(f.roi||0)/(t.roi||15)+(f.ros||0)/(t.ros||10))/3);
  const pastHalf=_c01(0.6*profScore+0.4*effScore)*100;
  // ===== POTENTIAL HALF (50%) =====
  const techX=g.techXTarget>0?op.techX/g.techXTarget:(op.techX/9), techY=g.techYTarget>0?op.techY/g.techYTarget:(op.techY/9);
  const techScore=_c01((techX+techY)/2);
  const shareObj=marketShareScore(base);
  const eqRatio=f.totalAssets>0?_c01(f.totalEquity/f.totalAssets):null;
  const levHealth=f.totalEquity>0?_c01(1-Math.min(1,(f.loans||0)/f.totalEquity)):null;
  const health=(eqRatio!=null||levHealth!=null)?_c01(((eqRatio||0)+(levHealth||0))/((eqRatio!=null?1:0)+(levHealth!=null?1:0))):null;
  const parts=[{v:techScore,w:0.45},{v:shareObj?shareObj.score:null,w:0.30},{v:health,w:0.25}].filter(c=>c.v!=null);
  const wsum=parts.reduce((a,c)=>a+c.w,0)||1;
  const potentialHalf=_c01(parts.reduce((a,c)=>a+c.v*c.w,0)/wsum)*100;
  // ===== COMBINE =====
  // a persistent breach cascades across quarters — count it once-ish and cap the hit so it doesn't obliterate the score
  const penalty=Math.min(18, breaches*4);
  const value=Math.max(0,Math.min(100,(pastHalf+potentialHalf)/2 - penalty));
  return {value, endCash, breaches, cashHalf:pastHalf, pastHalf, potentialHalf,
    parts:{profScore,effScore,techScore,share:shareObj?shareObj.share:null,health,cumNet,
      rank:rankObj?rankObj.rank:null,rankN:rankObj?rankObj.n:null}};
}

/* ==========================================================================
   WS-3 · Demand model + learning loop.
   Every entered quarter feeds an elasticity-around-observed-point demand model:
   we know our observed share at our observed (price, tech) per region×product,
   and apply calibrated elasticities to predict how CHANGING our levers moves
   share — the honest model for few observations. Elasticities refine as more
   quarters arrive; competitor trends and information gaps are tracked too.
   ========================================================================== */
function _lkey(region,product){ return region+'|'+product; }
function ourPriceFor(Q,product){
  const inv=(Q.operational.inventory||[]).filter(i=>i.product===product && i.price>0);
  if(!inv.length) return null; return inv.reduce((a,i)=>a+i.price,0)/inv.length;
}
function updateLearning(){
  const L=S.learning; if(!L) return;
  const entered=QUARTERS.filter(q=>S.quarters[q].entered);
  L.obs=entered.length; L.market={}; const perKey={};
  entered.forEach(q=>{ const Q=S.quarters[q], sales=(Q.marketIntel||{}).sales||[];
    const byKey={}; sales.forEach(s=>{ const k=_lkey(s.region,s.product); (byKey[k]=byKey[k]||{tot:0,our:0}); byKey[k].tot+=s.units; if(s.company===OUR_CO) byKey[k].our+=s.units; });
    Object.entries(byKey).forEach(([k,v])=>{ if(v.tot<=0) return;
      L.market[k]= L.market[k]!=null ? 0.5*L.market[k]+0.5*v.tot : v.tot; // EMA of market size
      const [region,product]=k.split('|');
      (perKey[k]=perKey[k]||[]).push({q, share:v.our/v.tot, price:ourPriceFor(Q,product),
        tech:product==='X'?Q.operational.techX:Q.operational.techY, units:v.our, total:v.tot});
    });
  });
  L.anchors={}; Object.entries(perKey).forEach(([k,arr])=>{ L.anchors[k]=arr[arr.length-1]; });
  // calibrate price elasticity from points where our price changed
  const est=[]; Object.values(perKey).forEach(arr=>{ for(let i=1;i<arr.length;i++){ const a=arr[i-1],b=arr[i];
    if(a.price>0&&b.price>0&&a.share>0&&b.share>0&&a.price!==b.price){ const e=Math.log(b.share/a.share)/Math.log(b.price/a.price); if(isFinite(e)&&e<0&&e>-6) est.push(e); } } });
  if(est.length){ const avg=est.reduce((x,y)=>x+y,0)/est.length; const w=Math.min(0.7,est.length*0.25);
    L.elast.price=(1-w)*(-1.8)+w*avg; L.elast.priceObs=est.length; } else L.elast.priceObs=0;
  L.trends=detectTrends(entered); L.gaps=infoGaps(entered);
  L.confidence=Math.min(1,L.obs/4); L.updatedAt=Date.now(); save(true);
}
function detectTrends(entered){
  if(entered.length<2) return [];
  const prev=S.quarters[entered[entered.length-2]].marketIntel||{}, cur=S.quarters[entered[entered.length-1]].marketIntel||{};
  const pc=prev.competitors||{}, cc=cur.competitors||{}, out=[];
  Object.values(cc).forEach(c=>{ if(c.num===OUR_CO) return; const p=pc[c.num]; if(!p) return;
    const curRd=(c.rdChip||0)+(c.rdPc||0), prevRd=(p.rdChip||0)+(p.rdPc||0);
    if(prevRd>0 && (curRd-prevRd)/prevRd>0.25) out.push({co:c.num,type:'rd',msg:`חברה ${c.num} מאיצה מו״פ (+${((curRd-prevRd)/prevRd*100).toFixed(0)}%) — סיכון פיגור טכנולוגי`});
    if((c.retainedEarnings||0)-(p.retainedEarnings||0) < -50000) out.push({co:c.num,type:'weak',msg:`חברה ${c.num} נחלשת ברווחים צבורים — הזדמנות לנתח שוק`});
  });
  const shareOf=mi=>{ const s=mi.sales||[]; const t=s.reduce((a,x)=>a+x.units,0)||1; return s.filter(x=>x.company===OUR_CO).reduce((a,x)=>a+x.units,0)/t; };
  const dShare=shareOf(cur)-shareOf(prev);
  if(Math.abs(dShare)>0.02) out.push({type:'ourshare',msg:`נתח השוק שלנו ${dShare>0?'עלה':'ירד'} ב-${(Math.abs(dShare)*100).toFixed(1)} נק׳ מהרבעון הקודם`});
  return out;
}
function infoGaps(entered){
  const gaps=[]; const last=entered[entered.length-1]; const mi=last?S.quarters[last].marketIntel||{}:{};
  if(!(mi.sales||[]).length) gaps.push({mr:'MR17 & MR28', why:'אין נתוני יחידות מתחרים — קריטי לכיול הביקוש ולנתח שוק'});
  if(!Object.keys(mi.competitors||{}).length) gaps.push({mr:'MR74', why:'אין מאזן/רו״ה מתחרים — נדרש לדירוג ולזיהוי מגמות'});
  if((S.learning.elast.priceObs||0)===0) gaps.push({mr:'מחקר מחירי מתחרים', why:'אין תצפיות מחיר להערכת גמישות — הביקוש עדיין על פריורים, לא מכויל'});
  return gaps;
}
function predictDemand(region,product,opt){
  const L=S.learning, k=_lkey(region,product), a=L.anchors[k], size=L.market[k];
  if(!a||size==null) return null; opt=opt||{};
  let share=a.share;
  if(opt.price>0 && a.price>0) share *= Math.pow(opt.price/a.price, L.elast.price);
  if(opt.tech!=null && a.tech>0 && opt.tech>0) share *= Math.pow(opt.tech/a.tech, L.elast.tech);
  share=Math.max(0,Math.min(1,share));
  const units=Math.round(share*size);
  const conf=Math.min(1,L.obs/4)*((L.elast.priceObs>0)?1:0.6);
  const band=Math.round(units*(1-conf)*0.5);
  return {units, low:Math.max(0,units-band), high:units+band, share, confidence:conf, size, anchor:a};
}
// Competitor price move via an attraction model: rivals cutting price raises their
// pull by (1-cut)^elast; we renormalise shares. Optionally we counter with the same cut.
function simCompetitorPriceMove(region,product,cutPct,weMatch){
  const L=S.learning, k=_lkey(region,product), a=L.anchors[k], size=L.market[k];
  if(!a||size==null||a.share<=0) return null;
  const elast=L.elast.price; // negative (price down -> demand up)
  const sUs=a.share, sRivals=Math.max(1e-6,1-sUs);
  const rivalMult=Math.pow(1-cutPct/100, elast); // cut>0 -> >1 (rivals more attractive)
  const usMult=weMatch?Math.pow(1-cutPct/100, elast):1;
  const Aus=sUs*usMult, Arivals=sRivals*rivalMult;
  const newShare=Aus/(Aus+Arivals);
  const baseUnits=Math.round(sUs*size), newUnits=Math.round(newShare*size);
  // if we match, our unit price also drops by cutPct — revenue effect uses the anchor price
  const price=a.price||0, newPrice=weMatch?Math.round(price*(1-cutPct/100)):price;
  return { region, product, baseShare:sUs, newShare, baseUnits, newUnits, deltaUnits:newUnits-baseUnits,
    price, newPrice, baseRev:Math.round(baseUnits*price), newRev:Math.round(newUnits*newPrice),
    confidence:Math.min(1,L.obs/4)*(L.elast.priceObs>0?1:0.6) };
}
function learningSummary(){
  const L=S.learning; if(!L||!L.obs) return null;
  return { obs:L.obs, confidence:L.confidence, priceElast:L.elast.price, priceObs:L.elast.priceObs,
    trends:L.trends||[], gaps:L.gaps||[], markets:Object.keys(L.market||{}).length };
}

/* ==========================================================================
   Data-consistency QA — cross-checks every entered quarter against itself,
   against its neighbours, and against the competitor reports (MR74/MR17&28).
   Runs on the team's real data in the browser; every finding cites sources.
   ========================================================================== */
function runDataQA(){
  const F=[]; const eq=enteredQuarters();
  const add=(level,q,title,detail)=>F.push({level,q,title,detail});
  if(!eq.length) return {findings:F,score:null,quarters:0};
  const rel=(a,b)=>{ const m=Math.max(Math.abs(a),Math.abs(b),1); return Math.abs(a-b)/m; };
  eq.forEach(q=>{
    const Q=S.quarters[q], f=Q.financial, op=Q.operational, mi=Q.marketIntel||{};
    // 1 · consolidated cash vs sum of regional cash at config FX
    const sumFx=REGIONS.reduce((a,r)=>a+(f.cash[r.id]||0)*fxRate(r.cur),0);
    if((f.consolidated||0)>0 && sumFx!==0){
      const d=rel(f.consolidated,sumFx);
      if(d>0.08) add('amber',q,'מזומן מאוחד ≠ סכום האזורים',`בדוח: ${fmt(f.consolidated)} · מחושב מהאזורים בשערי הקונפיגורציה: ${fmt(Math.round(sumFx))} (פער ${(d*100).toFixed(0)}%). בדוק שערי המרה או חילוץ מזומן אזורי. [${q}/מאזן מול ${q}/מזומן×FX]`);
      else add('ok',q,'מזומן מאוחד תואם את סכום האזורים',`${fmt(f.consolidated)} מול ${fmt(Math.round(sumFx))} — פער ${(d*100).toFixed(1)}%.`);
    }
    // 2 · balance-sheet identity
    if((f.totalAssets||0)>0 && (f.totalEquity||0)>0){
      const rhs=(f.totalEquity||0)+(f.loans||0)+(f.ap||0)+(f.supplierCredit||0);
      const d=rel(f.totalAssets,rhs);
      if(d>0.10) add('amber',q,'זהות מאזנית לא נסגרת',`נכסים ${fmt(f.totalAssets)} מול הון+חוב+ספקים ${fmt(Math.round(rhs))} (פער ${(d*100).toFixed(0)}%). ייתכן שדה התחייבות שלא חולץ. [${q}/מאזן]`);
      else add('ok',q,'זהות מאזנית נסגרת',`נכסים ${fmt(f.totalAssets)} ≈ הון+התחייבויות ${fmt(Math.round(rhs))}.`);
    }
    // 3 · inventory without price — severity follows the value chain:
    //     chips are intermediate goods (info); finished PCs matter only on the
    //     latest quarter, where the price must be entered for next quarter's sale.
    const latest=eq[eq.length-1];
    const noPriceY=(op.inventory||[]).filter(i=>i.product==='Y'&&(i.qty||0)>0&&!(i.price>0));
    const noPriceX=(op.inventory||[]).filter(i=>i.product==='X'&&(i.qty||0)>0&&!(i.price>0));
    if(noPriceY.length){
      const units=noPriceY.reduce((a,i)=>a+(i.qty||0),0);
      if(q===latest) add('red',q,'מחשבים מוכנים ללא מחיר — פעולה ברבעון הבא',`${fmt(units)} מחשבים במלאי הסגירה בלי מחיר. זה הרבעון שבו נפתחת המכירה — הזן מחיר+פרסום (A1-2) בהזנה הקרובה, אחרת "אין מחיר = אין מכירה". [${q}/מלאי]`);
      else add('info',q,'מלאי מחשבים ללא מחיר (היסטורי)',`${fmt(units)} מחשבים ללא מחיר ב-${q}. [${q}/מלאי]`);
    }
    if(noPriceX.length) add('info',q,'שבבים ללא מחיר — רכיב ביניים',`${fmt(noPriceX.reduce((a,i)=>a+(i.qty||0),0))} שבבים ללא מחיר צרכן — תקין אם מיועדים לעיבוד למחשבים (A4) ולא למכירה. [${q}/מלאי]`);
    // 4 · MR74 our-row vs our own books (MR74 is in 000s)
    const us=(mi.competitors||{})[OUR_CO];
    if(us && us.retainedEarnings!=null && f.retainedEarnings){
      const d=rel(us.retainedEarnings*1000, f.retainedEarnings);
      if(d>0.15) add('amber',q,'MR74 לא תואם את הספרים שלנו',`רווחים צבורים ב-MR74: ${fmt(us.retainedEarnings)}K מול הדוח שלנו: ${fmt(f.retainedEarnings)} (פער ${(d*100).toFixed(0)}%). בדוק יחידות (000s) או חילוץ. [${q}/MR74 מול ${q}/מאזן]`);
      else add('ok',q,'MR74 תואם את הספרים שלנו',`רווחים צבורים: ${fmt(us.retainedEarnings)}K ≈ ${fmt(f.retainedEarnings)}.`);
    }
    // 5 · revenue vs our sold units
    const ourUnits=(mi.sales||[]).filter(s=>s.company===OUR_CO).reduce((a,s)=>a+s.units,0);
    if((f.revenue||0)>0 && ourUnits===0 && (mi.sales||[]).length) add('info',q,'יש מחזור אך MR17&28 לא מראה יחידות שלנו',`מחזור ${fmt(f.revenue)} אך 0 יח׳ לחברה ${OUR_CO} בנתוני המכירות. ייתכן שהמחקר לא כיסה את האזור. [${q}]`);
    if(ourUnits>0 && (f.revenue||0)===0) add('amber',q,'MR מראה מכירות שלנו אך מחזור=0',`${fmt(ourUnits)} יח׳ ב-MR17&28 אך המחזור בדוח 0 — כנראה שדה מחזור לא חולץ. [${q}]`);
    // 6 · ROS sanity
    if((f.revenue||0)>0 && f.ros){
      const ros=f.netProfit/f.revenue*100;
      if(Math.abs(ros-f.ros)>6) add('info',q,'ROS בדוח ≠ רווח/מחזור',`בדוח ${f.ros}% מול מחושב ${ros.toFixed(1)}% — ייתכן בסיס חישוב שונה (מצטבר/שנתי). [${q}/יחסים]`);
    }
  });
  // cross-quarter checks
  for(let i=1;i<eq.length;i++){
    const q=eq[i], p=eq[i-1], f=S.quarters[q].financial, fp=S.quarters[p].financial;
    const op=S.quarters[q].operational, opp=S.quarters[p].operational;
    if(qIndex(q)-qIndex(p)>1) add('amber',q,`פער ברצף הרבעונים (${p}→${q})`,`רבעונים באמצע לא נקלטו — הקרנות ומצטברים יחסרו אותם.`);
    // retained-earnings continuity
    if(fp.retainedEarnings!==0 || f.retainedEarnings!==0){
      const expect=fp.retainedEarnings+(f.netProfit||0);
      const d=rel(f.retainedEarnings,expect);
      if(d>0.10 && Math.abs(f.retainedEarnings-expect)>20000)
        add('amber',q,'רווחים צבורים לא רציפים',`${p}: ${fmt(fp.retainedEarnings)} + רווח ${q}: ${fmt(f.netProfit)} = צפוי ${fmt(Math.round(expect))}, בדוח: ${fmt(f.retainedEarnings)}. בדוק חילוץ רווח נקי/דיבידנד. [${p}→${q}]`);
      else add('ok',q,'רווחים צבורים רציפים',`${fmt(fp.retainedEarnings)} + ${fmt(f.netProfit)} ≈ ${fmt(f.retainedEarnings)}.`);
    }
    // tech must not drop
    if((op.techX||0)<(opp.techX||0) || (op.techY||0)<(opp.techY||0))
      add('red',q,'ירידה ברמה טכנולוגית',`${p}: X${opp.techX}/Y${opp.techY} → ${q}: X${op.techX}/Y${op.techY}. דרגה לא יורדת ב-INTOPIA — כנראה שגיאת חילוץ. [${p}→${q}/תפעול]`);
    // common stock constant
    if((fp.commonStock||0)>0 && (f.commonStock||0)>0 && rel(f.commonStock,fp.commonStock)>0.02)
      add('info',q,'שינוי בהון מניות',`${fmt(fp.commonStock)} → ${fmt(f.commonStock)}. חריג אלא אם הונפק הון. [${p}→${q}/מאזן]`);
    // unexplained cash swing
    const u1=REGIONS.reduce((a,r)=>a+(fp.cash[r.id]||0)*fxRate(r.cur),0), u2=REGIONS.reduce((a,r)=>a+(f.cash[r.id]||0)*fxRate(r.cur),0);
    if(u1>100000 && rel(u1,u2)>0.6 && rel(f.loans||0,fp.loans||0)<0.2)
      add('info',q,'קפיצת מזומן חדה ללא שינוי חוב',`מזומן מאוחד ${fmt(Math.round(u1))} → ${fmt(Math.round(u2))} בעוד החוב כמעט ללא שינוי — ודא שאין שדה שחולץ פעמיים/חסר. [${p}→${q}]`);
  }
  const reds=F.filter(x=>x.level==='red').length, ambers=F.filter(x=>x.level==='amber').length, infos=F.filter(x=>x.level==='info').length;
  const score=Math.max(0,100-15*reds-7*ambers-2*infos);
  return {findings:F,score,quarters:eq.length,reds,ambers,infos};
}

function computeAlerts(q){
  const Q=S.quarters[q], g=S.config.goals, out=[];
  if(!Q.entered){ out.push({level:'amber',key:'noData',title:'אין נתוני רבעון',desc:`רבעון ${q} טרם נקלט — העלה את דוח התוצאות.`}); return out; }
  const proj=projectCashflow(q,null); const firstBreach=proj.find(x=>x.breach);
  if(firstBreach) out.push({level:'red',key:'floor',title:'שבירת רצפת מזומן צפויה',
    desc:`לפי ההקרנה, ב-${firstBreach.q} המזומן המאוחד (${fmt(firstBreach.unified)}) יורד מתחת לרצפה (${fmt(firstBreach.floor)}). מרחק: ${fmt(firstBreach.distance)}.`});
  REGIONS.forEach(r=>{ const v=Q.financial.cash[r.id]; if(v!==undefined&&v<0)
    out.push({level:'red',key:'cur_'+r.id,title:`יתרת מטבע שלילית — ${r.name}`,desc:`יתרה ${fmt(v)} ${r.cur}. גירעון מטבע דורש טיפול לפני ההזנה.`}); });
  if((Q.financial.supplierCredit||0)>0) out.push({level:'amber',key:'sc',title:'אשראי ספקים פעיל',
    desc:`יתרת אשראי ספקים ${fmt(Q.financial.supplierCredit)} — ריבית ~${S.config.params.interest.supplierCredit}%. שקול פירעון מוקדם.`});
  const noPrice=Q.operational.inventory.filter(i=>(i.qty||0)>0 && !(i.price>0));
  if(noPrice.length) out.push({level:'red',key:'noprice',title:'מלאי ללא מחיר מוזן',
    desc:`${noPrice.length} פריטי מלאי ללא מחיר — "אין מחיר = אין מכירה". פריטים: ${noPrice.map(i=>(i.product==='X'?'Chip':(i.product==='Y'?'PC':(i.product||'?')))+(i.grade?'/'+i.grade:'')+(i.region?' ('+i.region+')':'')).join(', ')}.`});
  if((Q.operational.rd||0)===0) out.push({level:'amber',key:'rd',title:'מו״פ = 0',
    desc:'אין השקעת מו״פ ברבעון זה — שים לב לקנס עקביות ולפיגור טכנולוגי מול מתחרים.'});
  S.config.contracts.forEach(c=>{
    if(c.deliveryQuarter && qIndex(c.deliveryQuarter)>=qIndex(q)){
      const invQty=Q.operational.inventory.filter(i=>i.product===c.product).reduce((a,i)=>a+(i.qty||0),0);
      if(invQty<(c.qty||0)) out.push({level:'amber',key:'ct_'+c.id,title:'התחייבות חוזית בסיכון',
        desc:`חוזה ${c.counterparty||'—'}: ${c.qty} × ${c.product||'—'} עד ${c.deliveryQuarter}. במלאי כעת ${invQty} בלבד.`});
    }
  });
  if(g.debtCeiling>0 && (Q.financial.loans||0)>g.debtCeiling) out.push({level:'amber',key:'debt',title:'חריגה מתקרת חוב',
    desc:`חוב ${fmt(Q.financial.loans)} מעל התקרה שהוגדרה (${fmt(g.debtCeiling)}).`});
  return out;
}

function kpi(label,val,delta){ return `<div class="kpi"><div class="l">${label}</div><div class="v num">${val}</div>${delta}</div>`; }
function deltaTag(now,prev){ if(prev===null||prev===undefined)return ''; const d=now-prev; if(!isFinite(d))return '';

function renderAlerts(box,alerts){

function drawTrend(cv){
  if(!cv)return;
  const data=QUARTERS.map(q=> S.quarters[q].entered?unifiedCashOf(q):null);
  const floors=QUARTERS.map(q=>S.config.goals.floors[q]||0);
  lineChart(cv,{labels:QUARTERS,series:[
    {name:'מזומן',data,color:'#4f8cff',fill:true},
    {name:'רצפה',data:floors,color:'#ff5d6c',dash:true},
  ]});
}
function lineChart(cv,{labels,series}){
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||(cv.parentElement.clientWidth-36), H=cv.height;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const padL=48,padR=12,padT=14,padB=26;
  const all=series.flatMap(s=>s.data).filter(v=>v!==null&&!isNaN(v));
  if(!all.length){ ctx.fillStyle='#6b78a0';ctx.font='13px Assistant';ctx.fillText('אין נתונים',W/2-30,H/2);return; }
  let min=Math.min(...all,0), max=Math.max(...all,0); if(min===max)max=min+1;
  const pad=(max-min)*0.12; max+=pad; min-=pad;
  const x=i=> padL+(W-padL-padR)*(i/(labels.length-1||1));
  const y=v=> padT+(H-padT-padB)*(1-(v-min)/(max-min));
  ctx.strokeStyle='#26315a';ctx.lineWidth=1;ctx.fillStyle='#6b78a0';ctx.font='10px Assistant';ctx.textAlign='right';
  for(let g=0;g<=4;g++){ const v=min+(max-min)*g/4, yy=y(v);
    ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(W-padR,yy);ctx.stroke(); ctx.fillText(shortNum(v),padL-6,yy+3); }
  ctx.textAlign='center'; labels.forEach((l,i)=>ctx.fillText(l,x(i),H-8));
  series.forEach(s=>{
    ctx.strokeStyle=s.color;ctx.lineWidth=2.4; ctx.setLineDash(s.dash?[5,4]:[]);
    ctx.beginPath();let started=false;
    s.data.forEach((v,i)=>{ if(v===null||isNaN(v)){started=false;return;} const xx=x(i),yy=y(v);
      if(!started){ctx.moveTo(xx,yy);started=true;}else ctx.lineTo(xx,yy); }); ctx.stroke();
    if(s.fill){ ctx.setLineDash([]);
      const grad=ctx.createLinearGradient(0,padT,0,H-padB); grad.addColorStop(0,s.color+'44');grad.addColorStop(1,s.color+'00');
      // build fill only across contiguous points
      ctx.beginPath();let st=false;let firstI=0,lastI=0;
      s.data.forEach((v,i)=>{ if(v===null||isNaN(v))return; const xx=x(i),yy=y(v); if(!st){ctx.moveTo(xx,y(min));ctx.lineTo(xx,yy);st=true;firstI=i;}else ctx.lineTo(xx,yy); lastI=i; });
      if(st){ ctx.lineTo(x(lastI),y(min)); ctx.closePath(); ctx.fillStyle=grad; ctx.fill(); }
    }
    ctx.setLineDash([]);
    s.data.forEach((v,i)=>{ if(v===null||isNaN(v))return; ctx.beginPath();ctx.arc(x(i),y(v),3,0,7);ctx.fillStyle=s.color;ctx.fill(); });
  });
}
function shortNum(v){ const a=Math.abs(v); if(a>=1e6)return (v/1e6).toFixed(1)+'M'; if(a>=1e3)return (v/1e3).toFixed(0)+'K'; return fmt(v); }

/* Decision-dependency layer: the canonical INTOPIA decision chain + the
   cross-decision prerequisites that are relevant to the current state, so the
   team sequences moves in the right order (and accounts for time lags). */
function renderDependencies(q,targetQ){
  const Q=S.quarters[q], f=Q.financial, op=Q.operational, g=S.config.goals;
  const noSales=(f.revenue||0)===0;
  const wantHigherGrade = g.techXTarget>op.techX || g.techYTarget>op.techY;
  // where are we in the chain? (no sales => still upstream at production)
  const chain=[
    {n:'מו״פ (H1-1)', here:wantHigherGrade},
    {n:'דגם/דרגה'},
    {n:'מפעלים (A2-1)'},
    {n:'ייצור (A2-3/A2-4)', here:noSales},
    {n:'תמחור+פרסום (A1-1/A1-2)'},
    {n:'מכירה'},
    {n:'גבייה מדורגת'},
    {n:'מזומן'},
  ];
  const deps=[];
  deps.push({t:'מו״פ ⟵ קודם לדרגה גבוהה', d:'החלטת מו״פ (H1-1, בליכטנשטיין) נספרת רבעון קדימה — רק אחרי שהדרגה מוכנה אפשר לייצר ולמכור אותה. למכירת דרגה/דגם גבוה יותר, המו״פ חייב להקדים ברבעון (או יותר).'});
  deps.push({t:'שבב ⟵ קודם למחשב', d:'מחשב (Y) דורש שבב (X). בשל עיכוב הרבעון, ייצור מחשבים ברבעון נתון מוגבל למלאי השבבים שנצבר מרבעונים קודמים — "אין שבב = אין מחשב". תזמן ייצור שבבים (A2-3) רבעון לפני ייצור המחשבים (A2-4).'});
  deps.push({t:'ייצור ⟵ קודם לתמחור/מכירה', d:'תמחור ופרסום (A1-1 שבב / A1-2 מחשב) שווים משהו רק אם קיים מלאי. קבע ייצור (A2-3/A2-4) קודם — "אין מלאי / אין מחיר = אין מכירה".'});
  deps.push({t:'מפעלים ⟵ מגבילים נפח ייצור', d:`הייצור חסום בקיבולת המפעלים (${op.factories} כרגע). הקמת מפעל (A2-1, עד 3 חדשים) אורכת זמן — ההחלטה חייבת להקדים את הרבעון שבו רוצים את הנפח.`});
  deps.push({t:'רצפת מזומן ⟵ מגבילה כל הוצאה', d:`כל ההוצאות (מו״פ, ייצור, פרסום, מפעל, העברות) כפופות לרצפה${f.consolidated?` — מזומן נוכחי ${fmt(f.consolidated)} CHF`:''}. ודא מימון (A3-2 הלוואה מקומית / H4 הלוואה בין-חברות) לפני התחייבות להוצאות גדולות.`});
  deps.push({t:'גבייה מדורגת ⟵ קובעת עיתוי מזומן', d:'הכנסה ממכירה נכנסת מדורג לפי לוח הגבייה האזורי (למשל ברזיל 30/30/40). החלטת מכירה היום משפיעה על המזומן ברבעונים הבאים — לא מיד. תזמן מול הרצפות.'});
  REGIONS.forEach(r=>{ if((f.cash[r.id]||0)<0) deps.push({t:`העברה ⟵ נדרשת לפני פעילות ב${r.name}`,d:`גירעון מטבע ב${r.name}. העברת כסף (A3-1, Money Transfer מהמטה) חייבת להתבצע לפני/עם ההזנה, אחרת פעולות באזור ייכשלו.`}); });
  return `<div class="card" style="margin-bottom:16px"><div class="ch"><h3>${IC('sliders')} תלויות ורצף החלטות</h3><span class="small muted">קבל את ההחלטות בסדר הנכון</span></div>
    <div class="cb">
      <div class="depchain">${chain.map((x,i)=>`<span class="depnode ${x.here?'here':''}">${x.n}</span>${i<chain.length-1?'<span class="deparrow">⟵</span>':''}`).join('')}</div>
      <div class="small muted" style="margin-top:8px">כל שלב תלוי בקודמו. הנקודה המודגשת = היכן שאתה נמצא כעת בשרשרת.</div>
      <ul style="padding-inline-start:20px;line-height:1.85;margin:12px 0 0">${deps.map(d=>`<li><b>${d.t}</b> — ${d.d}</li>`).join('')}</ul>
    </div></div>`;
}
// WS-5: confidence tags — every recommendation says where it comes from (data / game rule / estimate).
const CONF={ data:{t:'מבוסס נתונים',c:'g'}, rule:{t:'חוק משחק',c:'b'}, est:{t:'אומדן',c:'a'} };
function confTag(k){ const x=CONF[k]||CONF.rule; return `<span class="tag ${x.c}" title="רמת ביטחון להמלצה">${x.t}</span>`; }
// WS-5: maturation countdown — will an investment still pay off by Q9?
function quartersToEnd(q){ return (QUARTERS.length-1)-qIndex(q); }
function maturationAdvice(q){
  const n=quartersToEnd(q), out=[];
  out.push({ok:n>=1, t:'מו״פ (H1-1)', d:n>=1?`מבשיל +1 רבעון — נותרו ${n}, עדיין משתלם`:'ב-Q9 לא יבשיל בזמן — אל תשקיע במו״פ חדש'});
  out.push({ok:n>=3, t:'מפעל חדש (A2-1)', d:n>=3?'בנייה→ייצור→מכירה→גבייה עדיין נסגר עד Q9':'מאוחר מדי — לא יחזיר את ההשקעה עד Q9'});
  out.push({ok:n>=2, t:'משרד מכירות (A1-3)', d:n>=2?'עלות קבועה שמחזירה עם צמיחת נפח':'ההחזר לא יתממש עד Q9 — דלג'});
  out.push({ok:true, t:'נתח שוק / דרגה', d:'נמדדים ב-Q9 (מחצית הפוטנציאל) — בנה מוקדם, מתגמל בכל שלב'});
  return {n,out};
}
function renderRoadmap(q){
  const mat=maturationAdvice(q);
  const cells=QUARTERS.map(x=>{ const done=S.quarters[x].entered, cur=x===q;
    return `<div class="rm-cell ${cur?'cur':(done?'done':'')}"><b>${x}</b><span>${cur?'נוכחי':(done?'✓ נקלט':'—')}</span></div>`; }).join('<span class="rm-ar">←</span>');
  return `<div class="card" style="margin-bottom:16px"><div class="ch"><h3>${IC('trendUp')} תוכנית-אב Q1→Q9 · ספירת בשלות</h3><span class="tag ${mat.n<=2?'a':'b'}">${mat.n} רבעונים עד הסיום</span></div>
    <div class="cb"><div class="rm-strip">${cells}</div>
      <div class="small muted" style="margin-top:12px">מה עוד מבשיל עד Q9 אם מתחילים מ-${q}:</div>
      <ul style="padding-inline-start:20px;line-height:1.9;margin:6px 0 0">${mat.out.map(m=>`<li class="small"><span style="color:${m.ok?'var(--green)':'var(--red)'};font-weight:800">${m.ok?'✓':'✕'}</span> <b>${esc(m.t)}</b> — ${esc(m.d)}</li>`).join('')}</ul>
    </div></div>`;
}
// Value-chain maturation: factory (1q) -> chips (1q) -> PCs from chips (1q) -> first possible sale.
// Selling in quarter N requires finished PCs in the ENDING inventory of quarter N-1.
function prevEnteredOf(q){ const i=qIndex(q); for(let k=i-1;k>=0;k--){ if(S.quarters[QUARTERS[k]].entered) return QUARTERS[k]; } return null; }
function pcCarriedInto(q){ const p=prevEnteredOf(q); if(!p) return 0;
  return (S.quarters[p].operational.inventory||[]).filter(it=>it.product==='Y').reduce((a,it)=>a+(it.qty||0),0); }
function chainStage(q){ // where are we on the mandatory build-up path?
  const op=S.quarters[q].operational;
  const pcs=(op.inventory||[]).filter(i=>i.product==='Y').reduce((a,i)=>a+(i.qty||0),0);
  const chips=(op.inventory||[]).filter(i=>i.product==='X').reduce((a,i)=>a+(i.qty||0),0);
  if(pcs>0) return {stage:3,txt:'מחשבים מוכנים במלאי — מכירה אפשרית מהרבעון הבא',pcs,chips};

  }
  // Sales offices (A1-3) — needed where we plan to sell
  const pcsNow=(op.inventory||[]).filter(i=>i.product==='Y').reduce((a,i)=>a+(i.qty||0),0);
  if(pcsNow>0 && (op.offices||0)===0){
    const sellRegion=((op.inventory||[]).find(i=>i.product==='Y')||{}).region||'europe';
    const regName=(REGIONS.find(r=>r.id===sellRegion)||{}).name||sellRegion;
    out.push({cat:'mkt',level:'amber',conf:'rule',title:`אין משרדי מכירות — פתח 2 ב${regName}`,form:'A1-3 (Open or Close Sales Offices)',
      detail:`מתכננים למכור ${fmt(pcsNow)} מחשבים אך רשומים 0 משרדי מכירות. משרדים מגבילים את תקרת המכירה לצרכן — פתח <b>2</b> ב${regName} יחד עם התמחור.`,
      dep:`נכנס לתוקף עם ההזנה — חייב להיות באותו רבעון של פתיחת המכירות.`,
      sim:{q:targetQ,regions:{[sellRegion]:{offices:2}}}});
  }
  // 8. Contracts at risk
  S.config.contracts.forEach(ct=>{ if(ct.deliveryQuarter && qIndex(ct.deliveryQuarter)>=qIndex(q)){
    const inv=op.inventory.filter(i=>i.product===ct.product).reduce((a,i)=>a+(i.qty||0),0);
    if(inv<(ct.qty||0)) out.push({cat:'ops',level:'amber',title:`חוזה בסיכון — ${ct.counterparty||'צד נגדי'}`,form:'A2-3/A2-4 (ייצור)',
      detail:`התחייבת ל-${ct.qty} × ${ct.product||'—'} עד ${ct.deliveryQuarter}, במלאי ${inv} בלבד. תזמן ייצור (A2-3 שבב / A2-4 מחשב) כדי לעמוד באספקה.`}); } });
  // 9. Debt
  if((f.loans||0)>0 && (f.consolidated||unifiedCashOf(q)) > (f.loans||0)*2) out.push({cat:'fin',level:'info',title:'שקול פירעון חוב',form:'A3-2 / H4 (מימון)',
    detail:`יש חוב ${fmt(f.loans)} וריבית שוטפת. עם עודף מזומן נוכחי, פירעון חלקי חוסך ריבית ומשפר יחסים — אם אין שימוש טוב יותר למזומן.`});
  // 10. MAX plan reference
  const maxSc=S.scenarios.find(s=>s.name==='MAX — מיקסום Q9');
  if(maxSc){ const sp=scoreProxy(maxSc.levers);
    out.push({cat:'strat',level:'good',conf:'est',title:'תוכנית המיקסום מוכנה',form:'ייצוא הזנה',
      detail:`חושבה תוכנית מיטבית ל-Q9 (מזומן סופי מוקרן ${fmt(sp.endCash)}, פרוקסי ציון ${sp.value.toFixed(0)}). פתח אותה בסימולטור, כוונן, וייצא גיליון הזנה ל-${targetQ}.`,action:"go('export')",actionLabel:'ייצא הזנה'});
  } else out.push({cat:'strat',level:'info',title:'הרץ מיקסום Q9',form:'—',
    detail:`טרם חושבה תוכנית מיטבית. עבור ל<b>יעדים ← MAX</b>, הזן קיבולת ועלות יח׳, וקבל המלצת ייצור/מחיר/מו״פ שממקסמת את הציון בלי לשבור רצפות.`,action:"go('goals')",actionLabel:'למיקסום'});
  if(!out.length) out.push({cat:'strat',level:'good',title:'המצב יציב — המשך התוכנית',detail:'אין נורות אדומות והרצפות נשמרות. המשך לפי היעדים ובחן תרחישים בסימולטור.'});
  // sort by severity
  const ord={red:0,amber:1,info:2,good:3};
  out.sort((a,b)=>ord[a.level]-ord[b.level]);
  return out;
}

function xlsxReady(){ return typeof XLSX!=='undefined' && XLSX && XLSX.read; }
function handleFile(file){

  reader.onload=e=>{

      const parsed=parseWorkbook(wb); applyParsed(parsed);
      info.innerHTML=`
        <div class="tag g" style="margin-bottom:8px">✓ נקלט: ${esc(file.name)}</div>
        <div class="small muted">גיליונות: ${wb.SheetNames.map(n=>`<span class="chip" style="margin:2px">${esc(n)} ${matchSheet(n)?IC('check'):''}</span>`).join('')}</div>
        <div class="small" style="margin-top:8px">חולצו: ${parsed.summary}. אמת/תקן למטה ואשר. <b>MR שנקלטו: ${parsed.mrCount}</b></div>`;

  };
  reader.readAsArrayBuffer(file);
}
function matchSheet(name){ const n=name.toLowerCase();
  if(/balance/.test(n))return'balance'; if(/income|profit|p&l/.test(n))return'income';
  if(/manag|mgmt|info/.test(n))return'mgmt'; if(/curren|fx/.test(n))return'currency';
  if(/^mr\b|market research|mr\s*\d/.test(n))return'mr'; return null; }
function parseNumber(v){
  if(typeof v==='number')return isNaN(v)?null:v; if(typeof v!=='string')return null;
  const neg=/^\(.*\)$/.test(v.trim());
  const cleaned=v.replace(/[(),\s€$₪R]/g,''); if(cleaned===''||isNaN(cleaned))return null;
  let n=parseFloat(cleaned); if(neg)n=-Math.abs(n); return n;
}
/* Normalize a row label: uppercase, strip a leading digit artifact ("0TOTAL..."), collapse spaces. */
function normLabel(s){ return String(s==null?'':s).toUpperCase().replace(/^[^A-Z(]+/,'').replace(/\s+/g,' ').trim(); }
function rowsOf(ws){ return XLSX.utils.sheet_to_json(ws,{header:1,defval:''}); }
function findRow(rows,re){ return rows.find(r=> re.test(normLabel(r&&r[0]))); }
function findRows(rows,re){ return rows.filter(r=> re.test(normLabel(r&&r[0]))); }

/* Balance Sheet / Income Statement share the column layout:
   col0=label, US=2, EC/EU=4, BRAZIL=6, LIECHTENSTEIN(HQ)=7, CONSOLIDATED=8. */
const IS_COL={us:2,europe:4,brazil:6,hq:7,cons:8};
function cell(rows,re,col){ const r=findRow(rows,re); return r?parseNumber(r[col]):null; }
function sumRows(rows,re,col){ return findRows(rows,re).reduce((a,r)=>{ const n=parseNumber(r[col]); return a+(n||0); },0); }

function extractBalance(rows,scan,f){
  const cashRow=findRow(rows,/^CASH$/);
  if(cashRow){ scan.cash={}; REGIONS.forEach(r=>{ const v=parseNumber(cashRow[IS_COL[r.id]]); if(v!==null)scan.cash[r.id]=v; });
    const cons=parseNumber(cashRow[IS_COL.cons]); if(cons!==null)scan.consolidated=cons; f.push('מזומן לפי אזור + מאוחד'); }
  const ar=sumRows(rows,/^A\/R PERIOD/,IS_COL.cons); if(findRow(rows,/^A\/R PERIOD/)){ scan.ar=ar; f.push('A/R'); }
  const ap=sumRows(rows,/^A\/P PERIOD/,IS_COL.cons); if(findRow(rows,/^A\/P PERIOD/)){ scan.ap=ap; f.push('A/P'); }
  const sc=cell(rows,/^SUPPLIER CREDIT/,IS_COL.cons); if(sc!==null){ scan.supplierCredit=sc; f.push('אשראי ספקים'); }
  const area=cell(rows,/^AREA BANK LOANS/,IS_COL.cons)||0, bank=cell(rows,/^BANK LOANS PAYABLE/,IS_COL.cons)||0, bonds=cell(rows,/^LONG.?TERM BONDS/,IS_COL.cons)||0;
  if(findRow(rows,/BANK LOANS/)){ scan.loans=area+bank+bonds; f.push('הלוואות'); }
  const re=cell(rows,/^RETAINED EARNINGS/,IS_COL.cons); if(re!==null){ scan.retainedEarnings=re; f.push('רווחים צבורים'); }
  const sec=cell(rows,/^GOVERNMENT SECURITIES/,IS_COL.cons); if(sec!==null){ scan.securities=sec; }
  const plant=cell(rows,/^NET PLANT AND EQUIPMENT/,IS_COL.cons); if(plant!==null) scan.netPlant=plant;
  const ta=cell(rows,/^TOTAL ASSETS/,IS_COL.cons); if(ta!==null) scan.totalAssets=ta;
  const cs=cell(rows,/^COMMON STOCK/,IS_COL.cons); if(cs!==null) scan.commonStock=cs;
  const teq=cell(rows,/^TOTAL EQUITY/,IS_COL.cons); if(teq!==null) scan.totalEquity=teq;
}
function extractIncome(rows,scan,f){
  const ne=cell(rows,/^NET EARNINGS$/,IS_COL.cons); if(ne!==null){ scan.netProfit=ne; f.push('רווח נקי'); }
  const gm=cell(rows,/^TOTAL GROSS MARGIN/,IS_COL.cons); if(gm!==null) scan.grossMargin=gm;
  // Revenue = consumer sales (standard + deluxe), consolidated
  const consumer=sumRows(rows,/^CONSUMER$/,IS_COL.cons); if(findRow(rows,/^CONSUMER$/)){ scan.revenue=consumer; f.push('מחזור (מכירות צרכן)'); }
  const rdChip=cell(rows,/^R & D NEW CHIP/,IS_COL.cons)||0, rdPc=cell(rows,/^R & D NEW PC/,IS_COL.cons)||0;
  if(findRow(rows,/R & D NEW/)){ scan.rd=rdChip+rdPc; f.push('מו״פ (Chip+Computer)'); }
  const mr=cell(rows,/^MARKET RESEARCH/,IS_COL.cons); if(mr!==null) scan.marketResearch=mr;
  const ie=cell(rows,/^INTEREST EXPENSE/,IS_COL.cons); if(ie!==null) scan.interestExp=ie;
}
/* Management Info layout: US chip=1 pc=3, EC/EU chip=4 pc=6, BRAZIL chip=7 pc=9 (single-value rows use the chip column). */
const MG_MAIN=[1,4,7], MG_PC=[3,6,9];
function extractMgmt(rows,scan,f){
  const sumCols=(re,cols)=>{ const r=findRow(rows,re); if(!r)return null; return cols.reduce((a,c)=>a+(parseNumber(r[c])||0),0); };
  const maxCols=(re,cols)=>{ const r=findRow(rows,re); if(!r)return null; return Math.max(...cols.map(c=>parseNumber(r[c])||0)); };
  const plants=sumCols(/^PLANTS BUILT AND BUILDING/,MG_MAIN); if(plants!==null){ scan.factories=plants; f.push('מפעלים'); }
  const offices=sumCols(/REG.? SALES OFFICES/,MG_MAIN); if(offices!==null){ scan.offices=offices; f.push('משרדים'); }
  const ownChip=maxCols(/^MAX.? OWNED GRADE/,MG_MAIN), ownPc=maxCols(/^MAX.? OWNED GRADE/,MG_PC);
  if(ownChip!==null){ scan.techX=ownChip; scan.techY=ownPc; f.push('רמות Chip/Computer'); }
  const prod=maxCols(/^MAX.? PRODUCIBLE GRADE/,MG_MAIN); if(prod!==null){ scan.maxProducible=prod; f.push('Max Producible'); }
  // Ending inventory -> items (only where units>0)
  const inv=[];
  const addInv=(re,gradeLabel)=>{ const r=findRow(rows,re); if(!r)return;
    REGIONS.filter(x=>x.id!=='hq').forEach((reg,idx)=>{ const units=parseNumber(r[MG_MAIN[idx]])||0, pcUnits=parseNumber(r[MG_PC[idx]])||0;
      // canonical product codes (X=Chip, Y=PC) so the chip guard, demand model and role views all recognise items
      if(units>0) inv.push({product:'X',region:reg.id,grade:gradeLabel,qty:units,cost:0,price:0});
      if(pcUnits>0) inv.push({product:'Y',region:reg.id,grade:gradeLabel,qty:pcUnits,cost:0,price:0}); }); };
  addInv(/^STANDARD UNITS/,'Standard'); addInv(/^DELUXE UNITS/,'Deluxe');
  if(inv.length){ scan.inventory=inv; f.push('מלאי סגירה'); }
}
function extractCurrency(rows,scan){
  const er=findRow(rows,/^EXCHANGE RATE/); // US EC/EU BRAZIL LIECHT (units per CHF)
  if(er){ scan.gameRates={us:parseNumber(er[1]),europe:parseNumber(er[2]),brazil:parseNumber(er[3]),hq:parseNumber(er[4])}; }
}

function parseWorkbook(wb){
  const scan={}; let mrCount=0; const found=[];
  wb.SheetNames.forEach(sn=>{
    const type=matchSheet(sn); const ws=wb.Sheets[sn]; if(!ws)return;
    const rows=rowsOf(ws);
    if(type==='mr'){ mrCount++; ingestMR(sn,rows); return; }
    if(type==='balance') extractBalance(rows,scan,found);
    else if(type==='income') extractIncome(rows,scan,found);
    else if(type==='mgmt') extractMgmt(rows,scan,found);
    else if(type==='currency') extractCurrency(rows,scan);
  });
  const uniq=[...new Set(found)];
  return {scan,mrCount,summary: uniq.length? uniq.join(' · ') : 'לא זוהו שדות מוכרים — בדוק שהקובץ הוא דוח INTOPIA', applied:uniq};
}
function applyParsed({scan}){
  const Q=S.quarters[S.activeQuarter], f=Q.financial, op=Q.operational;
  if(scan.cash){ REGIONS.forEach(r=>{ if(scan.cash[r.id]!==undefined) f.cash[r.id]=scan.cash[r.id]; }); }
  ['consolidated','netProfit','revenue','grossMargin','retainedEarnings','loans','ap','ar','supplierCredit','securities','netPlant','totalAssets','commonStock','totalEquity','interestExp','marketResearch'].forEach(k=>{ if(scan[k]!==undefined&&scan[k]!==null) f[k]=scan[k]; });
  ['techX','techY','maxProducible','factories','offices','rd'].forEach(k=>{ if(scan[k]!==undefined&&scan[k]!==null) op[k]=scan[k]; });
  if(scan.inventory&&scan.inventory.length) op.inventory=scan.inventory;
  if(scan.gameRates) S.config.params.gameRates=scan.gameRates;
  save();
}
function ingestMR(sheetName,rows){
  const Q=S.quarters[S.activeQuarter]; const mi=Q.marketIntel;
  // skip the "does not exist this quarter" placeholder sheet
  const flat=rows.map(r=>r.join(' ')).join(' ').toLowerCase();
  if(/does not exist in this quarter/.test(flat)) return;
  if(!mi.sources.includes(sheetName)) mi.sources.push(sheetName);
  if(/74/.test(sheetName)) extractMR74(rows,mi);
  else if(/17|28/.test(sheetName)) extractMR1728(rows,mi);
  else { if(!mi.generic.some(g=>g.source===sheetName)) mi.generic.push({source:sheetName,rows:rows.length}); }
  save(true);
}
/* MR74 = consolidated Balance Sheet + Income Statement for all companies (000s CHF).
   Companies are in columns 1..N under a "COMPANY | CO. 1 | CO. 2 ..." header row. */
function extractMR74(rows,mi){
  const hdr=rows.find(r=> /^COMPANY$/.test(normLabel(r[0])) && /CO\.?\s*\d/.test(String(r[1]||'')));
  if(!hdr) return;
  const cols=[]; // {idx, num}
  hdr.forEach((v,i)=>{ const m=String(v).match(/CO\.?\s*(\d+)/i); if(m) cols.push({idx:i, num:parseInt(m[1],10)}); });
  const val=(re,c)=>{ const r=findRow(rows,re); return r?(parseNumber(r[c])||0):null; };
  cols.forEach(c=>{
    const co='CO '+c.num;
    const rec={ num:c.num,
      cash: val(/^CASH$/,c.idx), securities: val(/^SECURITIES/,c.idx), plant: val(/^NET PLANT/,c.idx),
      totalAssets: val(/^TOTAL ASSETS/,c.idx), bankLoans: val(/^BANK LOANS PAYABLE/,c.idx),
      retainedEarnings: val(/^RETAINED EARNINGS/,c.idx), equity: val(/^TOTAL EQUITY/,c.idx),
      netEarnings: val(/^NET EARNINGS/,c.idx), grossMargin: val(/^TOTAL GROSS MARGIN/,c.idx),
      rdChip: val(/^R & D NEW CHIP/,c.idx), rdPc: val(/^R & D NEW PC/,c.idx),
      marketResearch: val(/^MARKET RESEARCH/,c.idx), interestExp: val(/^INTEREST EXPENSE/,c.idx),
      unit:'000 CHF' };
    mi.competitors[co]=Object.assign(mi.competitors[co]||{}, rec);
  });
}
/* MR17&28 = consumer units sold by company / region / product(CHIP,PC) / grade(STD,DEL). */
function extractMR1728(rows,mi){
  // column layout: US CHIP-STD=1 DEL=2 PC-STD=3 DEL=4 ; EU 5-8 ; BRAZIL 9-12
  const layout=[
    {region:'us',product:'Chip',grade:'Standard',col:1},{region:'us',product:'Chip',grade:'Deluxe',col:2},
    {region:'us',product:'Computer',grade:'Standard',col:3},{region:'us',product:'Computer',grade:'Deluxe',col:4},
    {region:'europe',product:'Chip',grade:'Standard',col:5},{region:'europe',product:'Chip',grade:'Deluxe',col:6},
    {region:'europe',product:'Computer',grade:'Standard',col:7},{region:'europe',product:'Computer',grade:'Deluxe',col:8},
    {region:'brazil',product:'Chip',grade:'Standard',col:9},{region:'brazil',product:'Chip',grade:'Deluxe',col:10},
    {region:'brazil',product:'Computer',grade:'Standard',col:11},{region:'brazil',product:'Computer',grade:'Deluxe',col:12},
  ];
  mi.sales=mi.sales.filter(s=>s.source!=='MR17&28');
  rows.forEach(r=>{ const m=String(r[0]||'').match(/COMPANY\s*(\d+)/i); if(!m)return; const num=parseInt(m[1],10);
    layout.forEach(L=>{ const u=parseNumber(r[L.col]); if(u&&u>0) mi.sales.push({company:num, region:L.region, product:L.product, grade:L.grade, units:u, source:'MR17&28'}); });
  });
}

function intelInsights(comps,mi){
  const out=[]; const us=comps.find(c=>c.num===OUR_CO); if(!us) return out;
  const sorted=(key,dir=1)=>[...comps].filter(c=>c[key]!=null).sort((a,b)=>(b[key]-a[key])*dir);
  const rankOf=(arr)=>arr.findIndex(c=>c.num===OUR_CO)+1;
  const n=comps.length;
  // Retained earnings position (= 50% of final score)
  const reRank=rankOf(sorted('retainedEarnings')); const reLeader=sorted('retainedEarnings')[0];
  out.push(`ברווחים צבורים אנחנו במקום <b>${reRank}/${n}</b> (המוביל: חברה ${reLeader.num} עם ${fmt(reLeader.retainedEarnings)}). זה 50% מהציון הסופי — ${reRank>n/2?'<span style="color:var(--amber)">פער לסגור: להאיץ מכירות ורווחיות</span>':'עמדה טובה, לשמר'}.`);
  // Cash war-chest
  const cashRank=rankOf(sorted('cash'));
  out.push(`במזומן אנחנו במקום <b>${cashRank}/${n}</b> (${fmt(us.cash)}) — ${cashRank<=3?'יתרון להשקעה אגרסיבית בייצור/פרסום כשמתחילות המכירות':'לשמור על נזילות מול הרצפות'}.`);
  // R&D pressure by product
  const rdChipLeaders=sorted('rdChip').filter(c=>c.num!==OUR_CO && c.rdChip>0).slice(0,2);
  const rdPcLeaders=sorted('rdPc').filter(c=>c.num!==OUR_CO && c.rdPc>0).slice(0,2);
  if(rdChipLeaders.length) out.push(`לחץ טכנולוגי ב-<b>Chip</b>: חברות ${rdChipLeaders.map(c=>c.num+' ('+fmt(c.rdChip)+')').join(', ')} משקיעות במו״פ Chip — שקול להדביק כדי לא לפגר בדרגה.`);
  if(rdPcLeaders.length) out.push(`לחץ טכנולוגי ב-<b>Computer</b>: חברות ${rdPcLeaders.map(c=>c.num+' ('+fmt(c.rdPc)+')').join(', ')} משקיעות במו״פ Computer.`);
  // Our own R&D vs field
  const avgRd=comps.reduce((a,c)=>a+((c.rdChip||0)+(c.rdPc||0)),0)/n; const ourRd=(us.rdChip||0)+(us.rdPc||0);
  out.push(`מו״פ שלנו ${fmt(ourRd)} מול ממוצע השוק ${fmt(Math.round(avgRd))} — ${ourRd>=avgRd?'מעל הממוצע, שומר על קצב טכנולוגי':'<span style="color:var(--amber)">מתחת לממוצע — סיכון לפיגור בדרגה</span>'}.`);
  // Aggressive intel gatherers
  const mrLeaders=sorted('marketResearch').filter(c=>c.num!==OUR_CO && c.marketResearch>0).slice(0,2);
  if(mrLeaders.length) out.push(`חברות ${mrLeaders.map(c=>c.num).join(', ')} רוכשות הכי הרבה מחקרי שוק — הן אוספות עלינו מודיעין; שמור על גמישות ואל תשדר כוונות.`);
  // Debt exposure of rivals (opportunity)
  const highDebt=sorted('bankLoans').filter(c=>c.num!==OUR_CO).slice(0,1)[0];
  if(highDebt&&highDebt.bankLoans>us.bankLoans*1.5) out.push(`חברה ${highDebt.num} ממונפת מאוד (הלוואות ${fmt(highDebt.bankLoans)}) — פגיעה לתחרות מחירים אם נלחץ.`);
  // Market share (if sales exist)
  if((mi.sales||[]).length){ const byCo={}; mi.sales.forEach(s=>byCo[s.company]=(byCo[s.company]||0)+s.units);
    const total=Object.values(byCo).reduce((a,b)=>a+b,0)||1; const ourShare=(byCo[OUR_CO]||0)/total*100;
    out.push(`נתח השוק שלנו ${ourShare.toFixed(1)}% — ${ourShare<10?'<span style="color:var(--red)">נמוך, בחן מחיר/פרסום</span>':'מבוסס'}.`);
  } else { out.push(`אין עדיין נתוני מכירות (MR17&28) — נצל את החלון להיערכות לפני שהמתחרים תופסים שוק.`); }
  out.push(`${IC('lock')} הבחנה: MR17&28 מראה יחידות <u>שנמכרו</u>, לא דרגות טכנולוגיה. לדרגות מתחרים — רכוש מחקר ייעודי לפני החלטת מו״פ גדולה.`);
  return out;
}

    if(rl.production>0) rows.push({form:isX?'A2-3':'A2-4',action:`ייצור ${r.name} — ${isX?'X·Chip':'Y·PC'} ${model}`,value:rl.production,note:rl.unitCost?`עלות/יח׳ ${fmt(rl.unitCost)} ${r.cur}`:''});
    if(rl.sales>0||rl.advertising>0) rows.push({form:isX?'A1-1':'A1-2',action:`תמחור+פרסום ${r.name} — ${isX?'Chip':'PC'} ${model}`,value:price,note:`מחיר/יח׳ · פרסום ${fmt(rl.advertising||0)} · מכירות ${fmt(rl.sales||0)} ${r.cur}`});
    if((rl.newFac||0)>0) rows.push({form:'A2-1',action:`הקמת מפעלים — ${r.name}`,value:rl.newFac,note:`עלות ≈${fmt((rl.newFac||0)*(S.config.params.factoryCost||0))} SF · זמין רבעון קדימה`});
    if((rl.offices||0)>0) rows.push({form:'A1-3',action:`משרדי מכירות — ${r.name}`,value:rl.offices,note:`יעד ${rl.offices} משרדים · עלות ≈${fmt((rl.offices||0)*(S.config.params.officeCost||0))} SF/רבעון`});
    if(rl.transferIn>0) rows.push({form:'A3-1',action:`Money Transfer — To Home Office? / אל ${r.name}`,value:rl.transferIn,note:`${r.cur} · כיוון מהמטה`});
    if(rl.invest>0) rows.push({form:'A3-2',action:`השקעה/הלוואה מקומית — ${r.name}`,value:rl.invest,note:r.cur});
  });
  if((lev.rd||0)>0) rows.push({form:'H1-1',action:'מו״פ (Liechtenstein) — Chip/X + PC/Y',value:lev.rd,note:'פצל בין X ל-Y לפי יעדי הדרגה'});
  if(!rows.length) rows.push({form:'—',action:'לא הוזנו מהלכים בתרחיש לרבעון זה',value:0,note:'הזן מנופים בסימולטור'});
  return rows;
}

// WS-2: chip→computer constraint. PCs (Y) produced in a quarter need chips (X) already in inventory
// (1-quarter delay — chips produced this quarter are available only next quarter).
function chipGuard(sc,targetQ){
  const op=S.quarters[S.activeQuarter].operational;
  const chipInv=(op.inventory||[]).filter(i=>i.product==='X').reduce((a,i)=>a+(i.qty||0),0);
  const lev=sc&&sc.levers[targetQ]; let pcPlanned=0;
  if(lev) REGIONS.forEach(r=>{ const rl=lev.regions[r.id]||{}; if(rl.product==='Y') pcPlanned+=(rl.production||0); });
  return {chipInv,pcPlanned,ok:pcPlanned<=chipInv,gap:Math.max(0,pcPlanned-chipInv)};
}
function scenarioValidation(sc,targetQ){
  const lev=sc&&sc.levers[targetQ]; if(!lev) return {noNeg:true,hasCost:true};
  let noNeg=true,hasCost=true;
  REGIONS.forEach(r=>{ const rl=lev.regions[r.id]||{};
    ['production','unitCost','sales','advertising','invest','transferIn'].forEach(k=>{ if((rl[k]||0)<0) noNeg=false; });
    if((rl.production||0)>0 && !(rl.unitCost>0)) hasCost=false; });
  if((lev.rd||0)<0) noNeg=false;
  return {noNeg,hasCost};
}
function renderChecklist(box,targetQ,sc){

  ];
  box.innerHTML=`<ul class="checklist">${items.map(it=>`<li><span class="check ${it.ok?'done':''}">${it.ok?'✓':''}</span><span>${esc(it.t)}</span></li>`).join('')}</ul>
    ${!cg.ok?`<div class="tag r" style="margin-top:10px">${IC('warn')} חסרים ${fmt(cg.gap)} שבבים לייצור המחשבים — ייצר/רכוש שבבים רבעון קודם (אין שבב = אין מחשב).</div>`:''}
    <div class="small muted" style="margin-top:12px">${items.every(i=>i.ok)?'<span style="color:var(--green)">'+IC('check')+' מוכן להגשה</span>':IC('warn')+' יש פריטים פתוחים לפני Submit'}</div>`;
}

window.runMaxOptimizer=()=>{
  const base=S.activeQuarter, op=S.quarters[base].operational;
  const cap=parseFloat(($('#maxCap')||{}).value)||0;
  let cost=parseFloat(($('#maxCost')||{}).value)||0;
  if(!cost){ cost=op.inventory.length?(op.inventory.reduce((a,i)=>a+(i.cost||0),0)/op.inventory.length):0; }
  const rd=Math.max(0, parseFloat(($('#maxRd')||{}).value)||0); // fixed R&D per quarter (strategy, not optimized)
  const box=$('#maxResult');
  if(!cap||!cost){ box.innerHTML=`<div class="tag a">${IC('warn')} נדרשים קיבולת (יח׳/רבעון) ועלות יח׳ להרצת מיקסום.</div>`; return; }
  const qs=nextQuarters(base).slice(0,6);
  if(!qs.length){ box.innerHTML=`<div class="tag a">${IC('warn')} אין רבעונים עתידיים (${base} הוא הסוף).</div>`; return; }
  const prodFracs=[1.0,0.9,0.8,0.65], margins=[1.3,1.6,2.0,2.5,3.0];
  let best=null;
  prodFracs.forEach(pf=> margins.forEach(mg=>{
    const production=Math.round(cap*pf), price=cost*mg;
    const levers={};
    qs.forEach(q=>{ levers[q]={rd,regions:{}};
      REGIONS.forEach(r=>{ const prod=r.id==='hq'?0:Math.round(production/3); // HQ doesn't sell; split across 3 markets
        levers[q].regions[r.id]={production:prod,unitCost:cost,sales:prod*price,advertising:Math.round(prod*price*0.06),invest:0,transferIn:0}; }); });
    const sp=scoreProxy(levers), proj=projectCashflow(base,levers), feasible=!proj.some(p=>p.breach);
    const cand={levers,feasible,endCash:sp.endCash,score:sp.value,pf,mg,rd,minDist:Math.min(...proj.map(p=>p.distance))};
    if(!best){ best=cand; return; }
    const better=(cand.feasible&&!best.feasible)||(cand.feasible===best.feasible&&(cand.score>best.score||(cand.score===best.score&&cand.endCash>best.endCash)));
    if(better) best=cand;
  }));
  const name='MAX — מיקסום Q9';
  let sc=S.scenarios.find(s=>s.name===name);
